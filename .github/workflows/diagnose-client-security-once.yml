name: Diagnose Client Security Once

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-client-security-once.yml
      - supabase/functions/gsa-auth-session/index.ts
      - supabase/functions/gsa-auth-session/index_test.ts
      - scripts/check-client-portal-security-contracts.ts

permissions:
  contents: write

jobs:
  diagnose:
    name: Diagnosticar contratos e Deno do cliente
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run client security and Deno validation
        shell: bash
        run: |
          set +e
          npm ci >/tmp/client-security-install.log 2>&1
          install_exit=$?
          test_exit=99
          deno_check_exit=99
          deno_test_exit=99
          if [[ "$install_exit" -eq 0 ]]; then
            npm run test:client-security >/tmp/client-security-test.log 2>&1
            test_exit=$?
            deno check supabase/functions/gsa-auth-session/index.ts >/tmp/client-deno-check.log 2>&1
            deno_check_exit=$?
            deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts >/tmp/client-deno-test.log 2>&1
            deno_test_exit=$?
          else
            : >/tmp/client-security-test.log
            : >/tmp/client-deno-check.log
            : >/tmp/client-deno-test.log
          fi
          printf '%s' "$install_exit" >/tmp/client-security-install-exit
          printf '%s' "$test_exit" >/tmp/client-security-test-exit
          printf '%s' "$deno_check_exit" >/tmp/client-deno-check-exit
          printf '%s' "$deno_test_exit" >/tmp/client-deno-test-exit
          exit 0

      - name: Build diagnostic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          install_exit="$(cat /tmp/client-security-install-exit 2>/dev/null || echo 99)"
          test_exit="$(cat /tmp/client-security-test-exit 2>/dev/null || echo 99)"
          deno_check_exit="$(cat /tmp/client-deno-check-exit 2>/dev/null || echo 99)"
          deno_test_exit="$(cat /tmp/client-deno-test-exit 2>/dev/null || echo 99)"
          mkdir -p deployment-status

          INSTALL_EXIT="$install_exit" TEST_EXIT="$test_exit" DENO_CHECK_EXIT="$deno_check_exit" DENO_TEST_EXIT="$deno_test_exit" node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs/promises';

          const read = async (file) => {
            try { return await fs.readFile(file, 'utf8'); } catch { return ''; }
          };
          const installLog = await read('/tmp/client-security-install.log');
          const testLog = await read('/tmp/client-security-test.log');
          const denoCheckLog = await read('/tmp/client-deno-check.log');
          const denoTestLog = await read('/tmp/client-deno-test.log');
          const combined = `${testLog}\n${denoCheckLog}\n${denoTestLog}`;
          const lines = combined.split(/\r?\n/).filter(Boolean);
          const tail = lines.slice(-180);
          const failedMarkers = lines.filter((line) => /fail|error|assert|missing|ausente|esperado|expected|not found|não encontrado|TS\d+/i.test(line)).slice(-120);
          const success = [
            process.env.INSTALL_EXIT,
            process.env.TEST_EXIT,
            process.env.DENO_CHECK_EXIT,
            process.env.DENO_TEST_EXIT,
          ].every((value) => Number(value) === 0);

          const evidence = {
            generated_at_utc: new Date().toISOString(),
            validated_sha: process.env.GITHUB_SHA,
            install_exit_code: Number(process.env.INSTALL_EXIT),
            test_exit_code: Number(process.env.TEST_EXIT),
            deno_check_exit_code: Number(process.env.DENO_CHECK_EXIT),
            deno_test_exit_code: Number(process.env.DENO_TEST_EXIT),
            result: success ? 'success' : 'failure',
            install_log_sha256: crypto.createHash('sha256').update(installLog).digest('hex'),
            test_log_sha256: crypto.createHash('sha256').update(testLog).digest('hex'),
            deno_check_log_sha256: crypto.createHash('sha256').update(denoCheckLog).digest('hex'),
            deno_test_log_sha256: crypto.createHash('sha256').update(denoTestLog).digest('hex'),
            failed_markers: failedMarkers,
            tail,
          };

          const serialized = `${JSON.stringify(evidence, null, 2)}\n`;
          await fs.writeFile('/tmp/client-security-diagnostic.json', serialized);
          await fs.writeFile('deployment-status/client-security-diagnostic.json', serialized);
          NODE

      - name: Publish diagnostic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f /tmp/client-security-diagnostic.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          published=false
          for attempt in $(seq 1 10); do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p deployment-status
            cp /tmp/client-security-diagnostic.json deployment-status/client-security-diagnostic.json
            git add deployment-status/client-security-diagnostic.json
            git commit -m "Registrar diagnóstico Deno do gateway do cliente" || true
            if git push origin HEAD:main; then
              published=true
              break
            fi
            sleep 5
          done
          test "$published" = true
