name: Deploy Admin Audit Production

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/temp-deploy-admin-audit-production.yml'
      - 'supabase/migrations/*admin*.sql'
      - 'supabase/migrations/*private_admin*.sql'
      - 'supabase/migrations/*ticket_status*.sql'

permissions:
  contents: read

concurrency:
  group: deploy-admin-audit-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'agent/corrigir-auditoria-admin-final'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate target and migration set
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          for file in \
            supabase/migrations/20260720234400_admin_security_baseline_compat.sql \
            supabase/migrations/20260720234500_admin_identity_permissions_hardening.sql \
            supabase/migrations/20260720235300_admin_security_state_restore.sql \
            supabase/migrations/20260720235425_admin_protection_schema_compat.sql \
            supabase/migrations/20260720235450_enable_admin_extensions.sql \
            supabase/migrations/20260720235500_admin_secure_operations.sql \
            supabase/migrations/20260721000500_admin_module_rls_boundaries.sql \
            supabase/migrations/20260721001500_private_admin_documents.sql \
            supabase/migrations/20260721002500_secure_admin_settings.sql \
            supabase/migrations/20260721003000_hash_collaborator_credentials.sql \
            supabase/migrations/20260721003500_ticket_status_compat.sql \
            supabase/migrations/20260721003600_minimize_admin_dashboard_payload.sql \
            supabase/migrations/20260721003700_sensitive_admin_audit_triggers.sql \
            supabase/migrations/20260721003800_admin_session_token_validation_compat.sql; do
            test -f "$file"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Read remote migration history
        id: state
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" | tee admin-migration-list-before.log
          tr -d '`' < admin-migration-list-before.log > admin-migration-list-normalized.log
          all_applied=true
          for version in \
            20260720234400 20260720234500 20260720235300 20260720235425 \
            20260720235450 20260720235500 20260721000500 20260721001500 \
            20260721002500 20260721003000 20260721003500 20260721003600 \
            20260721003700 20260721003800; do
            if ! grep -E "${version}.*${version}" admin-migration-list-normalized.log; then
              all_applied=false
            fi
          done
          echo "applied=$all_applied" >> "$GITHUB_OUTPUT"

      - name: Preview pending migrations
        if: steps.state.outputs.applied != 'true'
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run -p "$SUPABASE_DB_PASSWORD" | tee admin-dry-run.log
          grep -Eo '20[0-9]{12}' admin-dry-run.log | sort -u > admin-pending-versions.txt || true
          cat > admin-expected-versions.txt <<'VERSIONS'
          20260720234400
          20260720234500
          20260720235300
          20260720235425
          20260720235450
          20260720235500
          20260721000500
          20260721001500
          20260721002500
          20260721003000
          20260721003500
          20260721003600
          20260721003700
          20260721003800
          VERSIONS
          diff -u admin-expected-versions.txt admin-pending-versions.txt

      - name: Apply authorized migrations
        if: steps.state.outputs.applied != 'true'
        run: supabase db push --linked -p "$SUPABASE_DB_PASSWORD"

      - name: Verify remote migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" | tee admin-migration-list-after.log
          tr -d '`' < admin-migration-list-after.log > admin-migration-list-after-normalized.log
          for version in \
            20260720234400 20260720234500 20260720235300 20260720235425 \
            20260720235450 20260720235500 20260721000500 20260721001500 \
            20260721002500 20260721003000 20260721003500 20260721003600 \
            20260721003700 20260721003800; do
            grep -E "${version}.*${version}" admin-migration-list-after-normalized.log
          done

      - name: Export production schema evidence
        run: supabase db dump --linked -p "$SUPABASE_DB_PASSWORD" --schema public,storage --file admin-production-schema.sql

      - name: Verify production schema contracts
        run: |
          set -euo pipefail
          grep -q 'gsa_admin_access_snapshot' admin-production-schema.sql
          grep -q 'gsa_admin_save_collaborator' admin-production-schema.sql
          grep -q 'gsa_admin_settings_snapshot' admin-production-schema.sql
          grep -q 'gsa_admin_update_settings_secure' admin-production-schema.sql
          grep -q 'gsa_admin_validate_context' admin-production-schema.sql
          grep -q 'gsa_admin_sensitive_change_audit' admin-production-schema.sql
          grep -Eq 'senha_hash|credencial_hash|credential_hash' admin-production-schema.sql

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-production-deployment
          path: |
            admin-migration-list-before.log
            admin-migration-list-normalized.log
            admin-dry-run.log
            admin-pending-versions.txt
            admin-migration-list-after.log
            admin-migration-list-after-normalized.log
            admin-production-schema.sql
          retention-days: 7
          if-no-files-found: ignore
