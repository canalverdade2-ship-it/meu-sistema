name: Deploy Admin Audit Production

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/temp-deploy-admin-audit-production.yml'
      - 'supabase/migrations/*admin*.sql'
      - 'supabase/migrations/*private_admin*.sql'
      - 'supabase/migrations/*ticket_status*.sql'

permissions:
  contents: read

concurrency:
  group: deploy-admin-audit-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'agent/corrigir-auditoria-admin-final'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate target and migration set
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          for file in \
            supabase/migrations/20260720234400_admin_security_baseline_compat.sql \
            supabase/migrations/20260720234500_admin_identity_permissions_hardening.sql \
            supabase/migrations/20260720235300_admin_security_state_restore.sql \
            supabase/migrations/20260720235425_admin_protection_schema_compat.sql \
            supabase/migrations/20260720235450_enable_admin_extensions.sql \
            supabase/migrations/20260720235500_admin_secure_operations.sql \
            supabase/migrations/20260721000500_admin_module_rls_boundaries.sql \
            supabase/migrations/20260721001500_private_admin_documents.sql \
            supabase/migrations/20260721002500_secure_admin_settings.sql \
            supabase/migrations/20260721003000_hash_collaborator_credentials.sql \
            supabase/migrations/20260721003500_ticket_status_compat.sql \
            supabase/migrations/20260721003600_minimize_admin_dashboard_payload.sql \
            supabase/migrations/20260721003700_sensitive_admin_audit_triggers.sql \
            supabase/migrations/20260721003800_admin_session_token_validation_compat.sql; do
            test -f "$file"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Check migration state
        id: state
        shell: bash
        run: |
          cat > admin-state.sql <<'SQL'
          SELECT count(*) AS applied_count
          FROM supabase_migrations.schema_migrations
          WHERE version IN (
            '20260720234400','20260720234500','20260720235300','20260720235425',
            '20260720235450','20260720235500','20260721000500','20260721001500',
            '20260721002500','20260721003000','20260721003500','20260721003600',
            '20260721003700','20260721003800'
          );
          SQL
          supabase db query --linked --file admin-state.sql | tee admin-state.log
          if grep -Eq '(^|[^0-9])14([^0-9]|$)' admin-state.log; then
            echo 'applied=true' >> "$GITHUB_OUTPUT"
          else
            echo 'applied=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build transactional bundles
        if: steps.state.outputs.applied != 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'BEGIN;'
            for file in \
              supabase/migrations/20260720234400_admin_security_baseline_compat.sql \
              supabase/migrations/20260720234500_admin_identity_permissions_hardening.sql \
              supabase/migrations/20260720235300_admin_security_state_restore.sql \
              supabase/migrations/20260720235425_admin_protection_schema_compat.sql \
              supabase/migrations/20260720235450_enable_admin_extensions.sql \
              supabase/migrations/20260720235500_admin_secure_operations.sql \
              supabase/migrations/20260721000500_admin_module_rls_boundaries.sql \
              supabase/migrations/20260721001500_private_admin_documents.sql \
              supabase/migrations/20260721002500_secure_admin_settings.sql \
              supabase/migrations/20260721003000_hash_collaborator_credentials.sql \
              supabase/migrations/20260721003500_ticket_status_compat.sql \
              supabase/migrations/20260721003600_minimize_admin_dashboard_payload.sql \
              supabase/migrations/20260721003700_sensitive_admin_audit_triggers.sql \
              supabase/migrations/20260721003800_admin_session_token_validation_compat.sql; do
              sed '/^[[:space:]]*BEGIN;[[:space:]]*$/d; /^[[:space:]]*COMMIT;[[:space:]]*$/d' "$file"
            done
            echo 'ROLLBACK;'
          } > admin-preview.sql
          sed '$s/ROLLBACK;/COMMIT;/' admin-preview.sql > admin-production.sql

      - name: Validate migrations with rollback
        if: steps.state.outputs.applied != 'true'
        run: supabase db query --linked --file admin-preview.sql

      - name: Apply migrations atomically
        if: steps.state.outputs.applied != 'true'
        run: supabase db query --linked --file admin-production.sql

      - name: Register migration history
        if: steps.state.outputs.applied != 'true'
        run: >-
          supabase migration repair
          20260720234400 20260720234500 20260720235300 20260720235425
          20260720235450 20260720235500 20260721000500 20260721001500
          20260721002500 20260721003000 20260721003500 20260721003600
          20260721003700 20260721003800 --status applied --linked

      - name: Verify production objects
        shell: bash
        run: |
          cat > admin-verify.sql <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_list_collaborators') THEN
              RAISE EXCEPTION 'Gestão segura de colaboradores ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_save_settings') THEN
              RAISE EXCEPTION 'Configurações administrativas seguras ausentes';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_validate_admin_session') THEN
              RAISE EXCEPTION 'Validação administrativa de sessão ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM storage.buckets WHERE id = 'gsa-private-documents' AND public = false) THEN
              RAISE EXCEPTION 'Bucket administrativo privado ausente';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public' AND table_name = 'colaboradores'
                AND column_name IN ('senha_hash','credential_hash')
            ) THEN
              RAISE EXCEPTION 'Hash de credenciais de colaboradores ausente';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'storage' AND tablename = 'objects'
                AND policyname ILIKE '%admin%private%'
            ) THEN
              RAISE EXCEPTION 'Política de documentos administrativos privados ausente';
            END IF;
          END $$;

          SELECT version
          FROM supabase_migrations.schema_migrations
          WHERE version IN (
            '20260720234400','20260720234500','20260720235300','20260720235425',
            '20260720235450','20260720235500','20260721000500','20260721001500',
            '20260721002500','20260721003000','20260721003500','20260721003600',
            '20260721003700','20260721003800'
          )
          ORDER BY version;
          SQL
          supabase db query --linked --file admin-verify.sql | tee admin-verification.log
          for version in \
            20260720234400 20260720234500 20260720235300 20260720235425 \
            20260720235450 20260720235500 20260721000500 20260721001500 \
            20260721002500 20260721003000 20260721003500 20260721003600 \
            20260721003700 20260721003800; do
            grep -q "$version" admin-verification.log
          done

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-production-deployment
          path: |
            admin-state.log
            admin-verification.log
            admin-preview.sql
          retention-days: 1
          if-no-files-found: ignore
