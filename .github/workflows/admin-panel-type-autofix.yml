name: Apply admin panel type fix

on:
  push:
    branches: [agent/corrigir-painel-administrativo]
    paths:
      - '.gsa-admin-type-fix-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-administrativo
          fetch-depth: 0

      - name: Add React type imports
        shell: python
        run: |
          from pathlib import Path

          paths = [
              Path('src/components/admin/Dashboard.tsx'),
              Path('src/components/admin/TravelAdminModule.tsx'),
              Path('src/pages/AdminPanel.tsx'),
          ]

          for path in paths:
              content = path.read_text(encoding='utf-8')
              marker = "import type React from 'react';"
              if marker not in content:
                  lines = content.splitlines()
                  insert_at = 1
                  lines.insert(insert_at, marker)
                  content = '\n'.join(lines) + '\n'
                  path.write_text(content, encoding='utf-8')

          compatibility = Path('src/types/react-global.d.ts')
          if compatibility.exists():
              compatibility.unlink()

          trigger = Path('.gsa-admin-type-fix-trigger')
          if trigger.exists():
              trigger.unlink()

          workflow = Path('.github/workflows/admin-panel-type-autofix.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corrigir imports de tipos React do painel"
          git push origin HEAD:agent/corrigir-painel-administrativo
