name: Restore Original GSA Ads Colors

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-advertising-platform.yml'
      - 'scripts/restore-gsa-ads-colors.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-original-gsa-ads-colors-${{ github.sha }}
  cancel-in-progress: false

jobs:
  restore-colors:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restaurar somente a identidade visual anterior
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/restore-gsa-ads-colors.py
          git diff --check
          grep -q 'bg-neutral-950/90 backdrop-blur-xl' src/components/public/AdvertisingPage.tsx
          grep -q 'radial-gradient(circle_at_top_right' src/components/public/AdvertisingPage.tsx
          grep -q 'border-neutral-200 bg-white' src/components/admin/AdvertisingAdminModule.tsx
          grep -q 'bg-white/95 backdrop-blur-xl' src/pages/AdvertiserPortal.tsx
          grep -q 'bg-neutral-950 p-3 text-white' src/pages/AdvertiserPortal.tsx
          ! grep -q 'gsa_adv_requests_store\|gsa_adv_proposals_store\|gsa_adv_campaigns_store\|gsa_advertiser_session\|anunciantes_solicitacoes' src/components/public/AdvertisingPage.tsx src/components/admin/AdvertisingAdminModule.tsx src/pages/AdvertiserPortal.tsx

      - name: Gravar cores restauradas diretamente na main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/public/AdvertisingPage.tsx src/components/admin/AdvertisingAdminModule.tsx src/pages/AdvertiserPortal.tsx
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Nenhuma alteração visual pendente.'
            exit 0
          fi
          git commit -m 'Restaurar cores originais das páginas do GSA Anúncios'
          git pull --rebase origin main
          git push origin HEAD:main
