name: Observe PR225 Rollback V2 Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/observe-pr225-rollback-v2-once.yml'

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture rollback V2 run
        shell: bash
        run: |
          set -euo pipefail
          sleep 65
          run="$(gh run list --repo "$REPOSITORY" --workflow rollback-pr225-production-v2-once.yml --limit 5 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,event,url --jq '.[0] // {}')"
          mkdir -p deployment-status
          jq -n --arg generated_at_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --argjson rollback "$run" '{generated_at_utc:$generated_at_utc,rollback:$rollback}' > deployment-status/pr225-production-db-rollback-v2-progress.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deployment-status/pr225-production-db-rollback-v2-progress.json
          git commit -m 'Registrar andamento do rollback V2 da PR 225'
          git pull --rebase origin main
          git push origin HEAD:main
