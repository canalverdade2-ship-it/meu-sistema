name: Integrate Collaborator Current Main

on:
  push:
    branches: [ops/integrar-painel-colaborador]
    paths: ['.integrate-collaborator-trigger']

permissions:
  contents: write
  issues: write

concurrency:
  group: integrate-collaborator-current-main
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_BRANCH: agent/corrigir-painel-colaborador-final
      SOURCE_SHA: d91ece5755a76008ffeb777a6c4eeb4cbd06dc72
      TARGET_BRANCH: integration/painel-colaborador-atual
      OPS_BRANCH: ops/integrar-painel-colaborador
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate authorization and source
        shell: bash
        run: |
          set -euo pipefail
          grep -Fqx 'INTEGRATE_COLLABORATOR_CURRENT_MAIN_V1' .integrate-collaborator-trigger
          git fetch origin main "$SOURCE_BRANCH"
          test "$(git rev-parse "origin/$SOURCE_BRANCH")" = "$SOURCE_SHA"

      - name: Rebuild changes over current main
        id: cherry_pick
        shell: bash
        run: |
          set +e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$TARGET_BRANCH" origin/main
          git cherry-pick "$SOURCE_SHA" > integration.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            git diff --name-only --diff-filter=U > conflicts.log
            git status --short >> integration.log
            git cherry-pick --abort || true
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report integration conflict
        if: steps.cherry_pick.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Falha ao integrar Painel do Colaborador sobre a main atual'
            echo
            echo "- Fonte: $SOURCE_SHA"
            echo "- Main: $(git rev-parse origin/main)"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo '### Arquivos em conflito'
            echo '```text'
            cat conflicts.log
            echo '```'
            echo '### Diagnóstico'
            echo '```text'
            sed -n '1,240p' integration.log
            echo '```'
          } > integration-failure.md
          gh issue create --title 'Falha integração Painel do Colaborador' --body-file integration-failure.md
          exit 1

      - name: Install dependencies
        if: steps.cherry_pick.outputs.exit_code == '0'
        run: npm ci

      - name: Validate TypeScript and contracts
        if: steps.cherry_pick.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run test:admin
          npm run test:client-security
          npm run test:provider
          npm run test:travel
          npm run build

      - name: Publish integration branch
        if: steps.cherry_pick.outputs.exit_code == '0'
        run: git push --force-with-lease origin "HEAD:$TARGET_BRANCH"

      - name: Record integration success
        if: steps.cherry_pick.outputs.exit_code == '0'
        shell: bash
        run: |
          integrated_sha=$(git rev-parse HEAD)
          git checkout "$OPS_BRANCH"
          git pull --ff-only origin "$OPS_BRANCH"
          printf 'SUCCESS\nsource=%s\nintegration=%s\nmain=%s\nrun=%s\n' "$SOURCE_SHA" "$integrated_sha" "$(git rev-parse origin/main)" "$GITHUB_RUN_ID" > .integrate-collaborator-success
          git add .integrate-collaborator-success
          git commit -m 'Registrar integração do Painel do Colaborador'
          git push origin "$OPS_BRANCH"

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collaborator-integration-evidence
          path: |
            integration.log
            conflicts.log
          if-no-files-found: ignore
          retention-days: 30
