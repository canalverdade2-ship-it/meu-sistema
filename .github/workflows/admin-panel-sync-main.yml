name: Sync admin panel branch with main

on:
  push:
    branches: [agent/corrigir-painel-administrativo]
    paths:
      - '.gsa-admin-sync-main-trigger'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-administrativo
          fetch-depth: 0

      - name: Merge current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sincronizar correções do painel com a main"
          rm -f .gsa-admin-sync-main-trigger
          rm -f .github/workflows/admin-panel-sync-main.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/corrigir-painel-administrativo
