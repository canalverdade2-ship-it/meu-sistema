# retry after adding faturas.metadata compatibility
name: Preview GSA travel installments

on:
  push:
    branches: [fix/gsa-viagens-parcelamento-checkout-20260720]
    paths:
      - '.github/workflows/temp-preview-gsa-travel-installments.yml'

permissions:
  contents: read
  issues: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gsa-viagens-parcelamento-checkout-20260720

      - name: Validate authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link authorized project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Build rollback bundle
        shell: bash
        run: |
          {
            echo 'BEGIN;'
            cat supabase/migrations/20260720230000_gsa_viagens_parcelamento_checkout.sql
            cat scripts/gsa-viagens-parcelamento-verify.sql
            echo 'ROLLBACK;'
          } > installment-preview.sql

      - name: Validate without persisting
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file installment-preview.sql 2>&1 | tee installment-preview.log

      - name: Publish report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch installment-preview.log
          {
            echo '# Prévia do parcelamento do GSA Viagens'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Resultado: **$JOB_STATUS**"
            echo
            echo '```text'
            sed -n '1,260p' installment-preview.log
            echo '```'
          } > report.md
          gh issue create --title "Prévia parcelamento GSA Viagens - $JOB_STATUS" --body-file report.md
