name: Fix Provider File Types

on:
  push:
    branches: [agent/corrigir-auditoria-painel-prestador]
    paths: ['.provider-file-types-trigger']

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-painel-prestador
      - name: Fix FileList inference
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/prestador/PrestadorDemandas.tsx')
          content = path.read_text()
          old = "onChange={(event) => onChange(Array.from(event.target.files || []).slice(0, 10))}"
          new = "onChange={(event) => onChange(Array.from<File>(event.currentTarget.files ?? []).slice(0, 10))}"
          if content.count(old) != 1:
              raise SystemExit('Trecho esperado não encontrado exatamente uma vez')
          path.write_text(content.replace(old, new))
          PY
      - name: Remove temporary files
        run: rm -f .provider-file-types-trigger .github/workflows/temp-fix-provider-file-types.yml
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:provider
      - run: npm run build
      - name: Publish clean fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corrigir inferência dos arquivos das demandas'
          git push
