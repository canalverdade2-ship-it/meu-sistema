name: Deploy Admin Audit Migrations

on:
  pull_request:
    branches:
      - agent/deploy-admin-audit-production

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-admin-audit-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'agent/deploy-admin-audit-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      EXPECTED_SOURCE_SHA: a701a355b60ca67818356f6a8e9bf0c7223bd187
      APPROVED_QUALITY_RUN_ID: '29780040489'
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout approved deployment branch
        uses: actions/checkout@v4
        with:
          ref: agent/deploy-admin-audit-production
          fetch-depth: 0

      - name: Validate authorization and approved source
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_ID"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

          git fetch origin agent/corrigir-auditoria-admin-final
          source_sha="$(git rev-parse origin/agent/corrigir-auditoria-admin-final)"
          test "$source_sha" = "$EXPECTED_SOURCE_SHA"

          run_conclusion="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$APPROVED_QUALITY_RUN_ID" --jq '.conclusion')"
          run_head="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$APPROVED_QUALITY_RUN_ID" --jq '.head_sha')"
          test "$run_conclusion" = 'success'
          test "$run_head" = "$EXPECTED_SOURCE_SHA"

      - name: Validate authorized migration files
        shell: bash
        run: |
          set -euo pipefail
          cat > admin-expected-versions.txt <<'VERSIONS'
          20260720234400
          20260720234500
          20260720235300
          20260720235425
          20260720235450
          20260720235500
          20260721000500
          20260721001500
          20260721002500
          20260721003000
          20260721003500
          20260721003600
          20260721003700
          20260721003800
          VERSIONS

          while read -r version; do
            matches=(supabase/migrations/${version}_*.sql)
            test "${#matches[@]}" -eq 1
            test -f "${matches[0]}"
          done < admin-expected-versions.txt

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Capture production schema
        run: supabase db dump --linked -p "$SUPABASE_DB_PASSWORD" --schema public,storage --file admin-production-schema.sql

      - name: Verify all authorized migrations in remote history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" 2>&1 | tee admin-migration-list.log
          sed 's/│/|/g' admin-migration-list.log > admin-migration-list.normalized.log

          awk -F'|' '
            {
              remote=$2;
              gsub(/[^0-9]/, "", remote);
              if (length(remote) == 14) print remote;
            }
          ' admin-migration-list.normalized.log | sort -u > admin-remote-versions.txt

          while read -r version; do
            if ! grep -Fxq "$version" admin-remote-versions.txt; then
              echo "Migration administrativa ausente no histórico remoto: $version"
              exit 2
            fi
          done < admin-expected-versions.txt

          grep -Fxf admin-expected-versions.txt admin-remote-versions.txt > admin-verified-versions.txt
          test "$(wc -l < admin-verified-versions.txt)" -eq 14

      - name: Verify production database contracts
        shell: bash
        run: |
          set -euo pipefail
          cat > admin-production-verify.sql <<'SQL'
          DO $$
          DECLARE
            v_function text;
          BEGIN
            FOREACH v_function IN ARRAY ARRAY[
              'gsa_admin_access_snapshot',
              'gsa_admin_save_collaborator',
              'gsa_admin_set_collaborator_status',
              'gsa_admin_rotate_collaborator_credential',
              'gsa_admin_review_deletion_request',
              'gsa_admin_list_resource',
              'gsa_admin_create_protection_proposal',
              'gsa_admin_system_snapshot',
              'gsa_admin_settings_snapshot',
              'gsa_admin_update_settings_secure',
              'gsa_admin_validate_context',
              'gsa_admin_sensitive_change_audit',
              'gsa_admin_private_document_allowed',
              'gsa_private_document_read_allowed'
            ]::text[] LOOP
              IF NOT EXISTS (
                SELECT 1 FROM pg_proc p
                JOIN pg_namespace n ON n.oid = p.pronamespace
                WHERE n.nspname = 'public' AND p.proname = v_function
              ) THEN
                RAISE EXCEPTION 'Função obrigatória ausente: %', v_function;
              END IF;
            END LOOP;

            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'colaboradores'
                AND column_name = 'credencial_hash'
            ) THEN
              RAISE EXCEPTION 'Coluna colaboradores.credencial_hash ausente.';
            END IF;

            IF to_regclass('public.gsa_admin_audit_events') IS NULL
               OR to_regclass('public.gsa_admin_notification_state') IS NULL THEN
              RAISE EXCEPTION 'Tabelas internas de auditoria/notificação ausentes.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM storage.buckets
              WHERE id = 'gsa-private-documents' AND public = false
            ) THEN
              RAISE EXCEPTION 'Bucket privado administrativo ausente ou público.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'storage' AND tablename = 'objects'
                AND policyname = 'gsa_admin_private_documents_select'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'storage' AND tablename = 'objects'
                AND policyname = 'gsa_admin_private_documents_insert'
            ) THEN
              RAISE EXCEPTION 'Políticas privadas de documentos ausentes.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'public'
                AND tablename = 'viagens_orcamentos'
                AND policyname = 'gsa_collaborator_module_viagens_orcamentos'
                AND permissive = 'RESTRICTIVE'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'public'
                AND tablename = 'ordens_fiscais'
                AND policyname = 'gsa_collaborator_module_ordens_fiscais'
                AND permissive = 'RESTRICTIVE'
            ) THEN
              RAISE EXCEPTION 'Fronteiras RLS administrativas obrigatórias ausentes.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_gsa_admin_audit_colaboradores' AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'Gatilho de auditoria de colaboradores ausente.';
            END IF;
          END;
          $$;

          SELECT
            (SELECT count(*) FROM public.gsa_admin_audit_events) AS audit_events,
            (SELECT count(*) FROM pg_policies WHERE policyname LIKE 'gsa_collaborator_module_%') AS restrictive_module_policies,
            (SELECT public FROM storage.buckets WHERE id = 'gsa-private-documents') AS private_bucket_public;
          SQL

          supabase db query --linked --file admin-production-verify.sql 2>&1 | tee admin-production-verification.log

      - name: Verify schema evidence
        shell: bash
        run: |
          set -euo pipefail
          for pattern in \
            gsa_admin_access_snapshot \
            gsa_admin_save_collaborator \
            gsa_admin_update_settings_secure \
            gsa_admin_validate_context \
            gsa_admin_sensitive_change_audit \
            gsa_admin_private_document_allowed \
            gsa_private_document_read_allowed \
            credencial_hash \
            gsa-private-documents \
            gsa_collaborator_module_viagens_orcamentos \
            gsa_collaborator_module_ordens_fiscais \
            trg_gsa_admin_audit_colaboradores; do
            grep -q "$pattern" admin-production-schema.sql
          done

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-production-verification
          path: |
            admin-expected-versions.txt
            admin-migration-list.log
            admin-remote-versions.txt
            admin-verified-versions.txt
            admin-production-verification.log
            admin-production-schema.sql
          retention-days: 30
          if-no-files-found: ignore
