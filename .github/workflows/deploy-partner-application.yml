name: Deploy Partner Application

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-partner-application.yml'
      - 'supabase/migrations/20260721213000_partner_public_applications.sql'
      - 'supabase/functions/gsa-partner-application/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-partner-application-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migration and deploy Edge Function
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate Edge Function source
        run: deno check supabase/functions/gsa-partner-application/index.ts

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply partner application migration idempotently
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee partner-migrations-before.log

          if awk -F'|' '
            {
              remote=$2
              gsub(/[^0-9]/, "", remote)
              if (remote == "20260721213000") found=1
            }
            END { exit found ? 0 : 1 }
          ' partner-migrations-before.log; then
            echo 'A migration de solicitações públicas de parceiros já está registrada em produção.' | tee partner-migration-apply.log
          else
            supabase db query --linked --file supabase/migrations/20260721213000_partner_public_applications.sql 2>&1 | tee partner-migration-apply.log
            supabase migration repair --linked --status applied 20260721213000 2>&1 | tee -a partner-migration-apply.log
          fi

      - name: Verify partner database objects
        shell: bash
        run: |
          set -euo pipefail
          cat > partner-production-verification.sql <<'SQL'
          DO $$
          DECLARE
            v_columns integer;
          BEGIN
            IF NOT EXISTS (
              SELECT 1
                FROM supabase_migrations.schema_migrations
               WHERE version = '20260721213000'
            ) THEN
              RAISE EXCEPTION 'Migration 20260721213000 não registrada';
            END IF;

            SELECT count(*)
              INTO v_columns
              FROM information_schema.columns
             WHERE table_schema = 'public'
               AND table_name = 'parceiros'
               AND column_name IN (
                 'tax_document',
                 'application_source',
                 'application_protocol',
                 'submitted_at',
                 'privacy_consent_at'
               );

            IF v_columns <> 5 THEN
              RAISE EXCEPTION 'Colunas da solicitação pública incompletas: % de 5', v_columns;
            END IF;

            IF to_regclass('public.parceiros_publicos') IS NULL THEN
              RAISE EXCEPTION 'View pública segura de parceiros ausente';
            END IF;

            IF has_table_privilege('anon', 'public.parceiros', 'SELECT')
               OR has_table_privilege('authenticated', 'public.parceiros', 'SELECT') THEN
              RAISE EXCEPTION 'Tabela parceiros ainda possui leitura pública direta';
            END IF;

            IF NOT has_table_privilege('anon', 'public.parceiros_publicos', 'SELECT')
               OR NOT has_table_privilege('authenticated', 'public.parceiros_publicos', 'SELECT') THEN
              RAISE EXCEPTION 'View pública de parceiros não está disponível';
            END IF;

            IF NOT EXISTS (
              SELECT 1
                FROM storage.buckets
               WHERE id = 'parceiros-midias'
                 AND public = true
                 AND file_size_limit = 5242880
            ) THEN
              RAISE EXCEPTION 'Bucket parceiros-midias ausente ou configurado incorretamente';
            END IF;

            IF NOT EXISTS (
              SELECT 1
                FROM pg_trigger t
                JOIN pg_class c ON c.oid = t.tgrelid
                JOIN pg_namespace n ON n.oid = c.relnamespace
               WHERE n.nspname = 'public'
                 AND c.relname = 'parceiros'
                 AND t.tgname = 'trg_enrich_public_partner_application'
                 AND NOT t.tgisinternal
            ) THEN
              RAISE EXCEPTION 'Trigger de enriquecimento da solicitação ausente';
            END IF;
          END $$;

          SELECT 'PARTNER_DATABASE_VERIFIED' AS result;
          SQL

          set -o pipefail
          supabase db query --linked --file partner-production-verification.sql 2>&1 | tee partner-production-verification.log
          grep -q 'PARTNER_DATABASE_VERIFIED' partner-production-verification.log

      - name: Deploy public partner application function
        run: supabase functions deploy gsa-partner-application --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Verify deployed function
        shell: bash
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee partner-function-list.log
          grep -q 'gsa-partner-application' partner-function-list.log

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-application-production-evidence
          path: |
            partner-migrations-before.log
            partner-migration-apply.log
            partner-production-verification.log
            partner-function-list.log
          if-no-files-found: ignore
          retention-days: 30
