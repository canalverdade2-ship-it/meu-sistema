name: Finalizar limpeza privada de clientes - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Corrigir limpeza privada
        run: node scripts/fix-private-client-deletion-stage6.cjs

      - name: Validar contrato de limpeza
        shell: bash
        run: |
          grep -q "removePrivateDocument" src/components/admin/ClientesModule.tsx
          grep -q "gsa-private://" src/components/admin/ClientesModule.tsx

      - name: Instalar dependências
        shell: bash
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Compilar aplicação
        run: npm run build

      - name: Publicar correção funcional
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/ClientesModule.tsx
          git commit -m "Remove documentos privados ao excluir clientes"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
