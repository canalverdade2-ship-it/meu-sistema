name: Apply dashboard key type fix

on:
  push:
    branches: [agent/corrigir-painel-administrativo]
    paths:
      - '.gsa-dashboard-key-fix-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-administrativo
          fetch-depth: 0

      - name: Patch component prop types
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/admin/Dashboard.tsx')
          content = path.read_text(encoding='utf-8')

          first = "  onClick?: () => void;\n}) {\n  return (\n    <button"
          first_replacement = "  onClick?: () => void;\n  key?: React.Key;\n}) {\n  return (\n    <button"
          if first not in content and first_replacement not in content:
              raise SystemExit('Assinatura de KpiCard não encontrada')
          content = content.replace(first, first_replacement, 1)

          second = "  action?: React.ReactNode;\n}) {\n  return (\n    <div"
          second_replacement = "  action?: React.ReactNode;\n  key?: React.Key;\n}) {\n  return (\n    <div"
          if second not in content and second_replacement not in content:
              raise SystemExit('Assinatura de Row não encontrada')
          content = content.replace(second, second_replacement, 1)

          path.write_text(content, encoding='utf-8')
          Path('.gsa-dashboard-key-fix-trigger').unlink(missing_ok=True)
          Path('.github/workflows/admin-dashboard-key-fix.yml').unlink(missing_ok=True)

      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corrigir atributos key do dashboard administrativo"
          git push origin HEAD:agent/corrigir-painel-administrativo
