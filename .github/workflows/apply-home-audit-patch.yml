name: Temporary apply Home audit patch

on:
  push:
    branches: [agent/corrigir-home-itens-2-a-10]
    paths: ['.home-patch-ready']

permissions:
  contents: write

concurrency:
  group: apply-home-audit-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          cat .home-patch-part-00 .home-patch-part-01 .home-patch-part-02 > /tmp/home-audit.patch
          git apply --check /tmp/home-audit.patch
          git apply /tmp/home-audit.patch
          rm .home-patch-part-00 .home-patch-part-01 .home-patch-part-02 .home-patch-ready
          rm .github/workflows/apply-home-audit-patch.yml

      - name: Commit applied files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Aplicar acessibilidade e contratos finais da Home'
          git push
