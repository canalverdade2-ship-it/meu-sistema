name: Deploy Restored Admin Foundations

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy-restored-admin-foundations.yml'
      - 'supabase/migrations/20260721194500_prepare_missing_gsa_seguros_base.sql'
      - 'supabase/migrations/20260721194600_restore_admin_dashboard_foundation.sql'
      - 'supabase/migrations/20260721194700_harden_restored_gsa_seguros.sql'
      - 'scripts/verify-restored-admin-foundations.sql'

permissions:
  contents: write

concurrency:
  group: deploy-restored-admin-foundations
  cancel-in-progress: false

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-admin-snapshot-production
          fetch-depth: 0

      - name: Validate production authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Read migration history
        shell: bash
        run: supabase migration list --linked 2>&1 | tee migrations-before.log

      - name: Apply insurance preparation
        shell: bash
        run: |
          set -euo pipefail
          if awk -F'|' '{r=$2; gsub(/[^0-9]/,"",r); if(r=="20260721194500") found=1} END{exit found?0:1}' migrations-before.log; then
            echo '20260721194500 already applied.' | tee insurance-preparation.log
          else
            supabase db query --linked --file supabase/migrations/20260721194500_prepare_missing_gsa_seguros_base.sql 2>&1 | tee insurance-preparation.log
            supabase migration repair --linked --status applied 20260721194500 2>&1 | tee -a insurance-preparation.log
          fi

      - name: Restore historical insurance foundation
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee migrations-after-preparation.log
          if awk -F'|' '{r=$2; gsub(/[^0-9]/,"",r); if(r=="20260718121000") found=1} END{exit found?0:1}' migrations-after-preparation.log; then
            echo '20260718121000 already applied.' | tee insurance-base-apply.log
          else
            cat > insurance-base-recovery.sql <<'SQL'
          BEGIN;
          DO $cleanup$
          DECLARE
            v_table text;
            v_policy text;
          BEGIN
            FOREACH v_table IN ARRAY ARRAY[
              'seguros_configuracoes','seguros_parceiros','seguros_produtos','seguros_ofertas',
              'seguros_cotacoes','seguros_cotacao_dados','seguros_propostas','seguros_aceites',
              'seguros_apolices','seguros_documentos','seguros_assessorias','seguros_comissoes',
              'seguros_assistencias','seguros_sinistros','seguros_sinistro_mensagens',
              'seguros_atendimentos','seguros_atendimento_mensagens','seguros_auditoria'
            ] LOOP
              IF to_regclass(format('public.%I', v_table)) IS NOT NULL THEN
                v_policy := left('seguros_admin_' || v_table, 63);
                EXECUTE format('DROP POLICY IF EXISTS %I ON public.%I', v_policy, v_table);
              END IF;
            END LOOP;
            IF to_regclass('public.seguros_apolices') IS NOT NULL THEN
              DROP TRIGGER IF EXISTS trg_seguros_comissao_ativacao ON public.seguros_apolices;
            END IF;
          END;
          $cleanup$;
          SQL
            cat supabase/migrations/20260718121000_gsa_seguros_complete.sql >> insurance-base-recovery.sql
            cat >> insurance-base-recovery.sql <<'SQL'
          NOTIFY pgrst, 'reload schema';
          COMMIT;
          SQL
            supabase db query --linked --file insurance-base-recovery.sql 2>&1 | tee insurance-base-apply.log
            supabase migration repair --linked --status applied 20260718121000 2>&1 | tee -a insurance-base-apply.log
          fi

      - name: Restore administrative RPC foundation
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee migrations-before-admin-recovery.log
          if awk -F'|' '{r=$2; gsub(/[^0-9]/,"",r); if(r=="20260721194600") found=1} END{exit found?0:1}' migrations-before-admin-recovery.log; then
            echo '20260721194600 already applied.' | tee admin-recovery.log
          else
            supabase db query --linked --file supabase/migrations/20260721194600_restore_admin_dashboard_foundation.sql 2>&1 | tee admin-recovery.log
            supabase migration repair --linked --status applied 20260721194600 2>&1 | tee -a admin-recovery.log
          fi

      - name: Verify historical administrative object coverage
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          source = Path('supabase/migrations/20260720183000_harden_admin_panel.sql').read_text()
          functions = sorted(set(re.findall(r'CREATE OR REPLACE FUNCTION public\.([a-zA-Z0-9_]+)\s*\(', source)))
          tables = sorted(set(re.findall(r'CREATE TABLE IF NOT EXISTS public\.([a-zA-Z0-9_]+)', source)))
          views = sorted(set(re.findall(r'CREATE OR REPLACE VIEW public\.([a-zA-Z0-9_]+)', source)))
          quote = lambda values: 'ARRAY[' + ','.join("'" + value.replace("'", "''") + "'" for value in values) + ']::text[]'
          sql = f'''DO $coverage$
          DECLARE v_name text;
          BEGIN
            FOREACH v_name IN ARRAY {quote(functions)} LOOP
              IF NOT EXISTS (SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid=p.pronamespace WHERE n.nspname='public' AND p.proname=v_name) THEN
                RAISE EXCEPTION 'Função da base administrativa ausente: %', v_name;
              END IF;
            END LOOP;
            FOREACH v_name IN ARRAY {quote(tables + views)} LOOP
              IF to_regclass(format('public.%I', v_name)) IS NULL THEN
                RAISE EXCEPTION 'Relação da base administrativa ausente: %', v_name;
              END IF;
            END LOOP;
          END;
          $coverage$;
          SELECT 'ADMIN_BASE_COVERAGE_VERIFIED' AS result;
          '''
          Path('admin-base-coverage.sql').write_text(sql)
          PY
          supabase db query --linked --file admin-base-coverage.sql 2>&1 | tee admin-base-coverage.log
          grep -q 'ADMIN_BASE_COVERAGE_VERIFIED' admin-base-coverage.log
          supabase migration list --linked 2>&1 | tee migrations-before-admin-repair.log
          if ! awk -F'|' '{r=$2; gsub(/[^0-9]/,"",r); if(r=="20260720183000") found=1} END{exit found?0:1}' migrations-before-admin-repair.log; then
            supabase migration repair --linked --status applied 20260720183000 2>&1 | tee admin-base-repair.log
          else
            echo '20260720183000 already registered.' | tee admin-base-repair.log
          fi

      - name: Reapply insurance security boundaries
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee migrations-before-insurance-hardening.log
          if awk -F'|' '{r=$2; gsub(/[^0-9]/,"",r); if(r=="20260721194700") found=1} END{exit found?0:1}' migrations-before-insurance-hardening.log; then
            echo '20260721194700 already applied.' | tee insurance-hardening.log
          else
            supabase db query --linked --file supabase/migrations/20260721194700_harden_restored_gsa_seguros.sql 2>&1 | tee insurance-hardening.log
            supabase migration repair --linked --status applied 20260721194700 2>&1 | tee -a insurance-hardening.log
          fi

      - name: Verify restored production foundations
        shell: bash
        run: |
          set -euo pipefail
          supabase db query --linked --file scripts/verify-restored-admin-foundations.sql 2>&1 | tee production-recovery-verification.log
          grep -q 'RESTORED_ADMIN_FOUNDATIONS_VERIFIED' production-recovery-verification.log
          supabase migration list --linked 2>&1 | tee migrations-after.log

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restored-admin-foundations-${{ github.run_id }}
          path: |
            migrations-before.log
            insurance-preparation.log
            migrations-after-preparation.log
            insurance-base-recovery.sql
            insurance-base-apply.log
            migrations-before-admin-recovery.log
            admin-recovery.log
            admin-base-coverage.sql
            admin-base-coverage.log
            admin-base-repair.log
            insurance-hardening.log
            production-recovery-verification.log
            migrations-after.log
          if-no-files-found: ignore
          retention-days: 30
