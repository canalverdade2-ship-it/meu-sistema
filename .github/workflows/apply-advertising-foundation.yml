name: Apply Advertising Foundation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/implantar-modulo-anuncios'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implantar-modulo-anuncios
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Prepare SEO integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          metadata_path = Path('src/hooks/usePublicPageMetadata.ts')
          lines = metadata_path.read_text(encoding='utf-8').splitlines()

          def expand_terminal(anchor_text, terminal_text, replacement_values):
            anchor = next((index for index, line in enumerate(lines) if anchor_text in line), None)
            if anchor is None:
              raise SystemExit(f'Âncora não encontrada: {anchor_text}')
            terminal = next((index for index in range(anchor + 1, min(anchor + 8, len(lines))) if terminal_text in lines[index]), None)
            if terminal is None:
              raise SystemExit(f'Terminal não encontrado: {terminal_text}')
            indent = lines[terminal][:len(lines[terminal]) - len(lines[terminal].lstrip())]
            lines[terminal:terminal + 1] = [indent + value for value in replacement_values]

          expand_terminal("? 'Parceiros | GSA HUB'", ': DEFAULT_TITLE;', [
            ": page === 'ads'", "  ? 'Anunciantes | GSA HUB'", ": page === 'advertise'", "  ? 'Anuncie no GSA HUB'", ': DEFAULT_TITLE;'
          ])
          expand_terminal("? 'Conheça empresas e profissionais que fazem parte da rede de parceiros da GSA HUB.'", ': DEFAULT_DESCRIPTION);', [
            ": page === 'ads'", "  ? 'Conheça campanhas e empresas anunciantes aprovadas no ecossistema GSA HUB.'", ": page === 'advertise'", "  ? 'Solicite uma proposta para divulgar sua empresa nas páginas e módulos do GSA HUB.'", ': DEFAULT_DESCRIPTION);'
          ])
          expand_terminal("? window.location.pathname.startsWith('/parceiros/')", ": '/';", [
            ": page === 'ads'", "  ? '/anuncios'", ": page === 'advertise'", "  ? '/anuncie'", ": '/';"
          ])
          metadata_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          script_path = Path('scripts/apply-advertising-foundation.py')
          script = script_path.read_text(encoding='utf-8')
          start = script.find("replace_exact(\n    'src/hooks/usePublicPageMetadata.ts'")
          end = script.find("package_path = Path('package.json')")
          if start < 0 or end < 0 or end <= start:
            raise SystemExit('Bloco de SEO não encontrado no integrador')
          script_path.write_text(script[:start] + script[end:], encoding='utf-8')
          PY

      - name: Apply verified integration patch
        run: python3 -u scripts/apply-advertising-foundation.py

      - name: Fix Supabase PromiseLike compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/components/public/AdvertisingPage.tsx')
          text = path.read_text(encoding='utf-8')
          old = """    supabase.rpc('gsa_public_list_active_ads', { p_placement_code: 'ADS_PUBLIC_SHOWCASE' })
      .then(({ data, error }) => {
        if (!active) return;
        if (error) console.error('Falha ao carregar anúncios públicos:', error);
        setAds(Array.isArray(data) ? data as PublicAdvertisement[] : []);
      })
      .finally(() => { if (active) setLoadingAds(false); });
"""
          new = """    const loadAds = async () => {
      try {
        const { data, error } = await supabase.rpc('gsa_public_list_active_ads', { p_placement_code: 'ADS_PUBLIC_SHOWCASE' });
        if (!active) return;
        if (error) console.error('Falha ao carregar anúncios públicos:', error);
        setAds(Array.isArray(data) ? data as PublicAdvertisement[] : []);
      } finally {
        if (active) setLoadingAds(false);
      }
    };
    void loadAds();
"""
          if text.count(old) != 1:
            raise SystemExit('Trecho assíncrono não encontrado')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove temporary integration files
        run: |
          rm -f scripts/apply-advertising-foundation.py
          rm -f .github/workflows/apply-advertising-foundation.yml
          rm -f .github/workflows/apply-advertising-foundation-push.yml
          rm -f .apply-advertising-foundation-trigger

      - name: Commit integrated foundation
        run: |
          git add -A
          git commit -m 'Integrar fundação do módulo GSA Anúncios'
          git push origin HEAD:agent/implantar-modulo-anuncios
