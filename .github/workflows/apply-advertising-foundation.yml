name: Apply Advertising Foundation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/implantar-modulo-anuncios'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implantar-modulo-anuncios
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Prepare SEO integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          metadata_path = Path('src/hooks/usePublicPageMetadata.ts')
          lines = metadata_path.read_text(encoding='utf-8').splitlines()

          def expand_terminal(anchor_text: str, terminal_text: str, replacement_values: list[str]) -> None:
            anchor = next((index for index, line in enumerate(lines) if anchor_text in line), None)
            if anchor is None:
              raise SystemExit(f'Âncora de SEO não encontrada: {anchor_text}')
            terminal = next((index for index in range(anchor + 1, min(anchor + 8, len(lines))) if terminal_text in lines[index]), None)
            if terminal is None:
              raise SystemExit(f'Terminal de SEO não encontrado: {terminal_text}')
            indent = lines[terminal][:len(lines[terminal]) - len(lines[terminal].lstrip())]
            lines[terminal:terminal + 1] = [indent + value for value in replacement_values]

          expand_terminal(
            "? 'Parceiros | GSA HUB'",
            ': DEFAULT_TITLE;',
            [
              ": page === 'ads'",
              "  ? 'Anunciantes | GSA HUB'",
              "  : page === 'advertise'",
              "    ? 'Anuncie no GSA HUB'",
              "    : DEFAULT_TITLE;",
            ],
          )
          expand_terminal(
            "? 'Conheça empresas e profissionais que fazem parte da rede de parceiros da GSA HUB.'",
            ': DEFAULT_DESCRIPTION);',
            [
              ": page === 'ads'",
              "  ? 'Conheça campanhas e empresas anunciantes aprovadas no ecossistema GSA HUB.'",
              "  : page === 'advertise'",
              "    ? 'Solicite uma proposta para divulgar sua empresa nas páginas e módulos do GSA HUB.'",
              "    : DEFAULT_DESCRIPTION);",
            ],
          )
          expand_terminal(
            "? window.location.pathname.startsWith('/parceiros/')",
            ": '/';",
            [
              ": page === 'ads'",
              "  ? '/anuncios'",
              "  : page === 'advertise'",
              "    ? '/anuncie'",
              "    : '/';",
            ],
          )
          metadata_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          script_path = Path('scripts/apply-advertising-foundation.py')
          script = script_path.read_text(encoding='utf-8')
          start_marker = "replace_exact(\n    'src/hooks/usePublicPageMetadata.ts'"
          end_marker = "package_path = Path('package.json')"
          start = script.find(start_marker)
          end = script.find(end_marker)
          if start < 0 or end < 0 or end <= start:
            raise SystemExit('Bloco antigo de SEO não encontrado no integrador')
          script_path.write_text(script[:start] + script[end:], encoding='utf-8')
          PY

      - name: Apply verified integration patch
        shell: bash
        run: |
          set -o pipefail
          python3 -u scripts/apply-advertising-foundation.py 2>&1 | tee advertising-integration.log

      - name: Install dependencies
        run: npm ci

      - name: Validate integrated frontend
        shell: bash
        run: |
          set -o pipefail
          {
            npx tsc --noEmit
            npm run test:advertising
            deno check supabase/functions/gsa-public-advertising/index.ts
            deno test --allow-env supabase/functions/gsa-public-advertising/index_test.ts
            npm run build
          } 2>&1 | tee advertising-validation.log

      - name: Remove temporary integrator
        run: rm -f scripts/apply-advertising-foundation.py .github/workflows/apply-advertising-foundation.yml .apply-advertising-foundation-trigger advertising-integration.log advertising-validation.log

      - name: Commit integrated foundation
        run: |
          git add -A
          git commit -m 'Integrar fundação do módulo GSA Anúncios'
          git push origin HEAD:agent/implantar-modulo-anuncios

      - name: Upload integration diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: advertising-integration-log
          path: |
            advertising-integration.log
            advertising-validation.log
          if-no-files-found: warn
          retention-days: 7
