name: Production Real Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'audit/production-real-audit.json'
      - 'audit/production-real-audit.md'
      - 'deployment-status/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-real-audit-main
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan runtime for demonstrations and simulations
        run: node scripts/audit-production-real.mjs

      - name: Commit current audit report
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- audit/production-real-audit.json audit/production-real-audit.md; then
            echo 'Relatório sem mudanças.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/production-real-audit.json audit/production-real-audit.md
          git commit -m 'Atualizar auditoria de operação real'
          git push origin HEAD:main

      - name: Enforce explicit production blockers
        run: node scripts/audit-production-real.mjs --enforce
