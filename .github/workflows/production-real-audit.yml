name: Production Real Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'audit/production-real-audit.json'
      - 'audit/production-real-audit.md'
      - 'deployment-status/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-real-audit-main
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore original GSA Ads colors
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/required: bool = True/required: bool = False/' scripts/restore-gsa-ads-colors.py
          python3 scripts/restore-gsa-ads-colors.py
          git diff --check
          ! grep -q 'gsa_adv_requests_store\|gsa_adv_proposals_store\|gsa_adv_campaigns_store\|gsa_advertiser_session\|anunciantes_solicitacoes' src/components/public/AdvertisingPage.tsx src/components/admin/AdvertisingAdminModule.tsx src/pages/AdvertiserPortal.tsx

      - name: Scan runtime for demonstrations and simulations
        run: node scripts/audit-production-real.mjs

      - name: Commit current audit report and restored colors
        shell: bash
        run: |
          set -euo pipefail
          if test -z "$(git status --porcelain -- audit/production-real-audit.json audit/production-real-audit.md src/components/public/AdvertisingPage.tsx src/components/admin/AdvertisingAdminModule.tsx src/pages/AdvertiserPortal.tsx)"; then
            echo 'Relatório e identidade visual sem mudanças.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/production-real-audit.json audit/production-real-audit.md src/components/public/AdvertisingPage.tsx src/components/admin/AdvertisingAdminModule.tsx src/pages/AdvertiserPortal.tsx
          git diff --cached --check
          git commit -m 'Restaurar cores originais do GSA Anúncios e atualizar auditoria'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Enforce explicit production blockers
        run: node scripts/audit-production-real.mjs --enforce
