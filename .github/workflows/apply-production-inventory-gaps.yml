name: Apply Production Inventory Gaps

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Digite FECHAR_INVENTARIO_PRODUCAO para autorizar a correção
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: apply-production-inventory-gaps
  cancel-in-progress: false

env:
  EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
  SUPABASE_CLI_VERSION: 2.101.0

jobs:
  apply-and-verify:
    name: Aplicar e verificar lacunas do inventário
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    env:
      CONFIRMATION: ${{ inputs.confirmation }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@v4

      - name: Validate explicit production authorization
        shell: bash
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'FECHAR_INVENTARIO_PRODUCAO'
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_DB_URL"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link exact production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Inspect migration history before correction
        shell: bash
        run: |
          set -o pipefail
          supabase migration list --linked 2>&1 | tee inventory-migrations-before.log

      - name: Verify advertising aliases before registration
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/verify-advertising-aliases.sql <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.gsa_advertisers') IS NULL
               OR to_regclass('public.gsa_ad_campaigns') IS NULL
               OR to_regprocedure('public.gsa_ads_serve(text,text,text,text,text)') IS NULL
               OR to_regprocedure('public.gsa_ads_record_event(text,text,text,text,text,text)') IS NULL THEN
              RAISE EXCEPTION 'A plataforma de publicidade não está completa para registrar as versões renumeradas.';
            END IF;
          END $$;
          SELECT 'ADVERTISING_RENUMBERED_MIGRATIONS_VERIFIED' AS result;
          SQL
          supabase db query --linked --file /tmp/verify-advertising-aliases.sql 2>&1 | tee advertising-aliases-verification.log

      - name: Apply supplier and service catalog migrations idempotently
        shell: bash
        run: |
          set -euo pipefail
          apply_if_missing() {
            version="$1"
            file="$2"
            log="$3"
            if awk -F'|' -v wanted="$version" '{ remote=$2; gsub(/[^0-9]/, "", remote); if (remote == wanted) found=1 } END { exit found ? 0 : 1 }' inventory-migrations-before.log; then
              echo "Migration ${version} já registrada; SQL não reaplicado." | tee "$log"
            else
              supabase db query --linked --file "$file" 2>&1 | tee "$log"
            fi
          }

          apply_if_missing 20260722020000 supabase/migrations/20260722020000_supplier_procurement_foundation.sql supplier-foundation-apply.log
          apply_if_missing 20260722021000 supabase/migrations/20260722021000_supplier_auth_and_onboarding.sql supplier-auth-apply.log
          apply_if_missing 20260722022000 supabase/migrations/20260722022000_supplier_procurement_operations.sql supplier-operations-apply.log
          apply_if_missing 20260722030000 supabase/migrations/20260722030000_service_catalog_packages.sql service-catalog-apply.log
          apply_if_missing 20260722190000 supabase/migrations/20260722190000_close_production_inventory_gaps.sql inventory-gaps-apply.log

      - name: Verify all required RPCs and RLS before history repair
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/verify-production-inventory-gaps.sql <<'SQL'
          DO $$
          DECLARE
            v_function text;
            v_table text;
          BEGIN
            FOREACH v_function IN ARRAY ARRAY[
              'gsa_admin_affiliate_snapshot',
              'gsa_admin_create_supplier_order',
              'gsa_admin_decide_affiliate_payout',
              'gsa_admin_review_supplier_delivery',
              'gsa_admin_review_supplier_product',
              'gsa_admin_set_affiliate_status',
              'gsa_admin_supplier_set_status',
              'gsa_admin_supplier_snapshot',
              'gsa_admin_update_affiliate_program',
              'gsa_admin_update_supplier_payable',
              'gsa_client_affiliate_snapshot',
              'gsa_client_cancel_affiliate_payout',
              'gsa_client_create_affiliate_link',
              'gsa_client_create_service_quote',
              'gsa_client_join_affiliate',
              'gsa_client_request_affiliate_payout',
              'gsa_client_service_catalog',
              'gsa_client_update_affiliate_profile',
              'gsa_public_register_supplier',
              'gsa_supplier_dashboard_snapshot',
              'gsa_supplier_mark_order_seen',
              'gsa_supplier_request_product',
              'gsa_supplier_session_access_state',
              'gsa_supplier_submit_delivery'
            ] LOOP
              IF NOT EXISTS (
                SELECT 1 FROM pg_proc p
                JOIN pg_namespace n ON n.oid = p.pronamespace
                WHERE n.nspname = 'public' AND p.proname = v_function
              ) THEN
                RAISE EXCEPTION 'RPC obrigatória ausente: %', v_function;
              END IF;
            END LOOP;

            FOREACH v_table IN ARRAY ARRAY[
              'gsa_ad_maintenance_state',
              'gsa_ad_rate_limit_buckets',
              'gsa_afiliado_atribuicoes',
              'gsa_afiliado_cliques',
              'gsa_afiliado_comissao_eventos',
              'gsa_afiliado_comissoes',
              'gsa_afiliado_conversoes',
              'gsa_afiliado_links',
              'gsa_afiliado_programas',
              'gsa_afiliado_saques',
              'gsa_afiliados',
              'loja_carrinhos',
              'produtos_fornecedores_config',
              'promocoes_quantidade_ativadas'
            ] LOOP
              IF to_regclass(format('public.%I', v_table)) IS NULL THEN
                RAISE EXCEPTION 'Tabela obrigatória ausente: %', v_table;
              END IF;
              IF NOT EXISTS (
                SELECT 1 FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
                WHERE n.nspname = 'public' AND c.relname = v_table AND c.relrowsecurity
              ) THEN
                RAISE EXCEPTION 'RLS não habilitado em %', v_table;
              END IF;
            END LOOP;

            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE schemaname='public' AND tablename='loja_carrinhos' AND policyname='gsa_client_cart_select') THEN
              RAISE EXCEPTION 'Política de leitura do carrinho ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE schemaname='public' AND tablename='promocoes_quantidade_ativadas' AND policyname='gsa_client_quantity_promotions_select') THEN
              RAISE EXCEPTION 'Política de promoções do cliente ausente';
            END IF;
          END $$;
          SELECT 'PRODUCTION_INVENTORY_GAPS_VERIFIED' AS result;
          SQL
          supabase db query --linked --file /tmp/verify-production-inventory-gaps.sql 2>&1 | tee inventory-gaps-verification.log

      - name: Register only verified migration versions
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee inventory-migrations-pre-repair.log
          for version in \
            20260721210100 \
            20260721223100 \
            20260722020000 \
            20260722021000 \
            20260722022000 \
            20260722030000 \
            20260722190000
          do
            if ! awk -F'|' -v wanted="$version" '{ remote=$2; gsub(/[^0-9]/, "", remote); if (remote == wanted) found=1 } END { exit found ? 0 : 1 }' inventory-migrations-pre-repair.log; then
              supabase migration repair --linked --status applied "$version" 2>&1 | tee -a inventory-migrations-repair.log
            fi
          done

      - name: Verify final migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee inventory-migrations-after.log
          for version in 20260721210100 20260721223100 20260722020000 20260722021000 20260722022000 20260722030000 20260722190000
          do
            awk -F'|' -v wanted="$version" '{ remote=$2; gsub(/[^0-9]/, "", remote); if (remote == wanted) found=1 } END { exit found ? 0 : 1 }' inventory-migrations-after.log
          done

      - name: Run independent production inventory
        run: npm run test:database-inventory 2>&1 | tee final-database-inventory.log

      - name: Upload non-sensitive evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-inventory-gaps-${{ github.run_id }}
          path: |
            inventory-migrations-before.log
            advertising-aliases-verification.log
            supplier-*-apply.log
            service-catalog-apply.log
            inventory-gaps-apply.log
            inventory-gaps-verification.log
            inventory-migrations-pre-repair.log
            inventory-migrations-repair.log
            inventory-migrations-after.log
            final-database-inventory.log
            audit/database-inventory.json
            audit/database-inventory.md
          retention-days: 30
          if-no-files-found: ignore
