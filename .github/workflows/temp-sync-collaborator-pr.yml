name: Temporary sync collaborator PR

on:
  pull_request_target:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/corrigir-painel-colaborador' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collaborator branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-colaborador
          fetch-depth: 0

      - name: Attempt rebase on current main
        id: rebase
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main > rebase-output.txt 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            git diff --name-only --diff-filter=U > rebase-conflicts.txt
            git status --short > rebase-status.txt
            git rebase --abort
          fi
          exit 0

      - name: Upload conflict diagnostic
        if: steps.rebase.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: collaborator-rebase-diagnostic
          path: |
            rebase-output.txt
            rebase-conflicts.txt
            rebase-status.txt
          retention-days: 1

      - name: Publish rebased branch
        if: steps.rebase.outputs.status == '0'
        run: git push --force-with-lease origin HEAD:agent/corrigir-painel-colaborador

      - name: Fail when conflicts exist
        if: steps.rebase.outputs.status != '0'
        run: exit 1
