name: Deploy Provider Audit Production

on:
  push:
    branches: [ops/deploy-provider-audit-production]
    paths: ['.provider-audit-production-trigger']

permissions:
  contents: write

concurrency:
  group: deploy-provider-audit-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      EXPECTED_SOURCE_SHA: 308657f13abf433a2ceb66c9f6583295d703523e
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate authorization and source
        shell: bash
        run: |
          set -euo pipefail
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          grep -Fqx 'APPLY_PROVIDER_AUDIT_20260720' .provider-audit-production-trigger
          git fetch origin agent/harden-provider-portal-audit
          test "$(git rev-parse FETCH_HEAD)" = "$EXPECTED_SOURCE_SHA"
          for version in 20260720233000 20260720233100 20260720233200; do
            git show "FETCH_HEAD:supabase/migrations/${version}_$(case "$version" in 20260720233000) echo provider_portal_audit_hardening;; 20260720233100) echo provider_portal_secure_snapshots;; *) echo provider_portal_final_guards;; esac).sql" > "/tmp/${version}.sql"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Build transactional bundles
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'BEGIN;'
            for version in 20260720233000 20260720233100 20260720233200; do
              sed '/^[[:space:]]*BEGIN;[[:space:]]*$/d; /^[[:space:]]*COMMIT;[[:space:]]*$/d' "/tmp/${version}.sql"
            done
            echo 'ROLLBACK;'
          } > /tmp/provider-audit-preview.sql
          sed 's/^ROLLBACK;$/COMMIT;/' /tmp/provider-audit-preview.sql > /tmp/provider-audit-production.sql

      - name: Validate migrations with rollback
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file /tmp/provider-audit-preview.sql 2>&1 | tee provider-audit-preview.log

      - name: Apply migrations atomically
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file /tmp/provider-audit-production.sql 2>&1 | tee provider-audit-deployment.log

      - name: Register migration history
        shell: bash
        run: |
          set -o pipefail
          supabase migration repair 20260720233000 20260720233100 20260720233200 --status applied --linked 2>&1 | tee provider-audit-history.log

      - name: Verify definitive deployment
        shell: bash
        run: |
          cat > /tmp/provider-audit-verify.sql <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.gsa_provider_audit_events') IS NULL THEN
              RAISE EXCEPTION 'Tabela de auditoria do prestador ausente';
            END IF;
            IF to_regprocedure('public.gsa_provider_context(boolean)') IS NULL
               OR to_regprocedure('public.gsa_provider_dashboard_snapshot()') IS NULL
               OR to_regprocedure('public.gsa_provider_pendency_snapshot()') IS NULL
               OR to_regprocedure('public.gsa_provider_create_ticket(text,text,boolean)') IS NULL
               OR to_regprocedure('public.gsa_provider_send_ticket_message(uuid,text,text,text)') IS NULL
               OR to_regprocedure('public.gsa_provider_request_demand_support(uuid,text)') IS NULL THEN
              RAISE EXCEPTION 'Uma ou mais RPCs seguras do prestador estão ausentes';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_guard_provider_direct_prestadores' AND NOT tgisinternal
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_guard_provider_schedule' AND NOT tgisinternal
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_gsa_revoke_provider_sessions_update' AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'Triggers obrigatórios do prestador estão ausentes';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname = 'public' AND p.proname = 'gsa_provider_dashboard_snapshot' AND p.provolatile = 'v'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname = 'public' AND p.proname = 'gsa_provider_pendency_snapshot' AND p.provolatile = 'v'
            ) THEN
              RAISE EXCEPTION 'Snapshots do prestador não estão VOLATILE';
            END IF;
            IF position('sistema_sessoes' in pg_get_functiondef('public.gsa_provider_context(boolean)'::regprocedure)) = 0 THEN
              RAISE EXCEPTION 'Validação da sessão GSA não foi instalada';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'storage' AND tablename = 'objects'
                AND policyname = 'provider_private_files_select'
            ) THEN
              RAISE EXCEPTION 'Política privada do prestador ausente';
            END IF;
          END $$;

          SELECT version
          FROM supabase_migrations.schema_migrations
          WHERE version IN ('20260720233000', '20260720233100', '20260720233200')
          ORDER BY version;
          SQL
          set -o pipefail
          supabase db query --linked --file /tmp/provider-audit-verify.sql 2>&1 | tee provider-audit-verification.log
          grep -q '20260720233000' provider-audit-verification.log
          grep -q '20260720233100' provider-audit-verification.log
          grep -q '20260720233200' provider-audit-verification.log

      - name: Record production success
        run: |
          printf 'SUCCESS\nproject=%s\nsource=%s\nrun=%s\nmigrations=20260720233000,20260720233100,20260720233200\n' "$SUPABASE_PROJECT_ID" "$EXPECTED_SOURCE_SHA" "$GITHUB_RUN_ID" > .provider-audit-production-success
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .provider-audit-production-success
          git commit -m 'Registrar implantação definitiva do Painel do Prestador'
          git push

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-audit-production-evidence
          path: |
            provider-audit-preview.log
            provider-audit-deployment.log
            provider-audit-history.log
            provider-audit-verification.log
          if-no-files-found: ignore
          retention-days: 30
