name: Diagnose Production Database Backup Once

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-production-database-backup-once.yml
      - scripts/backup-database.sh
      - scripts/test-database-restore.sh

permissions:
  contents: write

jobs:
  diagnose:
    name: Diagnosticar restauração após extensões
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and PostgreSQL client
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create temporary production backup
        id: backup
        shell: bash
        run: |
          set +e
          bash scripts/backup-database.sh "$RUNNER_TEMP/gsa-restore-diagnostic" \
            >/tmp/backup-diagnostic-output.log \
            2>/tmp/backup-diagnostic-error.log
          code=$?
          backup_dir="$(sed -n 's/^DATABASE_BACKUP_OK=//p' /tmp/backup-diagnostic-output.log | tail -n 1)"
          printf '%s' "$code" >/tmp/backup-exit-code
          printf '%s' "$backup_dir" >/tmp/backup-directory
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "backup_dir=$backup_dir" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Exercise isolated database restore
        id: restore
        shell: bash
        run: |
          set +e
          backup_exit="$(cat /tmp/backup-exit-code 2>/dev/null || echo 99)"
          backup_dir="$(cat /tmp/backup-directory 2>/dev/null || true)"
          restore_code=99
          if [[ "$backup_exit" == "0" && -n "$backup_dir" && -f "$backup_dir/database.dump" ]]; then
            RESTORE_TEST_SCHEMAS=public,supabase_migrations \
              bash scripts/test-database-restore.sh "$backup_dir/database.dump" \
              >/tmp/restore-diagnostic-output.log \
              2>/tmp/restore-diagnostic-error.log
            restore_code=$?
          else
            printf 'Backup indisponível para restauração\n' >/tmp/restore-diagnostic-error.log
            : >/tmp/restore-diagnostic-output.log
          fi
          printf '%s' "$restore_code" >/tmp/restore-exit-code
          echo "exit_code=$restore_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build redacted diagnostic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          BACKUP_EXIT="$(cat /tmp/backup-exit-code 2>/dev/null || echo 99)" \
          RESTORE_EXIT="$(cat /tmp/restore-exit-code 2>/dev/null || echo 99)" \
          BACKUP_DIR="$(cat /tmp/backup-directory 2>/dev/null || true)" \
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const read = async (file) => {
            try { return await fs.readFile(file, 'utf8'); } catch { return ''; }
          };
          const backupError = await read('/tmp/backup-diagnostic-error.log');
          const restoreError = await read('/tmp/restore-diagnostic-error.log');
          const restoreOutput = await read('/tmp/restore-diagnostic-output.log');
          const combined = `${restoreError}\n${restoreOutput}`;

          const flags = {
            role_missing: /role ["']?[^"'\s]+["']? does not exist/i.test(combined),
            schema_missing: /schema ["']?[^"']+["']? does not exist/i.test(combined),
            relation_missing: /relation ["']?[^"']+["']? does not exist/i.test(combined),
            extension_missing: /extension ["']?[^"']+["']? is not available|could not open extension control file/i.test(combined),
            type_missing: /type ["']?[^"']+["']? does not exist/i.test(combined),
            function_missing: /function ["']?[^"']+["']? does not exist/i.test(combined),
            language_missing: /language ["']?[^"']+["']? does not exist/i.test(combined),
            unsupported_dump_version: /unsupported version|version mismatch/i.test(combined),
            duplicate_object: /already exists|duplicate object/i.test(combined),
            permission_denied: /permission denied/i.test(combined),
            copy_failure: /COPY failed|error while processing data for table/i.test(combined),
            not_null_failure: /null value in column|not-null constraint/i.test(combined),
            foreign_key_failure: /foreign key|violates foreign key constraint/i.test(combined),
            check_constraint_failure: /check constraint|violates check constraint/i.test(combined),
            syntax_error: /syntax error/i.test(combined),
            docker_failure: /docker:|container.*not|daemon/i.test(combined),
            function_body_failure: /check_function_bodies|error during inlining|cannot change name of input parameter/i.test(combined),
            invalid_configuration: /unrecognized configuration parameter|invalid value for parameter/i.test(combined),
            database_connection_failure: /could not connect|connection.*failed|timeout/i.test(combined),
          };
          const classification = Object.entries(flags).find(([, value]) => value)?.[0]
            || (Number(process.env.RESTORE_EXIT) === 0 ? 'success' : 'unknown');

          const extract = (regex) => combined.match(regex)?.[1] || '';
          let manifest = null;
          if (process.env.BACKUP_DIR) {
            try {
              manifest = JSON.parse(await fs.readFile(path.join(process.env.BACKUP_DIR, 'manifest.json'), 'utf8'));
            } catch {}
          }

          const evidence = {
            generated_at_utc: new Date().toISOString(),
            backup_exit_code: Number(process.env.BACKUP_EXIT),
            backup_error_bytes: Buffer.byteLength(backupError),
            backup_error_sha256: crypto.createHash('sha256').update(backupError).digest('hex'),
            backup_manifest: manifest ? {
              server_major: manifest.server_major,
              client_source: manifest.client_source,
              database_bytes: manifest.database_bytes,
              schema_bytes: manifest.schema_bytes,
            } : null,
            restore_exit_code: Number(process.env.RESTORE_EXIT),
            classification,
            flags,
            missing_role: extract(/role ["']?([^"'\s]+)["']? does not exist/i),
            missing_schema: extract(/schema ["']?([^"']+)["']? does not exist/i),
            missing_relation: extract(/relation ["']?([^"']+)["']? does not exist/i),
            missing_extension: extract(/extension ["']?([^"']+)["']? (?:is not available|could not be opened)/i),
            missing_type: extract(/type ["']?([^"']+)["']? does not exist/i),
            missing_function: extract(/function ["']?([^"']+)["']? does not exist/i),
            missing_language: extract(/language ["']?([^"']+)["']? does not exist/i),
            restore_error_bytes: Buffer.byteLength(combined),
            restore_error_sha256: crypto.createHash('sha256').update(combined).digest('hex'),
          };

          const serialized = `${JSON.stringify(evidence, null, 2)}\n`;
          await fs.writeFile('/tmp/production-database-restore-diagnostic.json', serialized);
          await fs.writeFile('deployment-status/production-database-restore-diagnostic.json', serialized);
          NODE

      - name: Publish diagnostic evidence even after failure
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f /tmp/production-database-restore-diagnostic.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          published=false
          for attempt in $(seq 1 10); do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p deployment-status
            cp /tmp/production-database-restore-diagnostic.json \
              deployment-status/production-database-restore-diagnostic.json
            git add deployment-status/production-database-restore-diagnostic.json
            git commit -m "Registrar diagnóstico seguro da restauração do banco" || true
            if git push origin HEAD:main; then
              published=true
              break
            fi
            sleep 5
          done
          test "$published" = true
