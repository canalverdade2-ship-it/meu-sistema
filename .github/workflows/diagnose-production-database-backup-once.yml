name: Diagnose Production Database Backup Once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-production-database-backup-once.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Diagnose without exposing credentials
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p deployment-status
          server_version="$(psql "$SUPABASE_DB_URL" -Atc 'SHOW server_version' 2>/tmp/psql-error.log || true)"
          server_version_num="$(psql "$SUPABASE_DB_URL" -Atc 'SHOW server_version_num' 2>/tmp/psql-num-error.log || true)"
          client_version="$(pg_dump --version | sed 's/^pg_dump (PostgreSQL) //')"

          set +e
          pg_dump "$SUPABASE_DB_URL" --schema-only --no-owner --no-acl --file=/tmp/schema-test.sql 2>/tmp/pg-dump-error.log
          exit_code=$?
          set -e

          classification="unknown"
          if [[ "$exit_code" -eq 0 ]]; then
            classification="success"
          elif grep -qi 'server version.*pg_dump version' /tmp/pg-dump-error.log; then
            classification="client_server_version_mismatch"
          elif grep -qi 'permission denied' /tmp/pg-dump-error.log; then
            classification="permission_denied"
          elif grep -Eqi 'could not connect|connection.*failed|timeout|network' /tmp/pg-dump-error.log; then
            classification="connection_failure"
          elif grep -qi 'unsupported version' /tmp/pg-dump-error.log; then
            classification="unsupported_version"
          elif grep -qi 'unrecognized option' /tmp/pg-dump-error.log; then
            classification="unsupported_client_option"
          fi

          client_major="$(sed -E 's/^([0-9]+).*/\1/' <<< "$client_version")"
          server_major=""
          if [[ "$server_version_num" =~ ^[0-9]+$ ]]; then
            server_major="$((server_version_num / 10000))"
          fi

          cat > deployment-status/production-database-backup-diagnostic.json <<JSON
          {
            "generated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "server_version": "$server_version",
            "server_major": "${server_major}",
            "pg_dump_version": "$client_version",
            "pg_dump_major": "${client_major}",
            "schema_dump_exit_code": $exit_code,
            "classification": "$classification",
            "docker_available": $(command -v docker >/dev/null 2>&1 && echo true || echo false)
          }
          JSON

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deployment-status/production-database-backup-diagnostic.json
          git commit -m "Registrar diagnóstico do backup do banco"
          git pull --rebase origin main
          git push origin HEAD:main
