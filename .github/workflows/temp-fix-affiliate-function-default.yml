name: Temporary Fix Affiliate Function Default

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/temp-fix-affiliate-function-default.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Preserve existing PostgreSQL parameter default
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('supabase/migrations/20260722233000_complete_affiliate_flow.sql'),
              Path('supabase/migrations/20260722233200_secure_affiliate_activation.sql'),
          ]
          before = 'CREATE OR REPLACE FUNCTION public.gsa_public_register_affiliate(p_payload jsonb)'
          after = "CREATE OR REPLACE FUNCTION public.gsa_public_register_affiliate(p_payload jsonb DEFAULT '{}'::jsonb)"

          for path in files:
              content = path.read_text(encoding='utf-8')
              if before not in content:
                  raise SystemExit(f'Assinatura esperada ausente em {path}')
              path.write_text(content.replace(before, after, 1), encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/migrations/20260722233000_complete_affiliate_flow.sql supabase/migrations/20260722233200_secure_affiliate_activation.sql
          git commit -m 'Preservar default da funcao publica de afiliados'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
