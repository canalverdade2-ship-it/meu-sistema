name: Reconciliar correcoes com main

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

concurrency:
  group: reconcile-corrections-with-main
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch de correcoes
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Incorporar main atual preservando correcoes em conflitos
        shell: bash
        run: |
          git fetch origin main
          git merge -X ours --no-edit origin/main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependencias
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Validar build completo
        run: npm run build

      - name: Publicar reconciliacao validada
        run: git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
