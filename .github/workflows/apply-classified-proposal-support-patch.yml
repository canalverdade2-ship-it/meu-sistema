name: Apply Classified Proposal Support Patch

on:
  push:
    branches: [agent/fechar-auditoria-final-home]
    paths:
      - 'scripts/apply-classified-proposal-support-patch.mjs'
      - '.github/workflows/apply-classified-proposal-support-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fechar-auditoria-final-home
          fetch-depth: 0

      - name: Apply verified patch
        run: node scripts/apply-classified-proposal-support-patch.mjs

      - name: Remove temporary executor
        run: |
          rm scripts/apply-classified-proposal-support-patch.mjs
          rm .github/workflows/apply-classified-proposal-support-patch.yml

      - name: Commit operational proposal flow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/client/marketplace/classifieds/ClassifiedDetailPage.tsx scripts/apply-classified-proposal-support-patch.mjs .github/workflows/apply-classified-proposal-support-patch.yml
          git commit -m 'Direcionar propostas dos classificados ao suporte mediado'
          git push origin HEAD:agent/fechar-auditoria-final-home
