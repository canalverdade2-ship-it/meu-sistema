name: Deploy GSA Viagens Installments

on:
  push:
    branches: [ops/deploy-gsa-viagens-parcelamento-production]
    paths:
      - '.github/workflows/deploy-gsa-viagens-parcelamento-production.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-gsa-viagens-parcelamento-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ops/deploy-gsa-viagens-parcelamento-production

      - name: Validar autorização de produção
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Vincular projeto autorizado
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Montar implantação atômica
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'BEGIN;'
            cat supabase/migrations/20260720230000_gsa_viagens_parcelamento_checkout.sql
            cat scripts/gsa-viagens-parcelamento-verify.sql
            echo 'COMMIT;'
          } > gsa-viagens-parcelamento-production.sql

      - name: Aplicar migração e auditoria atomicamente
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked \
            --file gsa-viagens-parcelamento-production.sql \
            2>&1 | tee deployment.log

      - name: Confirmar estado persistido
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked \
            --file scripts/gsa-viagens-parcelamento-verify.sql \
            2>&1 | tee verification.log

      - name: Publicar relatório da implantação
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch deployment.log verification.log
          {
            echo '# Implantação do parcelamento do GSA Viagens'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Resultado: **$JOB_STATUS**"
            echo
            echo '## Aplicação atômica'
            echo '```text'
            sed -n '1,260p' deployment.log
            echo '```'
            echo
            echo '## Verificação persistida'
            echo '```text'
            sed -n '1,260p' verification.log
            echo '```'
          } > deployment-report.md

          gh issue create \
            --title "Deploy parcelamento GSA Viagens - $JOB_STATUS" \
            --body-file deployment-report.md
