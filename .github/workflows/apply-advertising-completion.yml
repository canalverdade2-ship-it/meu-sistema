name: Apply Advertising Completion

on:
  push:
    branches:
      - agent/implantar-modulo-anuncios
    paths:
      - '.apply-advertising-completion-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implantar-modulo-anuncios
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Synchronize current main
        run: |
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply verified completion patch
        run: python3 scripts/apply-advertising-completion.py

      - name: Install dependencies
        run: npm ci

      - name: Validate integrated completion
        run: |
          npx tsc --noEmit
          npm run test:advertising
          npm run test:advertising-complete
          deno check supabase/functions/gsa-advertiser-admin/index.ts
          deno check supabase/functions/gsa-ad-delivery/index.ts
          deno check supabase/functions/gsa-advertising-webhook/index.ts
          deno check supabase/functions/gsa-advertising-scheduler/index.ts
          deno test --allow-env supabase/functions/gsa-advertiser-admin/index_test.ts
          deno test --allow-env supabase/functions/gsa-ad-delivery/index_test.ts
          deno test --allow-env supabase/functions/gsa-advertising-webhook/index_test.ts
          deno test --allow-env supabase/functions/gsa-advertising-scheduler/index_test.ts
          npm run build

      - name: Remove temporary integrator
        run: rm -f scripts/apply-advertising-completion.py .github/workflows/apply-advertising-completion.yml .apply-advertising-completion-trigger

      - name: Commit integrated completion
        run: |
          git add -A
          git commit -m 'Completar plataforma GSA Anúncios'
          git push origin HEAD:agent/implantar-modulo-anuncios
