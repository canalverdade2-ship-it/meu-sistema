name: Dependency Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/dependency-security.yml
  schedule:
    - cron: '17 8 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
