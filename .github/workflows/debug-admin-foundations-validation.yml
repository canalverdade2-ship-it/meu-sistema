name: Debug Admin Foundations Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/debug-admin-foundations-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-admin-snapshot-production

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Administrative PostgreSQL runtime with complete log
        id: runtime
        shell: bash
        run: |
          set -o pipefail
          node scripts/run-admin-migrations-runtime.cjs 2>&1 | tee admin-runtime.log

      - name: Upload administrative runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-runtime-${{ github.run_id }}
          path: admin-runtime.log
          retention-days: 7
