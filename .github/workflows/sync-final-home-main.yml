name: Sync Final Home Main

on:
  push:
    branches: [agent/fechar-auditoria-final-home]
    paths:
      - '.github/workflows/sync-final-home-main.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fechar-auditoria-final-home
          fetch-depth: 0

      - name: Merge current main
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            echo "$unresolved"
            exit 1
          fi
          rm .github/workflows/sync-final-home-main.yml
          git add -A
          git commit -m 'Sincronizar registros finais da main'
          git push origin HEAD:agent/fechar-auditoria-final-home
