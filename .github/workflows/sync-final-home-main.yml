name: Sync Final Home Main

on:
  push:
    branches: [agent/fechar-auditoria-final-home]
    paths:
      - '.github/workflows/sync-final-home-main.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fechar-auditoria-final-home
          fetch-depth: 0

      - name: Merge current main with explicit resolutions
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          set -e

          # A main já contém propostas reais e a auditoria global oficial.
          for path in \
            package.json \
            scripts/audit-production-real.mjs \
            scripts/check-classifieds-production-contracts.ts \
            src/components/client/marketplace/classifieds/ClassifiedDetailPage.tsx
          do
            git checkout --theirs -- "$path" 2>/dev/null || true
            git add "$path" 2>/dev/null || true
          done

          # A implementação antiga da Home continua removida por esta PR.
          git rm -f src/components/public/GSAEnterpriseHome.tsx 2>/dev/null || true

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            echo "Conflitos inesperados:"
            echo "$unresolved"
            exit 1
          fi

          rm .github/workflows/sync-final-home-main.yml
          git add -A
          git commit -m 'Incorporar propostas reais e auditoria atual da main'
          git push origin HEAD:agent/fechar-auditoria-final-home
