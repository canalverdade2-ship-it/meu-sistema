name: Sync Admin Audit Current Main

on:
  push:
    branches: [agent/corrigir-auditoria-painel-adm]
    paths: ['.sync-admin-audit-current-main-trigger']

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-admin-audit-current-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Validate trigger
        run: grep -Fqx 'SYNC_ADMIN_AUDIT_CURRENT_MAIN_V2' .sync-admin-audit-current-main-trigger
      - name: Merge current main preserving newer shared security files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge origin/main --no-edit > merge.log 2>&1
          merge_code=$?
          set -e
          if [ "$merge_code" -ne 0 ]; then
            git diff --name-only --diff-filter=U | sort > conflicts.log
            printf '%s\n' \
              scripts/check-admin-panel-contracts.ts \
              src/App.tsx \
              src/components/admin/AcessosModule.tsx \
              src/lib/sessionService.ts \
              src/pages/AdminPanel.tsx \
              src/routing/adminAccess.ts | sort > expected.log
            diff -u expected.log conflicts.log
            git checkout --theirs \
              scripts/check-admin-panel-contracts.ts \
              src/App.tsx \
              src/components/admin/AcessosModule.tsx \
              src/lib/sessionService.ts \
              src/pages/AdminPanel.tsx \
              src/routing/adminAccess.ts
            git add \
              scripts/check-admin-panel-contracts.ts \
              src/App.tsx \
              src/components/admin/AcessosModule.tsx \
              src/lib/sessionService.ts \
              src/pages/AdminPanel.tsx \
              src/routing/adminAccess.ts
            git commit --no-edit
          fi
      - name: Remove temporary executor
        run: |
          git rm .github/workflows/sync-admin-audit-current-main.yml .sync-admin-audit-current-main-trigger
          git commit -m 'Remover sincronização temporária do Painel Administrativo'
      - name: Install dependencies
        run: npm ci
      - name: Validate final branch
        run: |
          npm run lint
          npm run test:admin
          npm run test:client-security
          npm run test:provider
          npm run test:travel
          npm run build
      - name: Push final branch
        run: git push origin HEAD:agent/corrigir-auditoria-painel-adm
