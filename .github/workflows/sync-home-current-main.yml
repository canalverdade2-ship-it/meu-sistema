name: Sync Home Current Main

on:
  push:
    branches: [agent/corrigir-home-itens-2-a-10]
    paths: ['.sync-home-current-main-trigger']

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-home-current-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Validate trigger
        run: grep -Fqx 'SYNC_HOME_CURRENT_MAIN_V3' .sync-home-current-main-trigger
      - name: Merge current main and resolve reviewed overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge origin/main --no-edit > merge.log 2>&1
          merge_code=$?
          set -e
          if [ "$merge_code" -ne 0 ]; then
            git diff --name-only --diff-filter=U | sort > conflicts.log
            printf '%s\n' src/App.tsx src/components/auth/RestrictedAccessModal.tsx | sort > expected.log
            diff -u expected.log conflicts.log
            git checkout --theirs src/App.tsx
            git checkout --ours src/components/auth/RestrictedAccessModal.tsx
            python scripts/resolve-home-current-main.py
            git add src/App.tsx src/components/auth/RestrictedAccessModal.tsx
            git commit --no-edit
          fi
      - name: Remove temporary executor
        run: |
          git rm .github/workflows/sync-home-current-main.yml .sync-home-current-main-trigger scripts/resolve-home-current-main.py
          git commit -m 'Remover sincronização temporária da Home'
      - name: Install dependencies
        run: npm ci
      - name: Validate final branch
        run: |
          npm run lint
          npm run test:admin
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel
          npm run build
      - name: Push final branch
        run: git push origin HEAD:agent/corrigir-home-itens-2-a-10
      - name: Publish diagnostic
        if: failure()
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          { echo '## Falha na integração resolvida da Home'; echo; echo "Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"; echo '```text'; test -f merge.log && cat merge.log || true; echo '```'; } > failure.md
          gh issue create --title 'Falha na validação final da Home' --body-file failure.md
