name: Sync Home Current Main

on:
  push:
    branches: [agent/corrigir-home-itens-2-a-10]
    paths: ['.sync-home-current-main-trigger']

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-home-current-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Validate trigger
        run: grep -Fqx 'SYNC_HOME_CURRENT_MAIN_V7' .sync-home-current-main-trigger
      - name: Merge current main and resolve reviewed overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge origin/main --no-edit > merge.log 2>&1
          merge_code=$?
          set -e
          if [ "$merge_code" -ne 0 ]; then
            git diff --name-only --diff-filter=U | sort > conflicts.log
            printf '%s\n' scripts/check-admin-panel-contracts.ts src/App.tsx src/components/auth/RestrictedAccessModal.tsx | sort > expected.log
            diff -u expected.log conflicts.log
            git checkout --theirs src/App.tsx
            git checkout --ours scripts/check-admin-panel-contracts.ts src/components/auth/RestrictedAccessModal.tsx
            python scripts/resolve-home-current-main.py
            git add scripts/check-admin-panel-contracts.ts src/App.tsx src/components/auth/RestrictedAccessModal.tsx
            git commit --no-edit
          fi
      - name: Remove temporary executor locally
        run: |
          git rm .github/workflows/sync-home-current-main.yml .sync-home-current-main-trigger scripts/resolve-home-current-main.py
          git commit -m 'Remover sincronização temporária da Home'
      - name: Install dependencies
        run: npm ci
      - name: Validate final branch with diagnostics
        id: validation
        shell: bash
        run: |
          set +e
          : > validation.log
          failed=0
          for command in \
            'npm run lint' \
            'npm run test:admin' \
            'npm run test:client-security' \
            'npm run test:provider' \
            'npm run test:home' \
            'npm run test:travel' \
            'npm run build'; do
            echo "===== $command =====" | tee -a validation.log
            bash -lc "$command" 2>&1 | tee -a validation.log
            code=${PIPESTATUS[0]}
            echo "exit_code=$code" | tee -a validation.log
            if [ "$code" -ne 0 ]; then failed=1; break; fi
          done
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish validation failure
        if: steps.validation.outputs.failed == '1'
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          { echo '## Falha detalhada na validação final da Home'; echo; echo "Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"; echo '```text'; tail -n 260 validation.log; echo '```'; } > failure.md
          gh issue create --title 'Falha detalhada na validação final da Home' --body-file failure.md
          exit 1
      - name: Push final branch
        if: steps.validation.outputs.failed == '0'
        run: git push origin HEAD:agent/corrigir-home-itens-2-a-10
