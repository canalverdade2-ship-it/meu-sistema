name: Temporary private contract patch

on:
  push:
    branches:
      - agent/corrigir-auditoria-painel-adm

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-painel-adm
          fetch-depth: 0

      - name: Synchronize latest branch
        run: git pull --rebase origin agent/corrigir-auditoria-painel-adm

      - name: Patch private fiscal and loan documents
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const loanPath = 'src/components/admin/EmprestimosModule.tsx';
          let loan = fs.readFileSync(loanPath, 'utf8');

          const importNeedle = "import { sessionService } from '../../lib/sessionService';";
          if (!loan.includes("from '../../lib/privateStorage'")) {
            if (!loan.includes(importNeedle)) throw new Error('Import anchor not found in EmprestimosModule.');
            loan = loan.replace(
              importNeedle,
              `${importNeedle}\nimport { removePrivateDocument, uploadPrivateDocument } from '../../lib/privateStorage';`,
            );
          }

          const newBlock = `  const enviarContrato = async () => {
    if (!contratoFile || !selected) {
      toast.error('Selecione o arquivo do contrato.');
      return;
    }

    let uploadedReference: string | null = null;
    try {
      const uploaded = await uploadPrivateDocument(contratoFile, {
        scope: 'emprestimos',
        ownerId: selected.cliente_id,
        context: 'contratos',
        contextId: selected.id,
      });
      uploadedReference = uploaded.reference;

      const session = getAdminSessionForRpc();
      const { error: rpcError } = await supabase.rpc('gsa_admin_emprestimo_enviar_contrato', {
        p_sessao_id: session.sessaoId,
        p_session_token: session.sessionToken,
        p_emprestimo_id: selected.id,
        p_contrato_url: uploaded.reference,
      });
      if (rpcError) throw rpcError;

      await notificationService.notifyClient(
        selected.cliente_id,
        'Contrato Disponivel',
        'Seu contrato de emprestimo esta disponivel para assinatura.',
        'emprestimos',
        'ativos',
        selected.id,
      );
      toast.success('Contrato enviado com armazenamento privado!');
      await logService.logAction({
        acao: 'ENVIAR_CONTRATO_EMPRESTIMO_PRIVADO',
        detalhes: JSON.stringify({ emprestimo_id: selected.id }),
        ator_tipo: 'admin',
        ator_nome: 'Administrador',
      });

      setContratoFile(null);
      setShowModal(false);
      fetchAll();
    } catch (err: any) {
      if (uploadedReference) {
        await removePrivateDocument(uploadedReference).catch(() => undefined);
      }
      toast.error(err?.message || 'Erro ao registrar contrato.');
    }
  };
`;

          if (!loan.includes("scope: 'emprestimos'")) {
            const start = loan.indexOf('  const enviarContrato = async () => {');
            const end = loan.indexOf('\n  const aprovar = async () => {', start);
            if (start < 0 || end < 0) throw new Error('Contract function markers not found.');
            loan = loan.slice(0, start) + newBlock + loan.slice(end + 1);
          }
          fs.writeFileSync(loanPath, loan);

          const fiscalPath = 'src/components/admin/FiscalModule.tsx';
          let fiscal = fs.readFileSync(fiscalPath, 'utf8');
          fiscal = fiscal.replaceAll(
            "scope: 'fiscal', ownerId: selected.id, context: 'notas-fiscais', contextId: selected.id",
            "scope: 'fiscal', ownerId: selected.cliente_id || selected.id, context: 'notas-fiscais', contextId: selected.id",
          );
          fs.writeFileSync(fiscalPath, fiscal);

          const matches = [];
          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const full = path.join(directory, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (/\.(ts|tsx)$/.test(entry.name)) {
                const lines = fs.readFileSync(full, 'utf8').split(/\r?\n/);
                lines.forEach((line, index) => {
                  if (/contrato_url|contratoUrl/.test(line)) {
                    matches.push(`${full}:${index + 1}: ${line.trim()}`);
                  }
                });
              }
            }
          }
          walk('src');
          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/private-contract-references.txt', `${matches.join('\n')}\n`);
          NODE

      - name: Commit patched files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/EmprestimosModule.tsx src/components/admin/FiscalModule.tsx audit/private-contract-references.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Proteger contratos de empréstimo no armazenamento privado"
          git push origin HEAD:agent/corrigir-auditoria-painel-adm
