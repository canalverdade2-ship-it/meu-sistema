name: Admin Audit Diagnostic

on:
  push:
    branches:
      - agent/corrigir-auditoria-admin-final
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run admin contracts with complete log
        id: admin
        shell: bash
        env:
          PGPASSWORD: postgres
        run: |
          set +e
          npm run test:admin > admin-audit-diagnostic.log 2>&1
          code=$?
          cat admin-audit-diagnostic.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-diagnostic
          path: admin-audit-diagnostic.log
          retention-days: 7
      - name: Report result
        run: test "${{ steps.admin.outputs.exit_code }}" = "0"
