name: Apply GSA Ads Flow Fix

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-gsa-ads-flow-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    name: Corrigir fluxo completo do GSA Anúncios
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar correções auditadas
        id: patch
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply-gsa-ads-flow-fix.py 2>&1 | tee gsa-ads-flow-fix.log

      - name: Instalar dependências
        run: npm ci

      - name: Validar TypeScript e build
        run: |
          npx tsc --noEmit
          npm run build

      - name: Validar contratos de anúncios
        run: |
          npm run test:advertising
          npm run test:advertising-complete

      - name: Publicar correções diretamente na main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/components/public/AdvertisingPage.tsx \
            src/components/admin/AdvertisingAdminModule.tsx \
            src/pages/AdvertiserPortal.tsx \
            src/types/advertising.ts \
            supabase/config.toml \
            supabase/functions/gsa-advertiser-access/index.ts \
            supabase/migrations/20260722235900_fix_gsa_advertising_flow.sql \
            .github/workflows/deploy-advertising-platform.yml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Nenhuma correção pendente para publicar.'
            exit 0
          fi
          git commit -m 'Corrigir fluxo completo do GSA Anúncios'
          git push origin HEAD:main

      - name: Registrar falha para diagnóstico
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit
          cp gsa-ads-flow-fix.log audit/gsa-ads-flow-fix-failure.log 2>/dev/null || echo 'Falha antes da geração do log.' > audit/gsa-ads-flow-fix-failure.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/gsa-ads-flow-fix-failure.log
          git commit -m 'Registrar falha da correção do GSA Anúncios' || exit 0
          git push origin HEAD:main
