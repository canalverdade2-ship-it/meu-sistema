name: Diagnose Admin Snapshot Production

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-admin-snapshot-production.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Inspect repository definitions
        shell: bash
        run: |
          set -o pipefail
          grep -R -n -E 'Snapshot administrativo base não encontrado|gsa_admin_get_pendency_counts_secure|seguros_ofertas_publicas|gsa_admin_dashboard_snapshot' src supabase scripts 2>&1 | tee repository-diagnosis.log || true
          find supabase/migrations -maxdepth 1 -type f -printf '%f\n' | sort | grep -Ei 'seguro|protection' | tee insurance-migrations-local.log || true

      - name: Validate production authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Inspect production object chain
        shell: bash
        run: |
          cat > production-diagnosis.sql <<'SQL'
          SELECT jsonb_pretty(jsonb_build_object(
            'relations', jsonb_build_object(
              'seguros_ofertas_publicas', to_regclass('public.seguros_ofertas_publicas')::text,
              'seguros_produtos', to_regclass('public.seguros_produtos')::text,
              'seguros_parceiros', to_regclass('public.seguros_parceiros')::text,
              'faturas', to_regclass('public.faturas')::text,
              'emprestimos', to_regclass('public.emprestimos')::text,
              'clientes', to_regclass('public.clientes')::text,
              'cliente_promocoes', to_regclass('public.cliente_promocoes')::text,
              'orcamentos', to_regclass('public.orcamentos')::text,
              'tickets', to_regclass('public.tickets')::text
            ),
            'functions', jsonb_build_object(
              'pendency', to_regprocedure('public.gsa_admin_get_pendency_counts_secure(uuid,text)')::text,
              'dashboard', to_regprocedure('public.gsa_admin_dashboard_snapshot(uuid,text)')::text,
              'pre_minimization', to_regprocedure('public.gsa_admin_dashboard_snapshot_pre_minimization(uuid,text)')::text,
              'pre_ticket', to_regprocedure('public.gsa_admin_dashboard_snapshot_pre_ticket_compat(uuid,text)')::text,
              'pendency_base', to_regprocedure('public.get_admin_pendency_counts()')::text
            ),
            'migrations', jsonb_build_object(
              'seguros_20260718121000', EXISTS (SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='20260718121000'),
              'admin_base_20260720183000', EXISTS (SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='20260720183000'),
              'ticket_20260721003500', EXISTS (SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='20260721003500'),
              'minimize_20260721003600', EXISTS (SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='20260721003600')
            ),
            'dashboard_definitions', COALESCE((
              SELECT jsonb_object_agg(p.proname, pg_get_functiondef(p.oid))
                FROM pg_proc p
                JOIN pg_namespace n ON n.oid=p.pronamespace
               WHERE n.nspname='public'
                 AND p.proname IN (
                   'gsa_admin_dashboard_snapshot',
                   'gsa_admin_dashboard_snapshot_pre_minimization',
                   'gsa_admin_dashboard_snapshot_pre_ticket_compat'
                 )
            ), '{}'::jsonb),
            'columns', jsonb_build_object(
              'faturas', COALESCE((SELECT jsonb_agg(column_name ORDER BY ordinal_position) FROM information_schema.columns WHERE table_schema='public' AND table_name='faturas'), '[]'::jsonb),
              'emprestimos', COALESCE((SELECT jsonb_agg(column_name ORDER BY ordinal_position) FROM information_schema.columns WHERE table_schema='public' AND table_name='emprestimos'), '[]'::jsonb),
              'seguros_produtos', COALESCE((SELECT jsonb_agg(column_name ORDER BY ordinal_position) FROM information_schema.columns WHERE table_schema='public' AND table_name='seguros_produtos'), '[]'::jsonb),
              'seguros_parceiros', COALESCE((SELECT jsonb_agg(column_name ORDER BY ordinal_position) FROM information_schema.columns WHERE table_schema='public' AND table_name='seguros_parceiros'), '[]'::jsonb)
            )
          )) AS diagnosis;
          SQL
          set -o pipefail
          supabase db query --linked --file production-diagnosis.sql 2>&1 | tee production-diagnosis.log
          supabase migration list --linked 2>&1 | tee remote-migration-list.log

      - name: Compare insurance migration history
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          remote = Path('remote-migration-list.log').read_text(encoding='utf-8', errors='ignore')
          rows=[]
          for name in Path('insurance-migrations-local.log').read_text().splitlines():
              version=name.split('_',1)[0]
              rows.append(f"{version}\t{'REMOTE' if re.search(r'\b'+re.escape(version)+r'\b', remote) else 'MISSING'}\t{name}")
          Path('insurance-migration-comparison.log').write_text('\n'.join(rows)+'\n')
          print(Path('insurance-migration-comparison.log').read_text())
          PY

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-snapshot-production-diagnosis-${{ github.run_id }}
          path: |
            repository-diagnosis.log
            production-diagnosis.sql
            production-diagnosis.log
            insurance-migrations-local.log
            remote-migration-list.log
            insurance-migration-comparison.log
          retention-days: 7
