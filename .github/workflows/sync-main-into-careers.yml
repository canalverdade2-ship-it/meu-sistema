name: Sync Main Into Careers Branch

on:
  push:
    branches:
      - agent/harden-careers-flow
    paths:
      - '.github/workflows/sync-main-into-careers.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout careers branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-careers-flow
          fetch-depth: 0

      - name: Merge latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:agent/harden-careers-flow
