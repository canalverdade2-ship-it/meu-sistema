name: Fix checkout summary contrast

on:
  push:
    branches: [fix/checkout-summary-contrast-20260720]
    paths:
      - '.github/workflows/fix-checkout-summary-contrast.yml'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/checkout-summary-contrast-20260720
          fetch-depth: 0

      - name: Corrigir contraste dos valores
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path('src/components/client/store/CheckoutModal.tsx')
          content = path.read_text(encoding='utf-8')

          replacements = [
              (
                  r'(<span className="font-bold )text-indigo-700(">\s*\{formatCurrency\(getProductQuantityPriceBreakdown\(c\.item_detalhes, c\.quantidade\)\.subtotalFinal\)\})',
                  r'\1text-indigo-200\2',
              ),
              (
                  r'(<span className="font-bold )text-neutral-900(">\s*\{formatCurrency\(\(c\.item_detalhes\?\.valor \|\| 0\) \* c\.quantidade\)\})',
                  r'\1text-white\2',
              ),
          ]

          for pattern, replacement in replacements:
              content, count = re.subn(pattern, replacement, content, count=1)
              if count != 1:
                  raise SystemExit(f'Padrão esperado não encontrado: {pattern}')

          path.write_text(content, encoding='utf-8')
          PY

      - name: Remover workflow temporário
        run: rm .github/workflows/fix-checkout-summary-contrast.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Registrar contratos existentes
        continue-on-error: true
        run: npm run test:travel

      - name: Commitar correção validada
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/client/store/CheckoutModal.tsx .github/workflows/fix-checkout-summary-contrast.yml
          git commit -m 'Corrigir contraste dos valores no resumo do checkout'
          git push origin HEAD:fix/checkout-summary-contrast-20260720
