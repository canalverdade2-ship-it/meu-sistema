name: Temporary sync Home audit with main

on:
  push:
    branches: [agent/corrigir-home-itens-2-a-10]
    paths: ['.home-sync-ready']

permissions:
  contents: write

concurrency:
  group: sync-home-audit-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge current main safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_code=$?
          set -e
          if [ "$merge_code" -ne 0 ]; then
            unmerged="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$unmerged" | grep -Ev '^(package.json|.github/workflows/quality.yml)$' || true)"
            test -z "$unexpected"
            git checkout --ours package.json .github/workflows/quality.yml
            git add package.json .github/workflows/quality.yml
          fi
          test -z "$(git diff --name-only --diff-filter=U)"
          rm .home-sync-ready .github/workflows/sync-home-audit-main.yml
          git add -A
          git commit -m 'Sincronizar correções da Home com a main atual'
          git push
