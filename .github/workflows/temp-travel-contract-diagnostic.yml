name: Temporary GSA travel contract diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/corrigir-painel-colaborador'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge result
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install
      - name: Capture GSA Viagens contract result
        shell: bash
        run: |
          set +e
          npm run test:travel > travel-contract-diagnostic.txt 2>&1
          STATUS=$?
          echo "exit_status=$STATUS" >> travel-contract-diagnostic.txt
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: travel-contract-diagnostic
          path: travel-contract-diagnostic.txt
          retention-days: 1
