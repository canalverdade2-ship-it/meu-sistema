name: Supabase Migration Preview

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/supabase-migration-preview.yml'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: supabase-migration-preview-production
  cancel-in-progress: false

jobs:
  preview:
    name: Preview migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo 'SUPABASE_ACCESS_TOKEN não configurado.'; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo 'SUPABASE_DB_PASSWORD não configurado.'; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo 'SUPABASE_PROJECT_ID não configurado.'; exit 1; }
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID" || {
            echo 'O Project Reference configurado não corresponde ao projeto autorizado.'
            exit 1
          }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        shell: bash
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Inspect safe targeted SQL options
        shell: bash
        run: |
          set +e
          supabase db query --help > db-query-help.log 2>&1
          {
            echo 'Arquivos temporários criados pelo link:'
            find supabase/.temp -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort
          } > linked-temp-files.log
          exit 0

      - name: Compare migration history
        shell: bash
        run: |
          set -o pipefail
          supabase migration list --linked 2>&1 | tee migration-list.log

      - name: Preview database push
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          supabase db push --linked --dry-run 2>&1 | tee migration-dry-run.log

      - name: Upload migration preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migration-preview
          path: |
            migration-list.log
            migration-dry-run.log
            db-query-help.log
            linked-temp-files.log
          retention-days: 7

      - name: Publish private preview report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch migration-list.log migration-dry-run.log db-query-help.log linked-temp-files.log
          {
            echo '# Prévia das migrações Supabase'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Resultado do job: **$JOB_STATUS**"
            echo
            echo '## Histórico local e remoto'
            echo '```text'
            sed -n '1,260p' migration-list.log
            echo '```'
            echo
            echo '## Dry-run do banco'
            echo '```text'
            sed -n '1,260p' migration-dry-run.log
            echo '```'
            echo
            echo '## Ajuda do comando db query'
            echo '```text'
            sed -n '1,220p' db-query-help.log
            echo '```'
            echo
            echo '## Metadados locais do link'
            echo '```text'
            cat linked-temp-files.log
            echo '```'
          } > migration-report.md

          gh issue create \
            --title "Prévia Supabase #$GITHUB_RUN_NUMBER" \
            --body-file migration-report.md
