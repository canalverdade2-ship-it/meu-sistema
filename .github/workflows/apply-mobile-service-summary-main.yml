name: Apply Mobile Services Summary Main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validate-publish:
    if: github.event.head_commit.message == 'Executar aplicação definitiva da correção mobile'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply responsive correction
        run: python scripts/apply-mobile-service-summary-fix.py
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate TypeScript
        run: npm run lint
      - name: Build production bundle
        run: npm run build
      - name: Publish correction to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/public/GSAEnterpriseHome.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Ocultar cards introdutórios no mobile'
          git push origin HEAD:main
