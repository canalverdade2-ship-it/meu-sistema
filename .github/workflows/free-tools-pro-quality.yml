name: Free Tools Pro Quality

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
    paths:
      - 'src/components/public/FreeTools*.tsx'
      - 'src/components/admin/CalculatorProAdminPanel.tsx'
      - 'src/components/admin/ConfiguracoesModule.tsx'
      - 'src/lib/freeTools*.ts'
      - 'scripts/check-free-tools-contracts.ts'
      - 'supabase/functions/gsa-free-tools-pro/**'
      - 'supabase/functions/gsa-free-tools-pro-webhook/**'
      - 'supabase/migrations/*free_tools_pro*.sql'
      - 'supabase/config.toml'
      - '.github/workflows/free-tools-pro-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/components/public/FreeTools*.tsx'
      - 'src/components/admin/CalculatorProAdminPanel.tsx'
      - 'src/components/admin/ConfiguracoesModule.tsx'
      - 'src/lib/freeTools*.ts'
      - 'scripts/check-free-tools-contracts.ts'
      - 'supabase/functions/gsa-free-tools-pro/**'
      - 'supabase/functions/gsa-free-tools-pro-webhook/**'
      - 'supabase/migrations/*free_tools_pro*.sql'
      - 'supabase/config.toml'

concurrency:
  group: free-tools-pro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Free and Pro contracts
        run: npm run test:free-tools

      - name: Check public Pro API
        run: deno check supabase/functions/gsa-free-tools-pro/index.ts

      - name: Check InfinitePay webhook
        run: deno check supabase/functions/gsa-free-tools-pro-webhook/index.ts

      - name: Build
        run: npm run build
