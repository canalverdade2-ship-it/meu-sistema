name: Temporary command sync collaborator PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    if: >-
      github.event.issue.number == 49 &&
      github.event.comment.body == '/sync-collaborator-pr' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout collaborator branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-colaborador
          fetch-depth: 0

      - name: Rebase and report
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main > /tmp/rebase-output.txt 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            CONFLICTS=$(git diff --name-only --diff-filter=U | sed 's/^/- `/' | sed 's/$/`/' | paste -sd '\n' -)
            OUTPUT=$(tail -40 /tmp/rebase-output.txt)
            git rebase --abort
            gh pr comment 49 --body "<!-- collaborator-sync-report -->
### Sincronização automática: conflitos encontrados
${CONFLICTS}

\`\`\`
${OUTPUT}
\`\`\`"
            exit 1
          fi

          rm -f .github/workflows/temp-self-sync-collaborator.yml .sync-collaborator-pr
          npm ci || npm install
          npm run lint
          npm run test:travel
          npm run test:admin
          npm run build
          git reset --soft origin/main
          git add -A
          git commit -m "Corrigir segurança e experiência do painel do colaborador"
          git push --force-with-lease origin HEAD:agent/corrigir-painel-colaborador
          gh pr comment 49 --body "<!-- collaborator-sync-report -->
### Sincronização automática concluída
Branch rebaseada sobre a \`main\` atual. TypeScript, contratos GSA Viagens, contratos administrativos e build aprovados."
