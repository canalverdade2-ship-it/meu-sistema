name: Temporary final sync auth security

on:
  push:
    branches:
      - agent/finalizar-seguranca-home-v2
    paths:
      - '.github/workflows/temp-final-sync-auth-security.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/finalizar-seguranca-home-v2
          fetch-depth: 0

      - name: Merge latest main safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            for path in "${conflicts[@]}"; do
              case "$path" in
                .github/workflows/quality.yml|src/lib/supabase.ts)
                  git checkout --ours -- "$path"
                  git add "$path"
                  ;;
                *)
                  echo "Unexpected conflict: $path" >&2
                  exit 1
                  ;;
              esac
            done
          fi

          rm -f .github/workflows/temp-final-sync-auth-security.yml
          git add -A
          git commit -m "Sincronizar segurança da Home com a main atual"
          git push origin HEAD:agent/finalizar-seguranca-home-v2
