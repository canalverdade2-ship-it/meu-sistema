name: GSA Affiliate Flow Validation

on:
  pull_request:
    paths:
      - 'src/pages/Afiliado/**'
      - 'src/components/admin/AffiliateAdminModule.tsx'
      - 'src/components/public/AffiliatePublicPage.tsx'
      - 'src/features/affiliates/**'
      - 'src/routing/routeSecurity.ts'
      - 'supabase/migrations/*affiliate*'
      - 'scripts/check-affiliate-contracts.ts'
      - 'scripts/sql/check-affiliate-flow.sql'
      - 'package.json'
      - '.github/workflows/affiliate-flow-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: affiliate-flow-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Validate affiliate contracts
        run: npm run test:affiliates
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
