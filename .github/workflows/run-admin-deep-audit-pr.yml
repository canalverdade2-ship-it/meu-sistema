name: Run Admin Deep Audit Corrections

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-admin-deep-audit.py
      - scripts/prepare-admin-deep-audit.py
      - .github/workflows/run-admin-deep-audit-pr.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-validate-publish:
    if: github.head_ref == 'agent/auditoria-profunda-paineis'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare corrected audit script
        run: python3 scripts/prepare-admin-deep-audit.py

      - name: Apply corrections
        run: python3 scripts/apply-admin-deep-audit.py

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Administrative contracts and PostgreSQL runtime
        run: npm run test:admin

      - name: Products and subscriptions
        run: npm run test:products-subscriptions

      - name: Client portal security
        run: npm run test:client-security

      - name: Provider portal security
        run: npm run test:provider

      - name: Public home contracts
        run: npm run test:home

      - name: GSA Travel contracts
        run: npm run test:travel

      - name: Production build
        run: npm run build

      - name: Commit validated corrections
        run: |
          git config user.name "gsa-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Corrigir fluxos integrados dos painéis após auditoria profunda"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
