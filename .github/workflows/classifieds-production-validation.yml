name: Classifieds Production Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/components/client/marketplace/classifieds/**'
      - 'src/components/admin/ClassifiedsModule.tsx'
      - 'src/lib/classifiedStorage.ts'
      - 'scripts/check-classifieds-production-contracts.ts'
      - 'scripts/classifieds-*-production-verification.sql'
      - 'supabase/functions/gsa-classified-media/**'
      - 'supabase/migrations/20260721*_classifieds_*.sql'
      - '.github/workflows/classifieds-production-validation.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/components/client/marketplace/classifieds/**'
      - 'src/components/admin/ClassifiedsModule.tsx'
      - 'src/lib/classifiedStorage.ts'
      - 'scripts/check-classifieds-production-contracts.ts'
      - 'scripts/classifieds-*-production-verification.sql'
      - 'supabase/functions/gsa-classified-media/**'
      - 'supabase/migrations/20260721*_classifieds_*.sql'
      - '.github/workflows/classifieds-production-validation.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: classifieds-production-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: 2.101.0
  VITE_SUPABASE_URL: http://127.0.0.1:54321
  VITE_SUPABASE_ANON_KEY: ci-anon-key-not-for-production

jobs:
  validate:
    name: Validar classificados
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Validate Classifieds contracts
        run: npm run test:classificados

      - name: Check Classifieds media Edge Function
        run: deno check supabase/functions/gsa-classified-media/index.ts

      - name: Production build
        run: npm run build

  validate-production:
    name: Validar classificados em produção
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@v4

      - name: Validate production authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_ID"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Classifieds media Edge Function
        run: deno check supabase/functions/gsa-classified-media/index.ts

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link expected production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Inspect migration history before deployment
        run: supabase migration list --linked 2>&1 | tee classifieds-migrations-before.log

      - name: Apply Classifieds migrations idempotently
        shell: bash
        run: |
          set -euo pipefail
          apply_migration() {
            version="$1"
            file="$2"
            log="$3"
            if awk -F'|' -v target="$version" '{ remote=$2; gsub(/[^0-9]/, "", remote); if (remote == target) found=1 } END { exit found ? 0 : 1 }' classifieds-migrations-before.log; then
              echo "Migration ${version} já aplicada." | tee "$log"
            else
              supabase db query --linked --file "$file" 2>&1 | tee "$log"
              supabase migration repair --linked --status applied "$version" 2>&1 | tee -a "$log"
            fi
          }
          apply_migration 20260721183000 supabase/migrations/20260721183000_classifieds_media_storage_production.sql classifieds-migration-apply.log
          apply_migration 20260721203000 supabase/migrations/20260721203000_classifieds_commission_config.sql classifieds-commission-migration-apply.log
          apply_migration 20260721212500 supabase/migrations/20260721212500_classifieds_base_tables.sql classifieds-base-tables-migration-apply.log
          apply_migration 20260721213000 supabase/migrations/20260721213000_classifieds_create_listing_rpc.sql classifieds-create-listing-migration-apply.log
          apply_migration 20260721223000 supabase/migrations/20260721223000_classifieds_complete_operational_schema.sql classifieds-complete-schema-migration-apply.log
          apply_migration 20260721233000 supabase/migrations/20260721233000_classifieds_review_adjustment_flow.sql classifieds-review-flow-migration-apply.log

      - name: Verify Classifieds production storage
        run: supabase db query --linked --file scripts/classifieds-media-production-verification.sql 2>&1 | tee classifieds-production-verification.log && grep -q 'CLASSIFIEDS_MEDIA_STORAGE_VERIFIED' classifieds-production-verification.log

      - name: Verify Classifieds commission configuration
        run: supabase db query --linked --file scripts/classifieds-commission-production-verification.sql 2>&1 | tee classifieds-commission-verification.log && grep -q 'CLASSIFIEDS_COMMISSION_CONFIG_VERIFIED' classifieds-commission-verification.log

      - name: Verify Classifieds create listing RPC
        run: supabase db query --linked --file scripts/classifieds-create-listing-production-verification.sql 2>&1 | tee classifieds-create-listing-verification.log && grep -q 'CLASSIFIEDS_CREATE_LISTING_RPC_VERIFIED' classifieds-create-listing-verification.log

      - name: Verify complete Classifieds operational schema
        run: supabase db query --linked --file scripts/classifieds-complete-production-verification.sql 2>&1 | tee classifieds-complete-verification.log && grep -q 'CLASSIFIEDS_COMPLETE_OPERATIONAL_SCHEMA_VERIFIED' classifieds-complete-verification.log

      - name: Verify Classifieds review and adjustment flow
        shell: bash
        run: |
          set -euo pipefail
          supabase db query --linked --file scripts/classifieds-review-flow-production-verification.sql 2>&1 | tee classifieds-review-flow-verification.log
          grep -q 'CLASSIFIEDS_REVIEW_ADJUSTMENT_FLOW_VERIFIED' classifieds-review-flow-verification.log
          supabase migration list --linked 2>&1 | tee classifieds-migrations-after.log
          grep -q '20260721233000' classifieds-migrations-after.log

      - name: Deploy authenticated Classifieds media gateway
        run: supabase functions deploy gsa-classified-media --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee classifieds-function-deploy.log

      - name: Verify Classifieds media gateway deployment
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee classifieds-functions-after.log && grep -q 'gsa-classified-media' classifieds-functions-after.log

      - name: Upload production audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classifieds-production-audit-${{ github.run_id }}
          path: |
            classifieds-migrations-before.log
            classifieds-*-migration-apply.log
            classifieds-*-verification.log
            classifieds-migrations-after.log
            classifieds-function-deploy.log
            classifieds-functions-after.log
          retention-days: 30
          if-no-files-found: ignore
