name: Temporary self sync collaborator branch

on:
  push:
    branches:
      - agent/corrigir-painel-colaborador

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collaborator branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-colaborador
          fetch-depth: 0

      - name: Rebase on current main
        id: rebase
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main > rebase-output.txt 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            git diff --name-only --diff-filter=U > rebase-conflicts.txt
            git status --short > rebase-status.txt
            git rebase --abort
          fi
          exit 0

      - name: Upload conflicts
        if: steps.rebase.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: collaborator-self-rebase-conflicts
          path: |
            rebase-output.txt
            rebase-conflicts.txt
            rebase-status.txt
          retention-days: 1

      - name: Validate and publish clean branch
        if: steps.rebase.outputs.status == '0'
        shell: bash
        run: |
          rm -f .github/workflows/temp-self-sync-collaborator.yml .sync-collaborator-pr
          npm ci || npm install
          npm run lint
          npm run test:travel
          npm run test:admin
          npm run build
          git reset --soft origin/main
          git add -A
          git commit -m "Corrigir segurança e experiência do painel do colaborador"
          git push --force-with-lease origin HEAD:agent/corrigir-painel-colaborador

      - name: Fail on conflicts
        if: steps.rebase.outputs.status != '0'
        run: exit 1
