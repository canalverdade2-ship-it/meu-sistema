name: Diagnosticar documentos privados - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run transformations and capture output
        shell: bash
        run: |
          mkdir -p inspection
          : > inspection/private-documents-apply-stage6.txt
          set +e

          echo '=== CLIENT SERVICES ===' >> inspection/private-documents-apply-stage6.txt
          node scripts/fix-private-client-services-stage6.cjs >> inspection/private-documents-apply-stage6.txt 2>&1
          echo "exit_code=$?" >> inspection/private-documents-apply-stage6.txt

          echo '=== SUPPORT TICKETS ===' >> inspection/private-documents-apply-stage6.txt
          node scripts/fix-private-ticket-support-stage6.cjs >> inspection/private-documents-apply-stage6.txt 2>&1
          echo "exit_code=$?" >> inspection/private-documents-apply-stage6.txt

          echo '=== ADMIN SERVICE ORDERS ===' >> inspection/private-documents-apply-stage6.txt
          node scripts/fix-private-admin-service-orders-stage6.cjs >> inspection/private-documents-apply-stage6.txt 2>&1
          echo "exit_code=$?" >> inspection/private-documents-apply-stage6.txt

          set -e
          cat inspection/private-documents-apply-stage6.txt

      - name: Publish temporary diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inspection/private-documents-apply-stage6.txt
          git commit -m "Registra diagnóstico temporário de documentos privados"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
