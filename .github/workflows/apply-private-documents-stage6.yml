name: Aplicar documentos privados - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply private document transformations
        shell: bash
        run: |
          node scripts/fix-private-client-services-stage6.cjs
          node scripts/fix-private-ticket-support-stage6.cjs
          node scripts/fix-private-admin-service-orders-stage6.cjs

      - name: Validate transformed contracts
        shell: bash
        run: |
          grep -q "uploadPrivateDocument" src/components/client/ClientServicos.tsx
          grep -q "uploadPrivateDocument" src/components/client/ClientSuporte.tsx
          grep -q "uploadPrivateDocument" src/components/admin/TicketsModule.tsx
          grep -q "uploadPrivateDocument" src/components/prestador/PrestadorSuporte.tsx
          grep -q "SecureAttachmentButton" src/components/admin/OrdensServicoModule.tsx
          grep -q "anexo_nome" src/types.ts
          ! grep -q "getPublicUrl" src/components/client/ClientServicos.tsx
          ! grep -q "getPublicUrl" src/components/client/ClientSuporte.tsx
          ! grep -q "getPublicUrl" src/components/admin/TicketsModule.tsx
          ! grep -q "getPublicUrl" src/components/prestador/PrestadorSuporte.tsx

      - name: Publish functional code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/types.ts \
            src/components/client/ClientServicos.tsx \
            src/components/client/ClientSuporte.tsx \
            src/components/admin/TicketsModule.tsx \
            src/components/prestador/PrestadorSuporte.tsx \
            src/components/admin/OrdensServicoModule.tsx
          git commit -m "Protege documentos de servicos e suporte"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
