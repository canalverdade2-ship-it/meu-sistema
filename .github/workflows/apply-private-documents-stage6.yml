name: Diagnosticar validacao de documentos privados - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Validate contracts and build
        shell: bash
        run: |
          mkdir -p inspection
          OUT=inspection/stage6-validation.txt
          : > "$OUT"
          set +e

          grep -q "gsa-private-documents" supabase/migrations/20260720200000_private_service_support_documents.sql
          bucket_contract=$?
          echo "bucket_contract=$bucket_contract" >> "$OUT"

          grep -q "createSignedUrl" src/lib/privateStorage.ts
          signed_url_contract=$?
          echo "signed_url_contract=$signed_url_contract" >> "$OUT"

          grep -q "resolvePrivateFileReference" src/contexts/FileViewerContext.tsx
          viewer_contract=$?
          echo "viewer_contract=$viewer_contract" >> "$OUT"

          grep -q "uploadPrivateDocument" src/components/client/ClientServicos.tsx
          client_services_contract=$?
          echo "client_services_contract=$client_services_contract" >> "$OUT"

          grep -q "uploadPrivateDocument" src/components/client/ClientSuporte.tsx
          client_support_contract=$?
          echo "client_support_contract=$client_support_contract" >> "$OUT"

          grep -q "uploadPrivateDocument" src/components/admin/TicketsModule.tsx
          admin_support_contract=$?
          echo "admin_support_contract=$admin_support_contract" >> "$OUT"

          grep -q "uploadPrivateDocument" src/components/prestador/PrestadorSuporte.tsx
          provider_support_contract=$?
          echo "provider_support_contract=$provider_support_contract" >> "$OUT"

          grep -q "gsa-private://" src/components/admin/OrdensServicoModule.tsx
          admin_os_contract=$?
          echo "admin_os_contract=$admin_os_contract" >> "$OUT"

          grep -q "getPublicUrl" src/components/client/ClientServicos.tsx
          client_services_public_url=$?
          echo "client_services_public_url_present=$([ $client_services_public_url -eq 0 ] && echo 1 || echo 0)" >> "$OUT"

          grep -q "getPublicUrl" src/components/client/ClientSuporte.tsx
          client_support_public_url=$?
          echo "client_support_public_url_present=$([ $client_support_public_url -eq 0 ] && echo 1 || echo 0)" >> "$OUT"

          grep -q "getPublicUrl" src/components/admin/TicketsModule.tsx
          admin_support_public_url=$?
          echo "admin_support_public_url_present=$([ $admin_support_public_url -eq 0 ] && echo 1 || echo 0)" >> "$OUT"

          grep -q "getPublicUrl" src/components/prestador/PrestadorSuporte.tsx
          provider_support_public_url=$?
          echo "provider_support_public_url_present=$([ $provider_support_public_url -eq 0 ] && echo 1 || echo 0)" >> "$OUT"

          set -e
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

          set +e
          npm run build > inspection/stage6-build.txt 2>&1
          build_code=$?
          echo "build_exit_code=$build_code" >> "$OUT"
          echo "validated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUT"
          set -e

          cat "$OUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inspection/stage6-validation.txt inspection/stage6-build.txt
          git commit -m "Atualiza validacao temporaria da etapa 6"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6

          test "$bucket_contract" -eq 0
          test "$signed_url_contract" -eq 0
          test "$viewer_contract" -eq 0
          test "$client_services_contract" -eq 0
          test "$client_support_contract" -eq 0
          test "$admin_support_contract" -eq 0
          test "$provider_support_contract" -eq 0
          test "$admin_os_contract" -eq 0
          test "$client_services_public_url" -ne 0
          test "$client_support_public_url" -ne 0
          test "$admin_support_public_url" -ne 0
          test "$provider_support_public_url" -ne 0
          test "$build_code" -eq 0
