name: Diagnosticar aplicação privada - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run and capture every transformation
        shell: bash
        run: |
          mkdir -p inspection
          OUT=inspection/private-documents-apply-stage6.txt
          : > "$OUT"
          set +e

          echo '=== CLIENT SERVICES ===' >> "$OUT"
          node scripts/fix-private-client-services-stage6.cjs >> "$OUT" 2>&1
          echo "exit_code=$?" >> "$OUT"

          echo '=== SUPPORT TICKETS ===' >> "$OUT"
          node scripts/fix-private-ticket-support-stage6.cjs >> "$OUT" 2>&1
          echo "exit_code=$?" >> "$OUT"

          echo '=== ADMIN SERVICE ORDERS ===' >> "$OUT"
          node scripts/fix-private-admin-service-orders-stage6.cjs >> "$OUT" 2>&1
          echo "exit_code=$?" >> "$OUT"

          echo '=== CONTRACT CHECK ===' >> "$OUT"
          grep -q "uploadPrivateDocument" src/components/client/ClientServicos.tsx
          echo "client_services_private=$?" >> "$OUT"
          grep -q "uploadPrivateDocument" src/components/client/ClientSuporte.tsx
          echo "client_support_private=$?" >> "$OUT"
          grep -q "uploadPrivateDocument" src/components/admin/TicketsModule.tsx
          echo "admin_tickets_private=$?" >> "$OUT"
          grep -q "uploadPrivateDocument" src/components/prestador/PrestadorSuporte.tsx
          echo "provider_support_private=$?" >> "$OUT"
          grep -q "SecureAttachmentButton" src/components/admin/OrdensServicoModule.tsx
          echo "admin_os_secure_viewer=$?" >> "$OUT"

          set -e
          cat "$OUT"

      - name: Publish temporary diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inspection/private-documents-apply-stage6.txt
          git commit -m "Atualiza diagnóstico temporário de documentos privados"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
