name: Repair TypeScript Blockers

on:
  push:
    branches:
      - agent/harden-careers-flow
    paths:
      - '.github/workflows/repair-typescript-blockers.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-careers-flow
          fetch-depth: 0

      - name: Apply minimal type repairs
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              Path('src/components/admin/AffiliateAdminModule.tsx'): [
                  (
                      "function ProgramEditor({ program, onSaved }: { program: AffiliateProgram; onSaved: () => Promise<void> | void }) {",
                      "function ProgramEditor({ program, onSaved }: { key?: string; program: AffiliateProgram; onSaved: () => Promise<void> | void }) {",
                  ),
              ],
              Path('src/components/admin/PartnersAdminModule.tsx'): [
                  (
                      "function Field({ label, value, onChange, required = false, type = 'text', maxLength }: { label: string; value: string; onChange: (value: string) => void; required?: boolean; type?: string; maxLength?: number }) {",
                      "function Field({ label, value, onChange, required = false, type = 'text', maxLength, placeholder }: { label: string; value: string; onChange: (value: string) => void | Promise<void>; required?: boolean; type?: string; maxLength?: number; placeholder?: string }) {",
                  ),
                  (
                      "<input required={required} type={type} value={value} onChange={(event) => onChange(event.target.value)} maxLength={maxLength} className=\"input-field font-normal text-neutral-900\" />",
                      "<input required={required} type={type} value={value} onChange={(event) => { void onChange(event.target.value); }} maxLength={maxLength} placeholder={placeholder} className=\"input-field font-normal text-neutral-900\" />",
                  ),
              ],
              Path('src/components/public/AdvertisingPage.tsx'): [
                  (
                      "<PrivacyPolicyDialog open={privacyOpen} onClose={() => setPrivacyOpen(false)} />",
                      "<PrivacyPolicyDialog isOpen={privacyOpen} onClose={() => setPrivacyOpen(false)} />",
                  ),
              ],
              Path('src/pages/AdvertiserPortal.tsx'): [
                  (
                      "function Card({ children }: { children: React.ReactNode }) {",
                      "function Card({ children }: { key?: string; children: React.ReactNode }) {",
                  ),
              ],
              Path('src/pages/Afiliado/AffiliateAccessPage.tsx'): [
                  (
                      "<PinInput value={pin} onChange={setPin} disabled={loading} onComplete={login} />",
                      "<PinInput value={pin} onChange={setPin} disabled={loading} onEnter={() => { void login(); }} />",
                  ),
              ],
              Path('src/pages/Afiliado/AfiliadoDashboard.tsx'): [
                  (
                      "if (tab) setActiveTab(tab as TabType);",
                      "if (tab) navigateToTab(tab as TabType);",
                  ),
                  (
                      "const pontosAcumulados = Number(clientData?.pontos || 0);",
                      "const pontosAcumulados = Number(clientData?.pontos || 0);\n  const ptsInputVal = Number.parseInt(pontosResgateInput, 10) || 0;\n  const valorEquivalenteResgate = ptsInputVal * pontosTaxa;",
                  ),
              ],
          }

          changed = []
          for file_path, file_replacements in replacements.items():
              content = file_path.read_text(encoding='utf-8')
              original = content
              for old, new in file_replacements:
                  if old not in content:
                      raise SystemExit(f'Bloco esperado não encontrado em {file_path}: {old[:100]}')
                  content = content.replace(old, new, 1)
              if content != original:
                  file_path.write_text(content, encoding='utf-8')
                  changed.append(str(file_path))

          if len(changed) != len(replacements):
              raise SystemExit(f'Arquivos alterados inesperados: {changed}')

      - name: Validate TypeScript before commit
        run: |
          npm ci
          npx tsc --noEmit

      - name: Commit repaired files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/admin/AffiliateAdminModule.tsx src/components/admin/PartnersAdminModule.tsx src/components/public/AdvertisingPage.tsx src/pages/AdvertiserPortal.tsx src/pages/Afiliado/AffiliateAccessPage.tsx src/pages/Afiliado/AfiliadoDashboard.tsx
          git commit -m 'Corrigir bloqueios globais de TypeScript'
          git push origin HEAD:agent/harden-careers-flow
