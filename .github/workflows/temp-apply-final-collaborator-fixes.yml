name: Temporary apply final collaborator fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/corrigir-painel-colaborador-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-painel-colaborador-v2
          fetch-depth: 0

      - name: Apply reviewed correction package
        shell: bash
        run: |
          cat .patch/collaborator-final.part* \
            | base64 -d \
            | gzip -d \
            > /tmp/apply-collaborator-final.py
          python /tmp/apply-collaborator-final.py
          rm -rf .patch
          rm -f .github/workflows/temp-apply-final-collaborator-fixes.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Admin panel contracts
        run: npm run test:admin

      - name: Client portal security contracts
        run: npm run test:client-security

      - name: GSA Viagens contracts
        run: npm run test:travel

      - name: Check authentication Edge Function
        run: deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts

      - name: Test authentication Edge Function
        run: deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts

      - name: Production build
        run: npm run build

      - name: Publish one clean correction commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --soft origin/main
          git add -A
          git commit -m "Corrigir segurança e experiência do painel do colaborador"
          git push --force-with-lease origin HEAD:agent/corrigir-painel-colaborador-v2
