name: Aplicar correções do Portal do Fornecedor

on:
  push:
    branches: [main]
    paths:
      - automation/supplier-fix/READY

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar arquivos validados
        run: node automation/supplier-fix/apply.mjs

      - name: Instalar dependências
        run: npm ci

      - name: Validar contratos de fornecedores
        run: npm run test:suppliers

      - name: Validar build
        run: npm run build

      - name: Publicar correções diretamente na main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aplicar correções completas do Portal do Fornecedor"
          git push origin main
