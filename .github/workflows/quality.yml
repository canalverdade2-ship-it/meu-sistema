name: Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'fix/**', 'feat/**', 'agent/**']

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        id: typescript
        shell: bash
        run: |
          set +e
          npm run lint > typescript.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-log
          path: typescript.log
          retention-days: 7

      - name: Report TypeScript result
        if: always()
        shell: bash
        run: |
          cat typescript.log
          test "${{ steps.typescript.outputs.exit_code }}" = "0"

      - name: Admin panel contracts
        if: steps.typescript.outputs.exit_code == '0'
        run: npm run test:admin

      - name: Client portal security contracts
        id: client_security
        if: steps.typescript.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run test:client-security > client-security.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload client security log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-security-log
          path: client-security.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report client security result
        if: steps.typescript.outputs.exit_code == '0'
        shell: bash
        run: |
          cat client-security.log
          test "${{ steps.client_security.outputs.exit_code }}" = "0"

      - name: GSA Viagens contracts
        if: steps.typescript.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        run: npm run test:travel

      - name: Build
        if: steps.typescript.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        run: npm run build
