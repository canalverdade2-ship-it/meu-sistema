name: Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'fix/**', 'feat/**', 'agent/**']

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        id: typescript
        shell: bash
        run: |
          set +e
          npm run lint > typescript.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-log
          path: typescript.log
          retention-days: 7

      - name: Report TypeScript result
        if: always()
        shell: bash
        run: |
          cat typescript.log
          test "${{ steps.typescript.outputs.exit_code }}" = "0"

      - name: Admin panel contracts
        id: admin_contracts
        if: steps.typescript.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run test:admin > admin-contracts.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload admin contracts log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-contracts-log
          path: admin-contracts.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report admin contracts result
        if: steps.typescript.outputs.exit_code == '0'
        shell: bash
        run: |
          cat admin-contracts.log
          test "${{ steps.admin_contracts.outputs.exit_code }}" = "0"

      - name: Products and subscriptions contracts
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0'
        run: npm run test:products-subscriptions

      - name: Client portal security contracts
        id: client_security
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run test:client-security > client-security.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload client security log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-security-log
          path: client-security.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report client security result
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0'
        shell: bash
        run: |
          cat client-security.log
          test "${{ steps.client_security.outputs.exit_code }}" = "0"

      - name: Provider portal security contracts
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        run: npm run test:provider

      - name: Home public contracts
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        run: npm run test:home

      - name: GSA Viagens contracts
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        run: npm run test:travel

      - name: Check authentication Edge Function
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        id: deno_check
        shell: bash
        run: |
          set +e
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts > deno-check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Deno check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deno-check-log
          path: deno-check.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report Deno check result
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'
        shell: bash
        run: |
          cat deno-check.log
          test "${{ steps.deno_check.outputs.exit_code }}" = "0"

      - name: Test authentication Edge Function
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0' && steps.deno_check.outputs.exit_code == '0'
        run: deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts

      - name: Validate authentication migration
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0' && steps.deno_check.outputs.exit_code == '0'
        env:
          PGPASSWORD: postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -h 127.0.0.1 -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $roles$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              EXECUTE 'CREATE ROLE anon NOLOGIN';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              EXECUTE 'CREATE ROLE authenticated NOLOGIN';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              EXECUTE 'CREATE ROLE service_role NOLOGIN';
            END IF;
          END;
          $roles$;

          \i supabase/migrations/20260720193000_auth_gateway_rate_limit.sql

          DO $test$
          DECLARE
            v_first jsonb;
            v_second jsonb;
            v_third jsonb;
          BEGIN
            DELETE FROM public.gsa_auth_rate_limits;

            v_first := public.gsa_auth_rate_limit_check(repeat('a', 64), 2, 60, 120);
            v_second := public.gsa_auth_rate_limit_check(repeat('a', 64), 2, 60, 120);
            v_third := public.gsa_auth_rate_limit_check(repeat('a', 64), 2, 60, 120);

            IF NOT (v_first->>'allowed')::boolean
               OR NOT (v_second->>'allowed')::boolean
               OR (v_third->>'allowed')::boolean
               OR (v_third->>'retry_after')::integer <= 0 THEN
              RAISE EXCEPTION 'Comportamento inesperado do rate limiting: %, %, %', v_first, v_second, v_third;
            END IF;

            IF has_function_privilege('anon', 'public.gsa_auth_rate_limit_check(text,integer,integer,integer)', 'EXECUTE')
               OR has_function_privilege('authenticated', 'public.gsa_auth_rate_limit_check(text,integer,integer,integer)', 'EXECUTE')
               OR NOT has_function_privilege('service_role', 'public.gsa_auth_rate_limit_check(text,integer,integer,integer)', 'EXECUTE') THEN
              RAISE EXCEPTION 'Permissões incorretas na função de rate limiting.';
            END IF;
          END;
          $test$;
          SQL

      - name: Validate Home public migrations
        id: home_migrations
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0' && steps.deno_check.outputs.exit_code == '0'
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          psql -h 127.0.0.1 -U postgres -f scripts/test-home-public-migrations.sql > home-migrations.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Home migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-migration-log
          path: home-migrations.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report Home migration result
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0' && steps.deno_check.outputs.exit_code == '0'
        shell: bash
        run: |
          cat home-migrations.log
          test "${{ steps.home_migrations.outputs.exit_code }}" = "0"

      - name: Build
        if: steps.typescript.outputs.exit_code == '0' && steps.admin_contracts.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0' && steps.deno_check.outputs.exit_code == '0'
        run: npm run build
