name: Apply Security Audit Fixes

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-validate-publish:
    if: github.head_ref == 'agent/corrigir-auditoria-seguranca'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-seguranca
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install current dependencies
        run: npm ci

      - name: Confirm Gemini client dependency is unused
        shell: bash
        run: |
          set -euo pipefail
          matches=$(grep -RInE 'GEMINI_API_KEY|@google/genai' src supabase scripts tests --exclude-dir=node_modules || true)
          if [ -n "$matches" ]; then
            echo 'A integração Gemini ainda é referenciada fora da configuração e precisa ser migrada para backend:' >&2
            echo "$matches" >&2
            exit 1
          fi

      - name: Apply audited source corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          vite = Path('vite.config.ts')
          text = vite.read_text()
          exposed = "      'process.env.GEMINI_API_KEY': JSON.stringify(env.GEMINI_API_KEY),\n"
          if exposed not in text:
              raise RuntimeError('A definição pública da chave Gemini não foi encontrada')
          vite.write_text(text.replace(exposed, '', 1))

          edge = Path('supabase/functions/gsa-auth-session/index.ts')
          text = edge.read_text()
          text = text.replace('type AuthAction =', 'export type AuthAction =', 1)
          subject_anchor = "function subjectFor(action: AuthAction, payload: Record<string, string>) {\n  if (action === 'login_admin' || action === 'login_colaborador') return payload.code;\n  return payload.documento || payload.recovery_id;\n}\n\n"
          subject_block = subject_anchor + "export function subjectRateLimitMode(action: AuthAction): 'before' | 'invalid-only' {\n  return action === 'request_client_recovery' || action === 'complete_client_recovery'\n    ? 'before'\n    : 'invalid-only';\n}\n\n"
          if subject_anchor not in text:
              raise RuntimeError('Âncora da política de rate limiting não encontrada')
          text = text.replace(subject_anchor, subject_block, 1)

          bucket_anchor = "    const subjectBucket = await hashBucket(\n      serviceRoleKey,\n      `${body.action}:subject`,\n      subjectFor(body.action, normalizedPayload),\n    );\n\n"
          bucket_block = bucket_anchor + "    if (subjectRateLimitMode(body.action) === 'before') {\n      const subjectLimit = await checkRateLimit(admin, subjectBucket, rules.subject);\n      if (!subjectLimit.allowed) {\n        const retryAfter = Math.max(1, Number(subjectLimit.retry_after || rules.subject.blockSeconds));\n        return tooManyAttempts(retryAfter, allowedOrigin);\n      }\n    }\n\n"
          if bucket_anchor not in text:
              raise RuntimeError('Âncora do bucket por identidade não encontrada')
          edge.write_text(text.replace(bucket_anchor, bucket_block, 1))

          test_file = Path('supabase/functions/gsa-auth-session/index_test.ts')
          text = test_file.read_text()
          text = text.replace(
              "import { handleRequest, normalizePayload } from './index.ts';",
              "import { handleRequest, normalizePayload, subjectRateLimitMode } from './index.ts';",
              1,
          )
          addition = """

          Deno.test('aplica limite por identidade antes dos fluxos de recuperação', () => {
            assertEquals(subjectRateLimitMode('request_client_recovery'), 'before');
            assertEquals(subjectRateLimitMode('complete_client_recovery'), 'before');
            assertEquals(subjectRateLimitMode('login_pin'), 'invalid-only');
            assertEquals(subjectRateLimitMode('login_admin'), 'invalid-only');
          });
          """
          if "aplica limite por identidade antes dos fluxos de recuperação" in text:
              raise RuntimeError('Teste de rate limiting já existe inesperadamente')
          test_file.write_text(text.rstrip() + addition)

          stress = Path('tests/e2e/0-stress-real-data.spec.ts')
          text = stress.read_text()
          import_anchor = "import { generateTestCPF } from '../utils/cpf-generator';\n"
          guard = import_anchor + "\nconst REAL_DATA_STRESS_ENABLED = process.env.ALLOW_REAL_DATA_STRESS_TEST === 'true';\n"
          if import_anchor not in text:
              raise RuntimeError('Âncora do teste massivo não encontrada')
          text = text.replace(import_anchor, guard, 1)
          describe_anchor = "test.describe('Testes Massivos Reais de Sistema', () => {\n"
          describe_guard = describe_anchor + "  test.skip(!REAL_DATA_STRESS_ENABLED, 'Teste com gravação real exige ALLOW_REAL_DATA_STRESS_TEST=true.');\n"
          if describe_anchor not in text:
              raise RuntimeError('Bloco do teste massivo não encontrado')
          stress.write_text(text.replace(describe_anchor, describe_guard, 1))
          PY

      - name: Replace vulnerable dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm pkg delete dependencies.vite
          npm pkg delete dependencies.@google/genai
          npm pkg set devDependencies.vite='6.4.2'
          npm pkg set dependencies.jspdf='4.2.1'
          npm pkg set dependencies.xlsx='https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz'
          npm install --package-lock-only
          rm -rf node_modules
          npm ci

      - name: Add continuous dependency monitoring
        shell: bash
        run: |
          mkdir -p .github/workflows
          cat > .github/dependabot.yml <<'YAML'
          version: 2
          updates:
            - package-ecosystem: npm
              directory: /
              schedule:
                interval: weekly
              open-pull-requests-limit: 5
            - package-ecosystem: github-actions
              directory: /
              schedule:
                interval: weekly
              open-pull-requests-limit: 5
          YAML

          cat > .github/workflows/dependency-security.yml <<'YAML'
          name: Dependency Security

          on:
            pull_request:
              branches: [main]
            push:
              branches: [main]
              paths:
                - package.json
                - package-lock.json
                - .github/workflows/dependency-security.yml
            schedule:
              - cron: '17 8 * * 1'

          permissions:
            contents: read

          jobs:
            audit:
              runs-on: ubuntu-latest
              timeout-minutes: 15
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm audit --audit-level=high
          YAML

      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high

      - name: Validate TypeScript and contracts
        run: |
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel

      - name: Validate authentication gateway
        run: |
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts

      - name: Production build
        run: npm run build

      - name: Commit validated fixes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .security-audit-fix-trigger .github/workflows/apply-security-audit-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corrigir achados críticos da auditoria de segurança'
          git push origin HEAD:agent/corrigir-auditoria-seguranca
