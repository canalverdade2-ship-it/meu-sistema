name: Integrate Home Public Final

on:
  push:
    branches: [ops/integrate-home-public-final]
    paths: ['.integrate-home-public-final-trigger']

permissions:
  contents: write
  issues: write

concurrency:
  group: integrate-home-public-final
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SOURCE_BRANCH: agent/corrigir-home-itens-2-a-10
      SOURCE_SHA: 5d7d81d756869af934cfbb7ae8fd584b0df17d75
      TARGET_BRANCH: integration/home-public-final
      OPS_BRANCH: ops/integrate-home-public-final
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate authorization and source
        shell: bash
        run: |
          set -euo pipefail
          grep -Fqx 'INTEGRATE_HOME_PUBLIC_FINAL_V1' .integrate-home-public-final-trigger
          git fetch origin main "$SOURCE_BRANCH"
          test "$(git rev-parse "origin/$SOURCE_BRANCH")" = "$SOURCE_SHA"

      - name: Merge reviewed Home changes over current main
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$TARGET_BRANCH" origin/main
          set +e
          git merge --no-ff --no-commit "origin/$SOURCE_BRANCH" > integration.log 2>&1
          merge_code=$?
          set -e

          if [ "$merge_code" -ne 0 ]; then
            git diff --name-only --diff-filter=U | sort > conflicts.log
            allowed_regex='^(\.github/workflows/quality\.yml|package\.json|scripts/check-admin-panel-contracts\.ts|src/App\.tsx|src/components/auth/RestrictedAccessModal\.tsx)$'
            unexpected=$(grep -Ev "$allowed_regex" conflicts.log || true)
            if [ -n "$unexpected" ]; then
              echo "Conflitos inesperados:" >&2
              echo "$unexpected" >&2
              exit 1
            fi

            grep -qx 'src/App.tsx' conflicts.log && git checkout --ours src/App.tsx || true
            grep -qx 'src/components/auth/RestrictedAccessModal.tsx' conflicts.log && git checkout --theirs src/components/auth/RestrictedAccessModal.tsx || true
            grep -qx 'scripts/check-admin-panel-contracts.ts' conflicts.log && git checkout --theirs scripts/check-admin-panel-contracts.ts || true
            grep -qx 'package.json' conflicts.log && git checkout --ours package.json || true
            grep -qx '.github/workflows/quality.yml' conflicts.log && git checkout --ours .github/workflows/quality.yml || true

            git show "origin/$SOURCE_BRANCH:scripts/resolve-home-current-main.py" > /tmp/resolve-home.py
            python /tmp/resolve-home.py
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package.setdefault('scripts', {})['test:home'] = 'tsx scripts/check-home-public-contracts.ts'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')

          quality_path = Path('.github/workflows/quality.yml')
          quality = quality_path.read_text()
          if 'npm run test:home' not in quality:
              marker = "      - name: GSA Viagens contracts\n"
              block = (
                  "      - name: Home public contracts\n"
                  "        if: steps.typescript.outputs.exit_code == '0' && steps.client_security.outputs.exit_code == '0'\n"
                  "        run: npm run test:home\n\n"
              )
              if marker not in quality:
                  raise RuntimeError('Ponto de inserção do teste da Home não encontrado')
              quality = quality.replace(marker, block + marker, 1)
              quality_path.write_text(quality)
          PY

          rm -f .github/workflows/sync-home-current-main.yml .sync-home-current-main-trigger scripts/resolve-home-current-main.py
          git add -A
          if git diff --cached --quiet; then
            echo 'Nenhuma alteração da Home para integrar.' >&2
            exit 1
          fi
          git commit -m 'Integrar correções finais da Home pública'

      - name: Install dependencies
        run: npm ci

      - name: Validate final integration
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel
          npm run build

      - name: Publish integration branch
        run: git push --force-with-lease origin "HEAD:$TARGET_BRANCH"

      - name: Record integration success
        shell: bash
        run: |
          integrated_sha=$(git rev-parse HEAD)
          git checkout "$OPS_BRANCH"
          git pull --ff-only origin "$OPS_BRANCH"
          printf 'SUCCESS\nsource=%s\nintegration=%s\nmain=%s\nrun=%s\n' "$SOURCE_SHA" "$integrated_sha" "$(git rev-parse origin/main)" "$GITHUB_RUN_ID" > .integrate-home-public-final-success
          git add .integrate-home-public-final-success
          git commit -m 'Registrar integração final da Home pública'
          git push origin "$OPS_BRANCH"

      - name: Publish failure diagnostic
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          touch integration.log conflicts.log
          {
            echo '## Falha na integração limpa da Home pública'
            echo
            echo "- Fonte: $SOURCE_SHA"
            echo "- Main: $(git rev-parse origin/main 2>/dev/null || true)"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo '```text'
            cat conflicts.log
            sed -n '1,260p' integration.log
            echo '```'
          } > failure.md
          gh issue create --title 'Falha integração limpa da Home pública' --body-file failure.md

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-public-final-integration
          path: |
            integration.log
            conflicts.log
          if-no-files-found: ignore
          retention-days: 30
