name: Deploy Client Portal Security

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/20260720200600_secure_client_portal_critical_flows.sql'
      - 'supabase/migrations/20260720201000_schedule_and_guard_store_credit_release.sql'
      - 'supabase/migrations/20260720201100_compat_secure_legacy_credit_release.sql'
      - 'supabase/migrations/20260720202000_revoke_client_sessions_on_access_change.sql'
      - 'supabase/migrations/20260720203000_private_client_documents_storage.sql'
      - 'supabase/migrations/20260720204000_harden_client_operational_permissions.sql'
      - 'supabase/migrations/20260720205000_optional_client_block_state_compat.sql'
      - 'supabase/migrations/20260720232000_harden_client_portal_audit_findings.sql'
      - 'supabase/functions/gsa-auth-session/**'
      - '.github/workflows/supabase-client-portal-security-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-client-portal-security-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply and verify production migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Check current migration history
        id: history
        shell: bash
        run: |
          set +e
          supabase migration list --linked > client-portal-security-migration-before.log 2>&1
          list_status=$?
          migration_applied=false
          if [ "$list_status" -eq 0 ] && grep -q "20260720232000" client-portal-security-migration-before.log; then
            migration_applied=true
          fi
          echo "migration_applied=$migration_applied" >> "$GITHUB_OUTPUT"
          cat client-portal-security-migration-before.log
          exit 0

      - name: Build atomic production bundle
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'BEGIN;'
            cat supabase/migrations/20260720232000_harden_client_portal_audit_findings.sql
            echo 'COMMIT;'
          } > client-portal-security-production.sql

      - name: Apply migrations permanently
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked \
            --file client-portal-security-production.sql \
            2>&1 | tee client-portal-security-deployment.log

      - name: Record migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration repair \
            20260720232000 \
            --status applied \
            --linked \
            2>&1 | tee client-portal-security-migration-repair.log

      - name: Deploy authentication Edge Function
        shell: bash
        run: |
          set -o pipefail
          supabase functions deploy gsa-auth-session \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt \
            2>&1 | tee client-auth-function-deployment.log

      - name: Verify authentication Edge Function deployment
        shell: bash
        run: |
          set -o pipefail
          supabase functions list \
            --project-ref "$SUPABASE_PROJECT_ID" \
            2>&1 | tee client-auth-function-list.log
          grep -q 'gsa-auth-session' client-auth-function-list.log

      - name: Verify production contracts
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked \
            --file scripts/client-portal-security-preview.sql \
            2>&1 | tee client-portal-security-verification.log

      - name: Verify migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee client-portal-security-migration-list.log
          for version in \
            20260720200600 \
            20260720201000 \
            20260720201100 \
            20260720202000 \
            20260720203000 \
            20260720204000 \
            20260720205000 \
            20260720232000; do
            grep -q "$version" client-portal-security-migration-list.log
          done

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-portal-security-production-evidence
          path: |
            client-portal-security-migration-before.log
            client-portal-security-deployment.log
            client-portal-security-migration-repair.log
            client-portal-security-verification.log
            client-portal-security-migration-list.log
            client-auth-function-deployment.log
            client-auth-function-list.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish deployment report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          ALREADY_APPLIED: ${{ steps.history.outputs.migration_applied }}
        run: |
          touch \
            client-portal-security-migration-before.log \
            client-portal-security-deployment.log \
            client-portal-security-migration-repair.log \
            client-portal-security-verification.log \
            client-portal-security-migration-list.log \
            client-auth-function-deployment.log \
            client-auth-function-list.log
          {
            echo '# Deploy definitivo do painel do cliente'
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Resultado: **$JOB_STATUS**"
            echo "- Migração constava no histórico antes da correção: **$ALREADY_APPLIED**"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo '## Edge Function de autenticação'
            echo '```text'
            tail -n 80 client-auth-function-list.log
            echo '```'
            echo
            echo '## Verificação dos contratos'
            echo '```text'
            tail -n 160 client-portal-security-verification.log
            echo '```'
            echo
            echo '## Histórico das migrações'
            echo '```text'
            tail -n 160 client-portal-security-migration-list.log
            echo '```'
          } > client-portal-security-deployment-report.md

          gh issue create \
            --title "Deploy painel do cliente - $JOB_STATUS - $GITHUB_SHA" \
            --body-file client-portal-security-deployment-report.md
