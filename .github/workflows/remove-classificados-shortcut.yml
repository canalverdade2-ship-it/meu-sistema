name: Remover atalho duplicado de Classificados

on:
  push:
    paths:
      - '.github/workflows/remove-classificados-shortcut.yml'

permissions:
  contents: write

jobs:
  remover-atalho:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remover Meus Classificados do menu e dashboard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/ClientPortal.tsx')
          text = path.read_text(encoding='utf-8')
          old = "menuItems = menuItems.filter(item => !['credito_loja', 'emprestimos', 'transferencias', 'orcamentos', 'servicos', 'produtos', 'assinaturas', 'vouchers', 'pontos', 'promocoes', 'premios', 'indique-ganhe', 'area_vip'].includes(String(item.id)));"
          new = "menuItems = menuItems.filter(item => !['classificados', 'credito_loja', 'emprestimos', 'transferencias', 'orcamentos', 'servicos', 'produtos', 'assinaturas', 'vouchers', 'pontos', 'promocoes', 'premios', 'indique-ganhe', 'area_vip'].includes(String(item.id)));"

          if new in text:
              print('A alteração já está aplicada.')
          elif old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
              print('Atalho removido com sucesso.')
          else:
              raise SystemExit('A linha esperada não foi encontrada; nenhuma alteração foi feita.')
          PY

      - name: Commitar alteração
        shell: bash
        run: |
          if git diff --quiet -- src/pages/ClientPortal.tsx; then
            echo "Nenhuma alteração pendente."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/ClientPortal.tsx
          git commit -m "Remover Meus Classificados do dashboard"
          git push origin HEAD:main
