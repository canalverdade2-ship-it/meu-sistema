name: Inspecionar consumidores de documentos - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Generate targeted report
        shell: bash
        run: |
          mkdir -p inspection
          OUT=inspection/private-document-consumers-stage6.txt
          : > "$OUT"
          {
            echo '=== FILES READING TICKET ATTACHMENTS ==='
            grep -R -l --include='*.ts' --include='*.tsx' "ticket_mensagens" src/components src/pages 2>/dev/null | sort || true
            echo
            echo '=== FILES READING OS ATTACHMENTS ==='
            grep -R -l --include='*.ts' --include='*.tsx' "anexos_os" src/components src/pages 2>/dev/null | sort || true
            echo
            echo '=== FILES USING FILE VIEWER ==='
            grep -R -l --include='*.ts' --include='*.tsx' "useFileViewer" src/components src/pages 2>/dev/null | sort || true
            echo
            echo '=== SESSION ACTOR FUNCTIONS ==='
            grep -R -n --include='*.sql' "CREATE OR REPLACE FUNCTION public.gsa_.*session_actor" supabase/migrations 2>/dev/null || true
            echo
            echo '=== STORAGE POLICIES USING JWT METADATA ==='
            grep -R -n -C 20 --include='*.sql' "gsa_actor_type\|gsa_actor_id\|app_metadata" supabase/migrations 2>/dev/null | head -n 1200 || true
          } >> "$OUT"

      - name: Publish temporary report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inspection/private-document-consumers-stage6.txt
          git commit -m "Gera consumidores temporários de documentos"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
