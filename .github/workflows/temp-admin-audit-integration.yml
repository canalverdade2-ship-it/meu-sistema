name: Temporary Admin Audit Integration

on:
  pull_request:
    branches:
      - agent/corrigir-auditoria-admin-final

permissions:
  contents: write

concurrency:
  group: admin-audit-integration
  cancel-in-progress: false

jobs:
  integrate:
    if: github.event.pull_request.head.ref == 'agent/corrigir-auditoria-admin-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-admin-final
          fetch-depth: 0

      - name: Merge audited branch with definitive conflict policy
        shell: bash
        run: |
          exec > >(tee /tmp/admin-audit-integration.log) 2>&1
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main agent/corrigir-auditoria-painel-adm
          git reset --hard origin/main

          set +e
          git merge --no-ff --no-commit origin/agent/corrigir-auditoria-painel-adm
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                src/components/admin/*|src/lib/privateStorage.ts|src/lib/supabase.ts|src/pages/AdminPanel.tsx|src/routing/adminAccess.ts|scripts/check-admin-*|scripts/run-admin-*|supabase/migrations/*)
                  git checkout --theirs -- "$path"
                  ;;
                *)
                  git checkout --ours -- "$path"
                  ;;
              esac
              git add "$path"
            done < <(git diff --name-only --diff-filter=U)
          fi

          git checkout HEAD -- .github/workflows/quality.yml
          git add .github/workflows/quality.yml

          unresolved="$(git diff --name-only --diff-filter=U)"
          printf '%s\n' "$unresolved" > /tmp/admin-audit-conflicts.txt
          if [ -n "$unresolved" ]; then
            echo "Conflitos ainda não resolvidos:"
            echo "$unresolved"
            exit 2
          fi

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/lib/supabase.ts')
          text = path.read_text()
          text = text.replace(
              "const MAX_CLIENT_FILE_SIZE = 20 * 1024 * 1024;",
              "const MAX_CLIENT_FILE_SIZE = 10 * 1024 * 1024;",
          ).replace(
              "O arquivo deve possuir no máximo 20 MB.",
              "O arquivo deve possuir no máximo 10 MB.",
          )
          strict_validator = '''function validateClientStoragePath(bucket: string, path: string): string {
            const normalized = normalizeStoragePath(path);
            if (bucket !== PRIVATE_CLIENT_BUCKET) return normalized;

            const actor = getStoredActor();
            if (actor?.atorTipo === 'cliente' && actor.atorId) {
              const segments = normalized.split('/');
              const actorInRoot = segments[0] === actor.atorId;
              const actorInOwnedContext = [
                'credito_documentos', 'credito_contratos', 'cliente_documentos',
                'documentos', 'perfil', 'suporte', 'tickets',
              ].includes(segments[0]) && segments[1] === actor.atorId;

              if (!actorInRoot && !actorInOwnedContext) {
                throw new Error('O arquivo não pertence ao cliente autenticado.');
              }
            }

            return normalized;
          }'''
          text, count = re.subn(
              r"function validateClientStoragePath\(bucket: string, path: string\): string \{.*?\n\}",
              strict_validator,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Não foi possível preservar a validação privada do cliente.')
          path.write_text(text)
          PY

          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts['test:admin'] = 'tsx scripts/check-admin-panel-contracts.ts && node scripts/run-admin-migrations-runtime.cjs';
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          rm -f audit/admin-ci-trigger.txt
          rm -f audit/trigger-admin-audit-integration.txt
          rm -f .sync-admin-audit-current-main-trigger
          rm -f .github/workflows/sync-admin-audit-current-main.yml
          rm -f .github/workflows/temp-admin-audit-integration.yml
          git add -A

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate integrated package
        env:
          PGPASSWORD: postgres
        run: |
          npm run lint
          npm run test:admin
          npm run test:client-security
          npm run test:provider
          npm run test:travel
          npm run build

      - name: Publish definitive integration
        run: |
          git add -A
          git commit -m "Integrar definitivamente a auditoria administrativa"
          git push origin HEAD:agent/corrigir-auditoria-admin-final

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-integration-evidence
          path: |
            /tmp/admin-audit-conflicts.txt
            /tmp/admin-audit-integration.log
          retention-days: 1
          if-no-files-found: ignore
