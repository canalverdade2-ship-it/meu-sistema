name: Temporary Admin Audit Integration

on:
  pull_request:
    branches:
      - agent/corrigir-auditoria-admin-final

permissions:
  contents: write

concurrency:
  group: admin-audit-integration
  cancel-in-progress: false

jobs:
  integrate:
    if: github.event.pull_request.head.ref == 'agent/corrigir-auditoria-admin-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-admin-final
          fetch-depth: 0

      - name: Merge audited branch with explicit conflict policy
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main agent/corrigir-auditoria-painel-adm

          set +e
          git merge --no-ff --no-commit origin/agent/corrigir-auditoria-painel-adm
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            for path in \
              .github/workflows/quality.yml \
              package.json \
              scripts/check-admin-panel-contracts.ts \
              src/App.tsx \
              src/lib/sessionService.ts \
              src/pages/AdminPanel.tsx \
              src/routing/adminAccess.ts; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$path"; then
                git checkout --ours -- "$path"
                git add "$path"
              fi
            done

            for path in \
              src/components/admin/AcessosModule.tsx \
              src/lib/supabase.ts; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$path"; then
                git checkout --theirs -- "$path"
                git add "$path"
              fi
            done
          fi

          unresolved="$(git diff --name-only --diff-filter=U)"
          printf '%s\n' "$unresolved" > /tmp/admin-audit-conflicts.txt
          if [ -n "$unresolved" ]; then
            echo "Conflitos ainda não resolvidos:"
            echo "$unresolved"
            exit 2
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts['test:admin'] = 'tsx scripts/check-admin-panel-contracts.ts && node scripts/run-admin-migrations-runtime.cjs';
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          rm -f audit/admin-ci-trigger.txt
          rm -f .github/workflows/temp-admin-audit-integration.yml
          git add -A
          git commit -m "Integrar auditoria administrativa sobre a main atual"
          git push origin HEAD:agent/corrigir-auditoria-admin-final

      - name: Upload conflict evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-integration-conflicts
          path: /tmp/admin-audit-conflicts.txt
          retention-days: 1
          if-no-files-found: ignore
