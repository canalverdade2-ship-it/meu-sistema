name: Apply GSA Viagens Financial Integrity

on:
  push:
    branches: [fix/gsa-viagens-financeiro-reembolsos]
    paths:
      - '.gsa-financial-deploy-trigger'

permissions:
  contents: read
  issues: write

concurrency:
  group: gsa-viagens-financial-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and apply financial migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo 'SUPABASE_ACCESS_TOKEN não configurado.'; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo 'SUPABASE_DB_PASSWORD não configurado.'; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo 'SUPABASE_PROJECT_ID não configurado.'; exit 1; }
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID" || {
            echo 'Project Reference não autorizado.'
            exit 1
          }
          grep -Fxq 'APPLY_GSA_FINANCIAL_20260721' .gsa-financial-deploy-trigger || {
            echo 'Gatilho de implantação inválido.'
            exit 1
          }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link authorized project
        shell: bash
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Build atomic migration bundle
        shell: bash
        run: |
          set -euo pipefail
          : > gsa-financial-body.sql
          for migration in \
            supabase/migrations/20260721150000_gsa_viagens_financial_integrity.sql \
            supabase/migrations/20260721150100_gsa_viagens_admin_refund_queue.sql
          do
            sed -E '/^[[:space:]]*BEGIN;[[:space:]]*$/d; /^[[:space:]]*COMMIT;[[:space:]]*$/d' "$migration" >> gsa-financial-body.sql
            printf '\n' >> gsa-financial-body.sql
          done

          cat > gsa-financial-verification.sql <<'SQL'
          DO $verify$
          BEGIN
            IF to_regclass('public.viagens_transacao_parcelas') IS NULL THEN
              RAISE EXCEPTION 'Tabela viagens_transacao_parcelas ausente.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'viagens_transacoes'
                AND column_name = 'valor_total_contrato'
            ) OR NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'viagens_transacoes'
                AND column_name = 'valor_efetivamente_pago'
            ) OR NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'viagens_transacoes'
                AND column_name = 'valor_elegivel_reembolso'
            ) THEN
              RAISE EXCEPTION 'Colunas financeiras obrigatórias ausentes.';
            END IF;

            IF to_regprocedure('public.gsa_refresh_travel_financial_summary(uuid)') IS NULL
               OR to_regprocedure('public.gsa_request_travel_cancellation(uuid,text,uuid,uuid,text)') IS NULL
               OR to_regprocedure('public.gsa_admin_resolve_travel_cancellation(uuid,text,uuid,uuid,text,numeric,numeric,text)') IS NULL
               OR to_regprocedure('public.gsa_admin_travel_cancellation_list(uuid,text,integer,integer,text,text)') IS NULL THEN
              RAISE EXCEPTION 'RPC financeira obrigatória ausente.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_gsa_sync_travel_invoice_financials'
                AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'Trigger de conciliação financeira ausente.';
            END IF;

            IF EXISTS (
              SELECT 1
              FROM public.viagens_transacoes
              WHERE COALESCE(valor_total_contrato, 0) < 0
                 OR valor_faturado < 0
                 OR valor_efetivamente_pago < 0
                 OR valor_em_aberto < 0
                 OR valor_elegivel_reembolso < 0
                 OR valor_elegivel_reembolso > valor_efetivamente_pago + 0.009
            ) THEN
              RAISE EXCEPTION 'Resumo financeiro inconsistente.';
            END IF;

            IF has_function_privilege(
              'anon',
              'public.gsa_admin_resolve_travel_cancellation(uuid,text,uuid,uuid,text,numeric,numeric,text)',
              'EXECUTE'
            ) THEN
              RAISE EXCEPTION 'RPC administrativa exposta ao papel anon.';
            END IF;

            IF NOT has_function_privilege(
              'authenticated',
              'public.gsa_admin_resolve_travel_cancellation(uuid,text,uuid,uuid,text,numeric,numeric,text)',
              'EXECUTE'
            ) THEN
              RAISE EXCEPTION 'RPC administrativa indisponível para sessão autenticada.';
            END IF;
          END;
          $verify$;
          SQL

          {
            echo 'BEGIN;'
            cat gsa-financial-body.sql
            cat gsa-financial-verification.sql
            echo 'ROLLBACK;'
          } > gsa-financial-preflight.sql

          {
            echo 'BEGIN;'
            cat gsa-financial-body.sql
            cat gsa-financial-verification.sql
            echo 'COMMIT;'
          } > gsa-financial-apply.sql

      - name: Validate against production with rollback
        id: preflight
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file gsa-financial-preflight.sql 2>&1 | tee gsa-financial-preflight.log

      - name: Apply migrations atomically
        id: apply
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file gsa-financial-apply.sql 2>&1 | tee gsa-financial-apply.log

      - name: Register migration history
        id: history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration repair 20260721150000 20260721150100 --status applied --linked
          supabase migration list --linked | tee gsa-financial-history.log
          grep -q '20260721150000' gsa-financial-history.log
          grep -q '20260721150100' gsa-financial-history.log

      - name: Verify persisted production state
        id: verify
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked --file gsa-financial-verification.sql 2>&1 | tee gsa-financial-verification.log

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsa-financial-production-evidence
          path: |
            gsa-financial-preflight.log
            gsa-financial-apply.log
            gsa-financial-history.log
            gsa-financial-verification.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish private deployment result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          PREFLIGHT_STATUS: ${{ steps.preflight.outcome }}
          APPLY_STATUS: ${{ steps.apply.outcome }}
          HISTORY_STATUS: ${{ steps.history.outcome }}
          VERIFY_STATUS: ${{ steps.verify.outcome }}
        run: |
          touch gsa-financial-preflight.log gsa-financial-apply.log gsa-financial-history.log gsa-financial-verification.log
          {
            echo '# Implantação financeira do GSA Viagens'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Resultado geral: **$JOB_STATUS**"
            echo "- Prévia com rollback: **$PREFLIGHT_STATUS**"
            echo "- Aplicação atômica: **$APPLY_STATUS**"
            echo "- Histórico de migrations: **$HISTORY_STATUS**"
            echo "- Auditoria persistida: **$VERIFY_STATUS**"
            echo
            echo '## Últimas mensagens'
            echo '```text'
            tail -n 40 gsa-financial-preflight.log
            tail -n 40 gsa-financial-apply.log
            tail -n 40 gsa-financial-history.log
            tail -n 40 gsa-financial-verification.log
            echo '```'
          } > gsa-financial-deployment-report.md

          gh issue create \
            --title "GSA Viagens financeiro produção: $JOB_STATUS" \
            --body-file gsa-financial-deployment-report.md
