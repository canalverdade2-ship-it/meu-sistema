name: Verify GSA Viagens on Supabase

on:
  push:
    branches: [ops/verify-gsa-viagens-production]
    paths:
      - '.gsa-verify-trigger'

permissions:
  contents: read
  issues: write

concurrency:
  group: verify-gsa-viagens-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify GSA Viagens
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate verification authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          grep -Fxq 'VERIFY_GSA_VIAGENS_20260720' .gsa-verify-trigger

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link authorized project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Verify deployed objects
        shell: bash
        run: |
          set -o pipefail
          supabase db query --linked \
            --file scripts/gsa-viagens-post-deploy.sql \
            2>&1 | tee gsa-verification.log

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gsa-viagens-verification-evidence
          path: gsa-verification.log
          retention-days: 30

      - name: Publish private verification report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch gsa-verification.log
          {
            echo '# Verificação do GSA Viagens'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Resultado: **$JOB_STATUS**"
            echo
            echo '```text'
            sed -n '1,220p' gsa-verification.log
            echo '```'
          } > gsa-verification-report.md

          gh issue create \
            --title "Verificação GSA Viagens - $JOB_STATUS" \
            --body-file gsa-verification-report.md
