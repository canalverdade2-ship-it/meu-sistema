name: Diagnose PR225 Frontend References Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-pr225-frontend-refs-once.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Collect references with surrounding context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          {
            echo "generated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo '--- direct Supabase references ---'
            grep -RInE -C 4 "\.from[[:space:]]*\([[:space:]]*['\"](loja_carrinhos|promocoes_quantidade_ativadas)['\"]" src || true
            echo '--- operational RPC references ---'
            grep -RInE -C 3 "gsa_client_operational_write|cliente_operational_write" src || true
          } > deployment-status/pr225-frontend-references.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deployment-status/pr225-frontend-references.txt
          git commit -m 'Registrar referencias frontend afetadas pela PR 225'
          git pull --rebase origin main
          git push origin HEAD:main
