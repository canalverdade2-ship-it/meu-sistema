name: Agent Deploy Home Security

on:
  push:
    branches:
      - agent/corrigir-home-seguranca-arquitetura
    paths:
      - '.github/workflows/agent-deploy-home.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-deploy-home-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase and validate frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-home-seguranca-arquitetura

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo 'SUPABASE_ACCESS_TOKEN não configurado.'; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo 'SUPABASE_DB_PASSWORD não configurado.'; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo 'SUPABASE_PROJECT_ID não configurado.'; exit 1; }
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID" || {
            echo 'O Project Reference configurado não corresponde ao projeto autorizado.'
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy authentication Edge Function
        shell: bash
        run: |
          set -o pipefail
          supabase functions deploy gsa-auth-session \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt 2>&1 | tee function-deploy.log

      - name: Apply only the Home security migration
        shell: bash
        run: |
          set -euo pipefail
          MIGRATION_FILE='supabase/migrations/20260720170000_secure_home_public_access.sql'
          test -f "$MIGRATION_FILE"
          supabase db query --help > db-query-help.log 2>&1

          set +e
          if grep -q -- '--file' db-query-help.log; then
            timeout 180 supabase db query --linked --file "$MIGRATION_FILE" > migration-apply.log 2>&1
            code=$?
          else
            timeout 180 bash -o pipefail -c "cat '$MIGRATION_FILE' | supabase db query --linked" > migration-apply.log 2>&1
            code=$?
          fi
          set -e

          cat migration-apply.log
          if [ "$code" -ne 0 ]; then
            echo 'Falha ao executar a migration isolada.'
            cat db-query-help.log
            exit "$code"
          fi

      - name: Register migration version
        shell: bash
        run: |
          set -o pipefail
          supabase migration repair 20260720170000 --status applied --linked 2>&1 | tee migration-repair.log || true

      - name: Verify remote state
        shell: bash
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee function-list.log
          grep -q 'gsa-auth-session' function-list.log

          VERIFY_SQL="select public.gsa_public_registration_settings() is not null as settings_ok;"
          if grep -q -- '--query' db-query-help.log; then
            supabase db query --linked --query "$VERIFY_SQL" 2>&1 | tee database-verify.log
          else
            printf '%s\n' "$VERIFY_SQL" | supabase db query --linked 2>&1 | tee database-verify.log
          fi
          grep -qi 'true\|settings_ok' database-verify.log

      - name: Publish private deployment report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch function-deploy.log db-query-help.log migration-apply.log migration-repair.log function-list.log database-verify.log
          {
            echo '# Implantação da Home — relatório'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Resultado: **$JOB_STATUS**"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            for file in function-deploy.log db-query-help.log migration-apply.log migration-repair.log function-list.log database-verify.log; do
              echo "## $file"
              echo '```text'
              sed -n '1,240p' "$file"
              echo '```'
              echo
            done
          } > deployment-report.md

          gh issue create \
            --title "Implantação Home #$GITHUB_RUN_NUMBER — $JOB_STATUS" \
            --body-file deployment-report.md
