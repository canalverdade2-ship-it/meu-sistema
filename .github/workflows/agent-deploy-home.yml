name: Agent Deploy Home Security

on:
  push:
    branches:
      - agent/corrigir-home-seguranca-arquitetura
    paths:
      - '.github/workflows/agent-deploy-home.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-deploy-home-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase and validate frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-home-seguranca-arquitetura

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo 'SUPABASE_ACCESS_TOKEN não configurado.'; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo 'SUPABASE_DB_PASSWORD não configurado.'; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo 'SUPABASE_PROJECT_ID não configurado.'; exit 1; }
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID" || {
            echo 'O Project Reference configurado não corresponde ao projeto autorizado.'
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preview pending migrations
        shell: bash
        run: |
          set -o pipefail
          supabase db push --linked --dry-run 2>&1 | tee migration-dry-run.log

      - name: Deploy authentication Edge Function
        shell: bash
        run: |
          set -o pipefail
          supabase functions deploy gsa-auth-session \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt 2>&1 | tee function-deploy.log

      - name: Apply database migration
        shell: bash
        run: |
          set -o pipefail
          supabase db push --linked 2>&1 | tee migration-apply.log

      - name: Verify remote state
        shell: bash
        run: |
          set -o pipefail
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee function-list.log
          supabase migration list --linked 2>&1 | tee migration-list.log
          grep -q 'gsa-auth-session' function-list.log
          grep -q '20260720170000' migration-list.log

      - name: Publish private deployment report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          touch migration-dry-run.log function-deploy.log migration-apply.log function-list.log migration-list.log
          {
            echo '# Implantação da Home — relatório'
            echo
            echo "- Projeto: \`$EXPECTED_PROJECT_ID\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Resultado: **$JOB_STATUS**"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            for file in migration-dry-run.log function-deploy.log migration-apply.log function-list.log migration-list.log; do
              echo "## $file"
              echo '```text'
              sed -n '1,220p' "$file"
              echo '```'
              echo
            done
          } > deployment-report.md

          gh issue create \
            --title "Implantação Home #$GITHUB_RUN_NUMBER — $JOB_STATUS" \
            --body-file deployment-report.md
