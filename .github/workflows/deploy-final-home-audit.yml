name: Deploy Final Home Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-final-home-audit.yml'

permissions:
  contents: write

concurrency:
  group: deploy-final-home-audit
  cancel-in-progress: false

jobs:
  deploy-verify-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_SHA: b2f6b75cc9af28f64ba7972b6bad667e829d6ec0
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      DEVELOPMENT_ORIGINS: http://10.0.2.189:3000,http://localhost:3000,http://127.0.0.1:3000

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate source and deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_ID"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          git cat-file -e "$SOURCE_SHA^{commit}"
          git merge-base --is-ancestor "$SOURCE_SHA" HEAD

          for path in \
            supabase/migrations/20260721124500_finalize_public_home_budget.sql \
            supabase/migrations/20260721125000_disable_unverified_first_access.sql \
            supabase/migrations/20260721125500_prevent_recovery_subject_lockout.sql \
            supabase/functions/gsa-public-budget/index.ts
          do
            git cat-file -e "$SOURCE_SHA:$path"
          done

      - name: Materialize exact validated artifacts
        run: |
          git checkout "$SOURCE_SHA" -- \
            supabase/migrations/20260721124500_finalize_public_home_budget.sql \
            supabase/migrations/20260721125000_disable_unverified_first_access.sql \
            supabase/migrations/20260721125500_prevent_recovery_subject_lockout.sql \
            supabase/functions/gsa-public-budget/index.ts

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link expected production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Configure allowed development origins
        run: supabase secrets set ALLOWED_ORIGINS="$DEVELOPMENT_ORIGINS" --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply only final Home migrations idempotently
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee final-home-migrations-before.log

          apply_migration() {
            version="$1"
            file="$2"
            if awk -F'|' -v target="$version" '
              {
                remote=$2
                gsub(/[^0-9]/, "", remote)
                if (remote == target) found=1
              }
              END { exit found ? 0 : 1 }
            ' final-home-migrations-before.log; then
              echo "Migration $version já registrada."
            else
              supabase db query --linked --file "$file"
              supabase migration repair --linked --status applied "$version"
            fi
          }

          apply_migration 20260721124500 supabase/migrations/20260721124500_finalize_public_home_budget.sql
          apply_migration 20260721125000 supabase/migrations/20260721125000_disable_unverified_first_access.sql
          apply_migration 20260721125500 supabase/migrations/20260721125500_prevent_recovery_subject_lockout.sql

      - name: Publish public budget gateway
        run: supabase functions deploy gsa-public-budget --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Verify production migrations and permissions
        shell: bash
        run: |
          set -euo pipefail
          cat > verify-final-home-production.sql <<'SQL'
          DO $verify$
          DECLARE
            v_count integer;
            v_result jsonb;
          BEGIN
            SELECT count(*) INTO v_count
            FROM supabase_migrations.schema_migrations
            WHERE version IN ('20260721124500', '20260721125000', '20260721125500');
            IF v_count <> 3 THEN
              RAISE EXCEPTION 'Histórico das migrations finais da Home incompleto: % de 3', v_count;
            END IF;

            IF to_regprocedure('public.gsa_public_create_enterprise_budget_v2(jsonb)') IS NULL
               OR to_regprocedure('public.gsa_public_create_enterprise_budget(jsonb)') IS NULL
               OR to_regprocedure('public.gsa_auth_rate_limit_check(text,integer,integer,integer)') IS NULL THEN
              RAISE EXCEPTION 'Objetos finais da Home ausentes.';
            END IF;

            IF has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget_v2(jsonb)', 'EXECUTE')
               OR has_function_privilege('authenticated', 'public.gsa_public_create_enterprise_budget_v2(jsonb)', 'EXECUTE')
               OR has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE')
               OR has_function_privilege('authenticated', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE')
               OR NOT has_function_privilege('service_role', 'public.gsa_public_create_enterprise_budget_v2(jsonb)', 'EXECUTE') THEN
              RAISE EXCEPTION 'Permissões das rotinas de orçamento incorretas.';
            END IF;

            IF EXISTS (
              SELECT 1
              FROM pg_proc p
              JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname = 'public'
                AND p.proname = 'gsa_set_pin_and_login'
                AND (
                  has_function_privilege('anon', p.oid, 'EXECUTE')
                  OR has_function_privilege('authenticated', p.oid, 'EXECUTE')
                  OR has_function_privilege('service_role', p.oid, 'EXECUTE')
                )
            ) THEN
              RAISE EXCEPTION 'Primeiro acesso sem OTP ainda possui permissão pública ou de gateway.';
            END IF;

            v_result := public.gsa_auth_rate_limit_check(repeat('f', 64), 4, 1800, 7200);
            IF NOT coalesce((v_result->>'allowed')::boolean, false) THEN
              RAISE EXCEPTION 'Bucket de recuperação por documento continua bloqueável: %', v_result;
            END IF;
          END;
          $verify$;
          SELECT 'FINAL_HOME_PRODUCTION_VERIFIED' AS result;
          SQL

          supabase db query --linked --file verify-final-home-production.sql 2>&1 | tee final-home-production-verification.log

      - name: Verify gateway CORS
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/gsa-public-budget"

          for origin in \
            http://10.0.2.189:3000 \
            http://localhost:3000 \
            http://127.0.0.1:3000
          do
            status=$(curl -sS -o /tmp/cors-body -D /tmp/cors-headers -w '%{http_code}' \
              -X OPTIONS -H "Origin: $origin" "$endpoint")
            test "$status" = '204'
            grep -qi "^access-control-allow-origin: $origin" /tmp/cors-headers
          done

          blocked=$(curl -sS -o /tmp/blocked-body -w '%{http_code}' \
            -X OPTIONS -H 'Origin: https://attacker.example' "$endpoint")
          test "$blocked" = '403'

      - name: Record success and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard origin/main
          rm .github/workflows/deploy-final-home-audit.yml
          mkdir -p deployment-status
          cat > deployment-status/final-home-audit.json <<JSON
          {
            "status": "success",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "source_sha": "${SOURCE_SHA}",
            "validated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "migrations": "success",
            "database_permissions": "success",
            "edge_function": "success",
            "cors": "success",
            "allowed_origins": "${DEVELOPMENT_ORIGINS}"
          }
          JSON

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy-final-home-audit.yml deployment-status/final-home-audit.json
          git commit -m 'Registrar implantação final da auditoria da Home'

          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          exit 1

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-home-audit-production-evidence
          path: |
            final-home-migrations-before.log
            final-home-production-verification.log
            verify-final-home-production.sql
          if-no-files-found: ignore
          retention-days: 30
