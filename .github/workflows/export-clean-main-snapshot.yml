name: Export clean main snapshot

on:
  pull_request:
    branches:
      - agent/current-main-clean-export-base

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create snapshot
        run: tar --exclude=.git -czf /tmp/clean-main-repository.tar.gz .
      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: clean-main-repository-snapshot
          path: /tmp/clean-main-repository.tar.gz
          retention-days: 1
