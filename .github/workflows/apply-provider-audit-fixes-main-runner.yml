name: Apply Provider Audit Fixes Main Runner

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

concurrency:
  group: apply-provider-audit-fixes-main-runner
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/harden-provider-portal-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-provider-portal-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply reviewed corrections
        id: patch
        shell: bash
        run: |
          set +e
          python scripts/apply-provider-audit-fixes.py > provider-patch.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python - <<'PY'
          from pathlib import Path
          path = Path('scripts/check-provider-portal-security-contracts.ts')
          content = path.read_text(encoding='utf-8')
          old = """  await includes('src/hooks/useProviderNotifications.tsx', [
              'const HEARTBEAT_INTERVAL_MS = 60_000;',
              'gsa_provider_pendency_snapshot',
              'destinatario_tipo=in.(broadcast_prestadores,broadcast_todos)',
            ]);"""
          new = """  await includes('src/hooks/useProviderNotifications.tsx', [
              'const HEARTBEAT_INTERVAL_MS = 60_000;',
              'providerOperations.pendencySnapshot',
              'destinatario_tipo=in.(broadcast_prestadores,broadcast_todos)',
            ]);"""
          if old not in content:
              raise SystemExit('Contrato de pendências não encontrado para correção')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
            status=$?
          fi
          cat provider-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish patch diagnostic
        if: steps.patch.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Falha ao aplicar correções do Painel do Prestador'
            echo
            echo "Commit: $GITHUB_SHA"
            echo '```text'
            sed -n '1,240p' provider-patch.log
            echo '```'
          } > provider-patch-report.md
          gh issue create --title 'Diagnóstico correção Painel do Prestador' --body-file provider-patch-report.md
      - name: Enforce patch result
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Install dependencies
        if: steps.patch.outputs.status == '0'
        run: npm ci
      - name: Validate TypeScript
        if: steps.patch.outputs.status == '0'
        run: npm run lint
      - name: Validate provider security contracts
        if: steps.patch.outputs.status == '0'
        id: provider_contracts
        shell: bash
        run: |
          set +e
          npm run test:provider > provider-contracts.log 2>&1
          status=$?
          cat provider-contracts.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish provider contract diagnostic
        if: steps.patch.outputs.status == '0' && steps.provider_contracts.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Falha nos contratos do Painel do Prestador'
            echo
            echo "Commit: $GITHUB_SHA"
            echo '```text'
            sed -n '1,240p' provider-contracts.log
            echo '```'
          } > provider-contract-report.md
          gh issue create --title 'Diagnóstico contratos Painel do Prestador' --body-file provider-contract-report.md
      - name: Enforce provider contract result
        if: steps.patch.outputs.status == '0' && steps.provider_contracts.outputs.status != '0'
        run: exit 1
      - name: Build production bundle
        if: steps.patch.outputs.status == '0' && steps.provider_contracts.outputs.status == '0'
        run: npm run build
      - name: Publish definitive correction commit
        if: steps.patch.outputs.status == '0' && steps.provider_contracts.outputs.status == '0'
        run: |
          git checkout -- .github/workflows/quality.yml
          git checkout -- .github/workflows/provider-portal-validation.yml
          git checkout -- .github/workflows/apply-provider-audit-fixes.yml
          rm -f scripts/apply-provider-audit-fixes.py
          rm -f .provider-audit-fix-trigger
          rm -f provider-patch.log provider-contracts.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corrigir integralmente os itens da auditoria do prestador'
          git push origin HEAD:agent/harden-provider-portal-audit
