name: Integrate Home Final

on:
  push:
    branches: [main]
    paths: ['.github/workflows/integrate-home-final.yml']

permissions:
  contents: write

concurrency:
  group: integrate-home-final
  cancel-in-progress: false

jobs:
  integrate-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Integrate Home audit branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/finalizar-home-itens-2-a-10
          git merge --no-ff --no-commit -X theirs origin/agent/finalizar-home-itens-2-a-10 || true

          conflicts="$(git diff --name-only --diff-filter=U)"
          if [ -n "$conflicts" ]; then
            echo 'Conflitos não resolvidos:' >&2
            echo "$conflicts" >&2
            exit 1
          fi

          rm -f .github/workflows/home-admin-diagnostic.yml
          git add -A

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Validate integrated application
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts
          npm run build

      - name: Validate production credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply Home migrations idempotently
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee home-migrations-before.log

          apply_migration() {
            version="$1"
            file="$2"
            if awk -F'|' -v target="$version" '
              {
                remote=$2
                gsub(/[^0-9]/, "", remote)
                if (remote == target) found=1
              }
              END { exit found ? 0 : 1 }
            ' home-migrations-before.log; then
              echo "Migration $version já aplicada."
            else
              supabase db query --linked --file "$file"
              supabase migration repair --linked --status applied "$version"
            fi
          }

          apply_migration 20260720215500 supabase/migrations/20260720215500_fix_public_home_contracts.sql
          apply_migration 20260720215530 supabase/migrations/20260720215530_minimize_public_referral_lookup.sql
          apply_migration 20260720215600 supabase/migrations/20260720215600_guard_legacy_budget_permissions.sql

      - name: Verify Home production objects
        shell: bash
        run: |
          cat > verify-home-production.sql <<'SQL'
          DO $$
          DECLARE
            v_count integer;
          BEGIN
            SELECT count(*) INTO v_count
              FROM supabase_migrations.schema_migrations
             WHERE version IN ('20260720215500','20260720215530','20260720215600');
            IF v_count <> 3 THEN
              RAISE EXCEPTION 'Migrations da Home incompletas: % de 3', v_count;
            END IF;

            IF to_regprocedure('public.gsa_public_create_enterprise_budget_v2(jsonb)') IS NULL THEN
              RAISE EXCEPTION 'Orçamento público protegido ausente';
            END IF;

            IF to_regprocedure('public.gsa_public_validate_referral(text)') IS NULL
               AND to_regprocedure('public.gsa_public_lookup_referral(text)') IS NULL THEN
              RAISE EXCEPTION 'Validação pública minimizada de indicação ausente';
            END IF;
          END $$;
          SELECT 'HOME_PRODUCTION_VERIFIED' AS result;
          SQL
          supabase db query --linked --file verify-home-production.sql 2>&1 | tee home-production-verification.log
          grep -q HOME_PRODUCTION_VERIFIED home-production-verification.log

      - name: Publish authentication gateway
        run: supabase functions deploy gsa-auth-session --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Commit and publish integrated Home
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/integrate-home-final.yml
          git add -A
          git commit -m 'Integrar e publicar correções finais da Home'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-final-integration-evidence
          path: |
            home-migrations-before.log
            home-production-verification.log
          if-no-files-found: ignore
          retention-days: 30
