name: Integrate Home Final

on:
  push:
    branches: [main]
    paths: ['.github/workflows/integrate-home-final.yml']

permissions:
  contents: write
  issues: write

concurrency:
  group: integrate-home-final
  cancel-in-progress: true

jobs:
  integrate-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      SOURCE_SHA: edcc1878e9d69adf6ab38ed5699d1e34b0e9d200
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git and validate source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main integration/home-public-final
          git cat-file -e "$SOURCE_SHA^{commit}"
          test "$(git rev-parse origin/integration/home-public-final)" = "$SOURCE_SHA"

      - name: Integrate validated Home commit
        shell: bash
        run: |
          set -euo pipefail
          set +e
          git merge --no-ff --no-commit "$SOURCE_SHA" > home-integration.log 2>&1
          merge_code=$?
          set -e

          if [ "$merge_code" -ne 0 ]; then
            git diff --name-only --diff-filter=U | sort > home-conflicts.log
            allowed='scripts/check-admin-panel-contracts.ts'
            unexpected=$(grep -vx "$allowed" home-conflicts.log || true)
            if [ -n "$unexpected" ]; then
              echo 'Conflitos inesperados na Home:' >&2
              echo "$unexpected" >&2
              exit 1
            fi
            git checkout --ours scripts/check-admin-panel-contracts.ts
            git add scripts/check-admin-panel-contracts.ts
          fi

          rm -f \
            .github/workflows/sync-home-current-main.yml \
            .sync-home-current-main-trigger \
            scripts/resolve-home-current-main.py \
            .github/workflows/home-admin-diagnostic.yml
          git add -A
          git commit -m 'Integrar e publicar correções finais da Home'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Validate integrated application
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts
          npm run build

      - name: Validate production credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Verify Home migrations and objects
        shell: bash
        run: |
          cat > verify-home-production.sql <<'SQL'
          DO $$
          DECLARE
            v_count integer;
          BEGIN
            SELECT count(*) INTO v_count
              FROM supabase_migrations.schema_migrations
             WHERE version IN ('20260720215500','20260720215530','20260720215600');
            IF v_count <> 3 THEN
              RAISE EXCEPTION 'Migrations da Home incompletas: % de 3', v_count;
            END IF;

            IF to_regprocedure('public.gsa_public_lookup_referral(text)') IS NULL
               OR to_regprocedure('public.gsa_public_register_client(text,jsonb)') IS NULL
               OR to_regprocedure('public.gsa_public_register_provider(jsonb)') IS NULL
               OR to_regprocedure('public.gsa_public_create_enterprise_budget_v2(jsonb)') IS NULL THEN
              RAISE EXCEPTION 'Objetos públicos obrigatórios da Home ausentes';
            END IF;

            IF has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE')
               OR has_function_privilege('authenticated', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE') THEN
              RAISE EXCEPTION 'Função legada de orçamento ainda possui acesso público';
            END IF;
          END $$;
          SELECT 'HOME_PRODUCTION_VERIFIED' AS result;
          SQL
          supabase db query --linked --file verify-home-production.sql 2>&1 | tee home-production-verification.log
          grep -q HOME_PRODUCTION_VERIFIED home-production-verification.log

      - name: Publish authentication gateway
        run: supabase functions deploy gsa-auth-session --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Publish integrated Home to main
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/integrate-home-final.yml
          git commit -m 'Remover integrador temporário da Home'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish failure diagnostic
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          touch home-integration.log home-conflicts.log home-production-verification.log
          {
            echo '## Falha na publicação definitiva da Home'
            echo
            echo "- Fonte: $SOURCE_SHA"
            echo "- Execução: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo '### Integração'
            echo '```text'
            cat home-conflicts.log
            sed -n '1,220p' home-integration.log
            echo '```'
            echo '### Produção'
            echo '```text'
            cat home-production-verification.log
            echo '```'
          } > home-final-failure.md
          gh issue create --title 'Falha publicação definitiva da Home' --body-file home-final-failure.md

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-final-integration-evidence
          path: |
            home-integration.log
            home-conflicts.log
            home-production-verification.log
          if-no-files-found: ignore
          retention-days: 30
