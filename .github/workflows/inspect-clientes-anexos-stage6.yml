name: Inspecionar anexos em clientes - Etapa 6

on:
  push:
    branches:
      - agent/seguranca-documentos-servicos-etapa-6

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/seguranca-documentos-servicos-etapa-6
          fetch-depth: 0

      - name: Generate excerpt
        shell: bash
        run: |
          mkdir -p inspection
          grep -n -C 35 "anexos_os" src/components/admin/ClientesModule.tsx > inspection/clientes-anexos-stage6.txt || true

      - name: Publish excerpt
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inspection/clientes-anexos-stage6.txt
          git commit -m "Gera trecho temporario de anexos em clientes"
          git push origin HEAD:agent/seguranca-documentos-servicos-etapa-6
