name: Database Source Reference Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/20260722190000_close_production_inventory_gaps.sql'
      - 'scripts/list-database-source-references.mjs'
      - 'scripts/check-production-inventory-gap-contracts.mjs'
      - '.github/workflows/database-source-reference-audit.yml'
      - '.github/workflows/apply-production-inventory-gaps.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  map-references:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout audited revision
        uses: actions/checkout@v4

      - name: Validate production inventory gap contracts
        run: node scripts/check-production-inventory-gap-contracts.mjs

      - name: Map database references
        run: node scripts/list-database-source-references.mjs

      - name: Upload reference map
        uses: actions/upload-artifact@v4
        with:
          name: database-source-references-${{ github.run_id }}
          path: audit/database-source-references.json
          retention-days: 30
          if-no-files-found: error
