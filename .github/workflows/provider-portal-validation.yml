name: Provider Portal Validation

on:
  push:
    branches: [main, 'agent/**', 'fix/**']
    paths:
      - 'src/components/prestador/**'
      - 'src/pages/Prestador/**'
      - 'src/hooks/useProviderNotifications.tsx'
      - 'src/lib/provider*.ts'
      - 'src/lib/sessionService.ts'
      - 'src/lib/supabase.ts'
      - 'src/App.tsx'
      - 'src/routing/**'
      - 'src/contexts/FileViewerContext.tsx'
      - 'src/types/react-namespace.d.ts'
      - 'scripts/check-provider-portal-security-contracts.ts'
      - 'scripts/provider-production-verification.sql'
      - 'supabase/functions/gsa-auth-session/**'
      - 'supabase/migrations/2026072021*_provider*.sql'
      - 'supabase/migrations/20260720210000_harden_provider_portal.sql'
      - 'supabase/migrations/20260720232*_provider_portal*.sql'
      - 'supabase/migrations/20260720233*_provider_portal*.sql'
      - 'supabase/migrations/20260721170000_provider_portal_production_finalization.sql'
      - '.github/workflows/provider-portal-validation.yml'
      - '.github/workflows/provider-production-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/components/prestador/**'
      - 'src/pages/Prestador/**'
      - 'src/hooks/useProviderNotifications.tsx'
      - 'src/lib/provider*.ts'
      - 'src/lib/sessionService.ts'
      - 'src/lib/supabase.ts'
      - 'src/App.tsx'
      - 'src/routing/**'
      - 'src/contexts/FileViewerContext.tsx'
      - 'src/types/react-namespace.d.ts'
      - 'scripts/check-provider-portal-security-contracts.ts'
      - 'scripts/provider-production-verification.sql'
      - 'supabase/functions/gsa-auth-session/**'
      - 'supabase/migrations/2026072021*_provider*.sql'
      - 'supabase/migrations/20260720210000_harden_provider_portal.sql'
      - 'supabase/migrations/20260720232*_provider_portal*.sql'
      - 'supabase/migrations/20260720233*_provider_portal*.sql'
      - 'supabase/migrations/20260721170000_provider_portal_production_finalization.sql'
      - '.github/workflows/provider-portal-validation.yml'
      - '.github/workflows/provider-production-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript validation
        run: npm run lint
      - name: Provider portal security contracts
        run: npm run test:provider
      - name: Production build
        run: npm run build
