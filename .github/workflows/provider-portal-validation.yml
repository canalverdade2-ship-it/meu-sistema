name: Provider Portal Validation

on:
  push:
    branches:
      - agent/corrigir-painel-prestador
  pull_request:
    paths:
      - 'src/components/prestador/**'
      - 'src/pages/Prestador/**'
      - 'src/hooks/useProviderNotifications.tsx'
      - 'src/lib/provider*.ts'
      - 'src/contexts/FileViewerContext.tsx'
      - 'supabase/migrations/**provider**'
      - 'supabase/migrations/20260720200000_harden_provider_portal.sql'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript validation
        run: npm run lint
      - name: Production build
        run: npm run build
