name: Provider Portal Validation

on:
  push:
    branches:
      - agent/corrigir-painel-prestador
      - agent/corrigir-auditoria-painel-prestador
  pull_request:
    paths:
      - 'src/components/prestador/**'
      - 'src/pages/Prestador/**'
      - 'src/hooks/useProviderNotifications.tsx'
      - 'src/lib/provider*.ts'
      - 'src/contexts/FileViewerContext.tsx'
      - 'src/types/react-namespace.d.ts'
      - 'scripts/check-provider-portal-security-contracts.ts'
      - 'supabase/migrations/*provider*portal*.sql'
      - 'supabase/migrations/2026072021*_provider*.sql'
      - 'supabase/migrations/20260720210000_harden_provider_portal.sql'
      - '.github/workflows/provider-portal-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript validation
        run: npm run lint
      - name: Provider security contracts
        run: npm run test:provider
      - name: Production build
        run: npm run build
