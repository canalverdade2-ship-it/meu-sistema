name: Finalize Products Production

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/temp-deploy-products-migrations.yml'
      - '.products-production-deploy-trigger'
      - 'supabase/migrations/20260721010000_harden_products_and_subscriptions.sql'
      - 'supabase/migrations/20260721010100_secure_product_subscription_catalog.sql'

permissions:
  contents: write

concurrency:
  group: finalize-products-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'ops/finalize-products-production'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/finalize-products-production
          fetch-depth: 0

      - name: Validate target and files
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          grep -Fqx 'APPLY_PRODUCTS_MIGRATIONS_20260720_V2' .products-production-deploy-trigger
          test -f supabase/migrations/20260721010000_harden_products_and_subscriptions.sql
          test -f supabase/migrations/20260721010100_secure_product_subscription_catalog.sql

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Read remote migration history
        id: state
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" | tee products-migration-list-before.log
          tr -d '`' < products-migration-list-before.log > products-migration-list-normalized.log
          first_applied=false
          second_applied=false
          if grep -E '20260721010000.*20260721010000' products-migration-list-normalized.log; then first_applied=true; fi
          if grep -E '20260721010100.*20260721010100' products-migration-list-normalized.log; then second_applied=true; fi
          if [ "$first_applied" = true ] && [ "$second_applied" = true ]; then
            echo 'applied=true' >> "$GITHUB_OUTPUT"
          else
            echo 'applied=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Preview pending migrations
        if: steps.state.outputs.applied != 'true'
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run -p "$SUPABASE_DB_PASSWORD" | tee products-dry-run.log
          grep -Eo '20[0-9]{12}' products-dry-run.log | sort -u > products-pending-versions.txt || true
          printf '20260721010000\n20260721010100\n' > products-expected-versions.txt
          diff -u products-expected-versions.txt products-pending-versions.txt

      - name: Apply authorized migrations
        if: steps.state.outputs.applied != 'true'
        run: supabase db push --linked -p "$SUPABASE_DB_PASSWORD"

      - name: Verify remote migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" | tee products-migration-list-after.log
          tr -d '`' < products-migration-list-after.log > products-migration-list-after-normalized.log
          grep -E '20260721010000.*20260721010000' products-migration-list-after-normalized.log
          grep -E '20260721010100.*20260721010100' products-migration-list-after-normalized.log

      - name: Remove temporary deployment controls
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/workflows/temp-deploy-products-migrations.yml
          rm -f .products-production-deploy-trigger
          git add -A
          git commit -m 'Remover controles temporários de Produtos e Assinaturas'
          git push origin HEAD:ops/finalize-products-production

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-production-deployment
          path: |
            products-migration-list-before.log
            products-migration-list-normalized.log
            products-dry-run.log
            products-pending-versions.txt
            products-migration-list-after.log
            products-migration-list-after-normalized.log
          retention-days: 7
          if-no-files-found: ignore
