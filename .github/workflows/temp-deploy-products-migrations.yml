name: Deploy Products Migrations Production

on:
  push:
    branches: [agent/corrigir-versoes-migrations-produtos]
    paths: ['.products-production-deploy-trigger']

permissions:
  contents: read

concurrency:
  group: deploy-products-migrations-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrigir-versoes-migrations-produtos

      - name: Validate target and files
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          grep -Fqx 'APPLY_PRODUCTS_MIGRATIONS_20260720' .products-production-deploy-trigger
          test -f supabase/migrations/20260721010000_harden_products_and_subscriptions.sql
          test -f supabase/migrations/20260721010100_secure_product_subscription_catalog.sql

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Check migration state
        id: state
        shell: bash
        run: |
          cat > products-state.sql <<'SQL'
          SELECT count(*) AS applied_count
          FROM supabase_migrations.schema_migrations
          WHERE version IN ('20260721010000', '20260721010100');
          SQL
          supabase db query --linked --file products-state.sql | tee products-state.log
          if grep -Eq '(^|[^0-9])2([^0-9]|$)' products-state.log; then
            echo 'applied=true' >> "$GITHUB_OUTPUT"
          else
            echo 'applied=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build transactional bundles
        if: steps.state.outputs.applied != 'true'
        run: |
          {
            echo 'BEGIN;'
            for file in \
              supabase/migrations/20260721010000_harden_products_and_subscriptions.sql \
              supabase/migrations/20260721010100_secure_product_subscription_catalog.sql; do
              sed '/^[[:space:]]*BEGIN;[[:space:]]*$/d; /^[[:space:]]*COMMIT;[[:space:]]*$/d' "$file"
            done
            echo 'ROLLBACK;'
          } > products-preview.sql
          sed '$s/ROLLBACK;/COMMIT;/' products-preview.sql > products-production.sql

      - name: Validate migrations with rollback
        if: steps.state.outputs.applied != 'true'
        run: supabase db query --linked --file products-preview.sql

      - name: Apply migrations atomically
        if: steps.state.outputs.applied != 'true'
        run: supabase db query --linked --file products-production.sql

      - name: Register migration history
        if: steps.state.outputs.applied != 'true'
        run: supabase migration repair 20260721010000 20260721010100 --status applied --linked

      - name: Verify production state
        shell: bash
        run: |
          cat > products-verify.sql <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.gsa_admin_operation_requests') IS NULL THEN
              RAISE EXCEPTION 'Tabela de idempotência administrativa ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_adjust_product_stock') THEN
              RAISE EXCEPTION 'RPC de ajuste de estoque ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_cancel_store_order') THEN
              RAISE EXCEPTION 'RPC de cancelamento de pedido ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_activate_subscription') THEN
              RAISE EXCEPTION 'RPC de ativação de assinatura ausente';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'gsa_admin_save_product_catalog') THEN
              RAISE EXCEPTION 'RPC de catálogo de produtos ausente';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public' AND table_name = 'ordens_compra'
                AND column_name = 'valor_unitario_contratado'
            ) THEN
              RAISE EXCEPTION 'Snapshot de preço de produto ausente';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public' AND table_name = 'ordens_assinatura'
                AND column_name = 'valor_mensal_contratado'
            ) THEN
              RAISE EXCEPTION 'Snapshot de preço de assinatura ausente';
            END IF;
          END $$;

          SELECT version
          FROM supabase_migrations.schema_migrations
          WHERE version IN ('20260721010000', '20260721010100')
          ORDER BY version;
          SQL
          supabase db query --linked --file products-verify.sql | tee products-verification.log
          grep -q '20260721010000' products-verification.log
          grep -q '20260721010100' products-verification.log

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-production-deployment
          path: |
            products-state.log
            products-verification.log
            products-preview.sql
          retention-days: 1
          if-no-files-found: ignore
