name: Sites and Systems

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/components/public/SystemsPageFinal.tsx'
      - 'src/components/public/SystemsBudgetModal.tsx'
      - 'src/pages/Home.tsx'
      - 'src/routing/useAppLocation.ts'
      - 'supabase/functions/gsa-public-budget/**'
      - 'supabase/migrations/20260721124500_finalize_public_home_budget.sql'
      - 'scripts/test-final-home-audit.sql'
      - '.github/workflows/public-sites-systems.yml'
  push:
    branches: ['agent/**']
    paths:
      - 'src/components/public/SystemsPageFinal.tsx'
      - 'src/components/public/SystemsBudgetModal.tsx'
      - 'src/pages/Home.tsx'
      - 'src/routing/useAppLocation.ts'
      - 'supabase/functions/gsa-public-budget/**'
      - 'supabase/migrations/20260721124500_finalize_public_home_budget.sql'
      - 'scripts/test-final-home-audit.sql'
      - '.github/workflows/public-sites-systems.yml'

concurrency:
  group: sites-systems-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-public-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate public budget Edge Function
        run: |
          deno check supabase/functions/gsa-public-budget/index.ts supabase/functions/gsa-public-budget/index_test.ts
          deno test --allow-env supabase/functions/gsa-public-budget/index_test.ts

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate real budget persistence contract
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -U postgres -v ON_ERROR_STOP=1 -f scripts/test-final-home-audit.sql
