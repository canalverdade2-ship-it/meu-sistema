name: Sites and Systems

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/components/public/SystemsPage.tsx'
      - 'src/components/public/SystemsBudgetModal.tsx'
      - 'src/pages/Home.tsx'
      - 'supabase/migrations/20260720232000_secure_public_sites_systems_budget.sql'
      - '.github/workflows/public-sites-systems.yml'
  push:
    branches: ['agent/**']
    paths:
      - 'src/components/public/SystemsPage.tsx'
      - 'src/components/public/SystemsBudgetModal.tsx'
      - 'src/pages/Home.tsx'
      - 'supabase/migrations/20260720232000_secure_public_sites_systems_budget.sql'
      - '.github/workflows/public-sites-systems.yml'

concurrency:
  group: sites-systems-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-public-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate public budget migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $roles$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              EXECUTE 'CREATE ROLE anon NOLOGIN';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              EXECUTE 'CREATE ROLE authenticated NOLOGIN';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              EXECUTE 'CREATE ROLE service_role NOLOGIN';
            END IF;
          END;
          $roles$;

          CREATE OR REPLACE FUNCTION public.gsa_public_create_enterprise_budget(p_payload jsonb)
          RETURNS jsonb
          LANGUAGE sql
          AS $$
            SELECT jsonb_build_object('success', true, 'received', p_payload);
          $$;

          GRANT EXECUTE ON FUNCTION public.gsa_public_create_enterprise_budget(jsonb) TO anon, authenticated;

          \i supabase/migrations/20260720232000_secure_public_sites_systems_budget.sql

          DO $test$
          DECLARE
            v_result jsonb;
          BEGIN
            v_result := public.gsa_public_create_enterprise_budget_v2(
              jsonb_build_object(
                'nome', 'Cliente de Teste',
                'email', 'cliente.teste@example.com',
                'telefone', '11999999999',
                'tipo', 'sistema',
                'solicitacao', 'Preciso de um sistema web completo para organizar meu atendimento.',
                'website', '',
                'started_at', (clock_timestamp() - interval '5 seconds')::text,
                'metadata', jsonb_build_object('source', 'workflow_test')
              )
            );

            IF NOT COALESCE((v_result->>'success')::boolean, false)
               OR COALESCE(v_result->>'protocol', '') !~ '^GSA-[0-9]{8}-[A-F0-9]{6}$' THEN
              RAISE EXCEPTION 'Resposta inválida da função protegida: %', v_result;
            END IF;

            IF NOT has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget_v2(jsonb)', 'EXECUTE')
               OR has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE')
               OR has_table_privilege('anon', 'public.gsa_public_budget_rate_limits', 'SELECT') THEN
              RAISE EXCEPTION 'Permissões públicas incorretas.';
            END IF;

            BEGIN
              PERFORM public.gsa_public_create_enterprise_budget_v2(
                jsonb_build_object(
                  'nome', 'Teste',
                  'email', 'invalido@example.com',
                  'telefone', '1',
                  'tipo', 'site',
                  'solicitacao', 'Descrição suficientemente longa para o teste.',
                  'website', '',
                  'started_at', (clock_timestamp() - interval '5 seconds')::text
                )
              );
              RAISE EXCEPTION 'Telefone inválido foi aceito.';
            EXCEPTION WHEN SQLSTATE '22023' THEN
              NULL;
            END;
          END;
          $test$;
          SQL
