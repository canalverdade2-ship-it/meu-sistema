name: Apply Security Audit Fixes V3

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-validate-publish:
    if: github.head_ref == 'agent/corrigir-auditoria-seguranca'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrigir-auditoria-seguranca
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install current dependencies
        run: npm ci
      - name: Confirm Gemini client dependency is unused
        run: |
          matches=$(grep -RInE 'GEMINI_API_KEY|@google/genai' src supabase tests --exclude-dir=node_modules || true)
          test -z "$matches" || { echo "$matches"; exit 1; }
      - name: Apply audited source corrections
        run: python scripts/apply-security-audit-fixes.py
      - name: Replace vulnerable dependencies
        run: |
          npm pkg delete dependencies.vite
          npm pkg delete dependencies.@google/genai
          npm pkg set devDependencies.vite='6.4.3'
          npm pkg set dependencies.jspdf='4.2.1'
          npm pkg set dependencies.xlsx='https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz'
          npm install --package-lock-only
          npm audit fix --package-lock-only || true
          rm -rf node_modules
          npm ci
      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high
      - name: Validate application contracts
        run: |
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:home
          npm run test:travel
      - name: Validate authentication gateway
        run: |
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts
      - name: Production build
        run: npm run build
      - name: Commit validated fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corrigir achados críticos da auditoria de segurança'
          git pull --rebase origin agent/corrigir-auditoria-seguranca
          git push origin HEAD:agent/corrigir-auditoria-seguranca
