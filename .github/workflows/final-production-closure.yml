name: Final Production Closure

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/final-production-closure.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'src/**'
      - 'supabase/migrations/**'
      - 'supabase/functions/gsa-auth-session/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-production-closure
  cancel-in-progress: false

jobs:
  validate-deploy-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Administrative and collaborator contracts
        run: npm run test:admin

      - name: Products and subscriptions contracts
        run: npm run test:products-subscriptions

      - name: Client portal security contracts
        run: npm run test:client-security

      - name: Provider portal security contracts
        run: npm run test:provider

      - name: Home public contracts
        run: npm run test:home

      - name: GSA Viagens contracts
        run: npm run test:travel

      - name: Validate authentication Edge Function
        run: |
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts

      - name: Production build
        run: npm run build

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply final audit correction idempotently
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee production-migrations-before.log

          if awk -F'|' '
            {
              remote=$2
              gsub(/[^0-9]/, "", remote)
              if (remote == "20260721020000") found=1
            }
            END { exit found ? 0 : 1 }
          ' production-migrations-before.log; then
            echo 'A migration final de auditoria já está registrada em produção.' | tee final-migration-apply.log
          else
            supabase db query --linked --file supabase/migrations/20260721020000_fix_sensitive_admin_audit_revocation.sql 2>&1 | tee final-migration-apply.log
            supabase migration repair --linked --status applied 20260721020000 2>&1 | tee -a final-migration-apply.log
          fi

      - name: Verify migration history and critical production objects
        shell: bash
        run: |
          cat > final-production-verification.sql <<'SQL'
          DO $$
          DECLARE
            v_required integer;
            v_audit_definition text;
          BEGIN
            SELECT count(*)
              INTO v_required
              FROM supabase_migrations.schema_migrations
             WHERE version IN (
               '20260720213000',
               '20260720215500','20260720215530','20260720215600',
               '20260720232000',
               '20260720233000','20260720233100','20260720233200',
               '20260720234400','20260720234500','20260720235300','20260720235425',
               '20260720235450','20260720235500','20260721000500','20260721001500',
               '20260721002500','20260721003000','20260721003500','20260721003600',
               '20260721003700','20260721003800',
               '20260721010000','20260721010100','20260721020000'
             );
            IF v_required <> 25 THEN
              RAISE EXCEPTION 'Histórico obrigatório incompleto: % de 25 migrations', v_required;
            END IF;

            IF to_regprocedure('public.gsa_admin_context()') IS NULL
               OR to_regprocedure('public.gsa_admin_validate_context(uuid,text)') IS NULL
               OR to_regprocedure('public.gsa_admin_sensitive_change_audit()') IS NULL THEN
              RAISE EXCEPTION 'Contexto ou auditoria administrativa ausente';
            END IF;

            SELECT pg_get_functiondef(to_regprocedure('public.gsa_admin_sensitive_change_audit()'))
              INTO v_audit_definition;
            IF position('v_session_id_text' in v_audit_definition) = 0
               OR position('Sessão administrativa inválida para auditoria' in v_audit_definition) = 0
               OR position('PERFORM public.gsa_admin_context()' in v_audit_definition) > 0 THEN
              RAISE EXCEPTION 'A versão corrigida do gatilho de auditoria não está ativa';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname='public' AND p.proname='gsa_admin_access_snapshot'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname='public' AND p.proname='gsa_admin_save_collaborator'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname='public' AND p.proname='gsa_admin_system_snapshot'
            ) THEN
              RAISE EXCEPTION 'Operações administrativas críticas ausentes';
            END IF;

            IF to_regprocedure('public.gsa_public_lookup_referral(text)') IS NULL
               OR to_regprocedure('public.gsa_public_register_client(text,jsonb)') IS NULL
               OR to_regprocedure('public.gsa_public_register_provider(jsonb)') IS NULL
               OR to_regprocedure('public.gsa_public_create_enterprise_budget_v2(jsonb)') IS NULL THEN
              RAISE EXCEPTION 'Objetos públicos protegidos da Home estão ausentes';
            END IF;

            IF NOT has_function_privilege('anon', 'public.gsa_public_lookup_referral(text)', 'EXECUTE')
               OR NOT has_function_privilege('anon', 'public.gsa_public_register_client(text,jsonb)', 'EXECUTE')
               OR NOT has_function_privilege('anon', 'public.gsa_public_register_provider(jsonb)', 'EXECUTE') THEN
              RAISE EXCEPTION 'Funções públicas necessárias da Home não estão disponíveis para anon';
            END IF;

            IF has_function_privilege('anon', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE')
               OR has_function_privilege('authenticated', 'public.gsa_public_create_enterprise_budget(jsonb)', 'EXECUTE') THEN
              RAISE EXCEPTION 'Função legada de orçamento ainda possui acesso público';
            END IF;

            IF to_regprocedure('public.gsa_admin_adjust_product_stock(uuid,text,uuid,uuid,text,integer,text)') IS NULL
               OR to_regprocedure('public.gsa_admin_activate_subscription(uuid,text,uuid,uuid)') IS NULL THEN
              RAISE EXCEPTION 'Operações de Produtos e Assinaturas ausentes';
            END IF;

            IF to_regclass('public.gsa_public_budget_rate_limits') IS NULL
               OR to_regclass('public.gsa_admin_operation_requests') IS NULL THEN
              RAISE EXCEPTION 'Tabelas de segurança e idempotência ausentes';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM storage.buckets
              WHERE id='gsa-private-documents' AND public=false
            ) THEN
              RAISE EXCEPTION 'Armazenamento administrativo privado ausente';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger t
              JOIN pg_proc p ON p.oid=t.tgfoid
              JOIN pg_namespace n ON n.oid=p.pronamespace
              WHERE n.nspname='public'
                AND p.proname='gsa_admin_sensitive_change_audit'
                AND NOT t.tgisinternal
            ) THEN
              RAISE EXCEPTION 'Gatilhos de auditoria administrativa ausentes';
            END IF;
          END $$;

          SELECT 'FINAL_PRODUCTION_VERIFIED' AS result;
          SQL
          set -o pipefail
          supabase db query --linked --file final-production-verification.sql 2>&1 | tee final-production-verification.log
          grep -q 'FINAL_PRODUCTION_VERIFIED' final-production-verification.log

      - name: Publish authentication gateway
        run: supabase functions deploy gsa-auth-session --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Upload final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-production-closure-evidence
          path: |
            production-migrations-before.log
            final-migration-apply.log
            final-production-verification.log
          if-no-files-found: ignore
          retention-days: 30

  report-result:
    name: Register final result
    needs: validate-deploy-verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record closure result in main
        shell: bash
        env:
          RESULT: ${{ needs.validate-deploy-verify.result }}
          RUN_ID: ${{ github.run_id }}
          VALIDATED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          cat > deployment-status/final-production-closure.json <<JSON
          {
            "status": "${RESULT}",
            "workflow_run_id": "${RUN_ID}",
            "validated_sha": "${VALIDATED_SHA}",
            "validated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scope": "admin-collaborator-client-provider-home-travel-products-subscriptions-supabase",
            "migrations": "${RESULT}",
            "database_objects": "${RESULT}",
            "edge_function": "${RESULT}",
            "frontend_build": "${RESULT}"
          }
          JSON

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deployment-status/final-production-closure.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Registrar fechamento definitivo de produção: ${RESULT}"
          git pull --rebase origin main
          git push origin HEAD:main
