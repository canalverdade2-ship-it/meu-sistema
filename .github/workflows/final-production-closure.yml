name: Final Production Verification

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/final-production-closure.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-production-verification
  cancel-in-progress: false

jobs:
  validate-production:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Validate application contracts
        run: |
          npm run lint
          npm run test:admin
          npm run test:products-subscriptions
          npm run test:client-security
          npm run test:provider
          npm run test:travel
          deno check supabase/functions/gsa-auth-session/index.ts supabase/functions/gsa-auth-session/index_test.ts
          deno test --allow-env supabase/functions/gsa-auth-session/index_test.ts
          npm run build

      - name: Validate production authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_ID"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" -p "$SUPABASE_DB_PASSWORD"

      - name: Verify migration history
        shell: bash
        run: |
          set -euo pipefail
          cat > expected-admin-migrations.txt <<'VERSIONS'
          20260720234400
          20260720234500
          20260720235300
          20260720235425
          20260720235450
          20260720235500
          20260721000500
          20260721001500
          20260721002500
          20260721003000
          20260721003500
          20260721003600
          20260721003700
          20260721003800
          VERSIONS

          supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" 2>&1 | tee production-migrations.log
          sed 's/│/|/g' production-migrations.log > production-migrations.normalized.log
          awk -F'|' '
            {
              remote=$2;
              gsub(/[^0-9]/, "", remote);
              if (length(remote) == 14) print remote;
            }
          ' production-migrations.normalized.log | sort -u > production-remote-versions.txt

          while read -r version; do
            grep -Fxq "$version" production-remote-versions.txt || {
              echo "Migration obrigatória ausente em produção: $version" >&2
              exit 1
            }
          done < expected-admin-migrations.txt

      - name: Verify critical production objects
        shell: bash
        run: |
          set -euo pipefail
          cat > production-verify.sql <<'SQL'
          DO $$
          DECLARE
            v_function text;
          BEGIN
            FOREACH v_function IN ARRAY ARRAY[
              'gsa_admin_access_snapshot',
              'gsa_admin_save_collaborator',
              'gsa_admin_set_collaborator_status',
              'gsa_admin_rotate_collaborator_credential',
              'gsa_admin_review_deletion_request',
              'gsa_admin_list_resource',
              'gsa_admin_create_protection_proposal',
              'gsa_admin_system_snapshot',
              'gsa_admin_settings_snapshot',
              'gsa_admin_update_settings_secure',
              'gsa_admin_validate_context',
              'gsa_admin_sensitive_change_audit',
              'gsa_admin_private_document_allowed',
              'gsa_private_document_read_allowed'
            ]::text[] LOOP
              IF NOT EXISTS (
                SELECT 1 FROM pg_proc p
                JOIN pg_namespace n ON n.oid = p.pronamespace
                WHERE n.nspname = 'public' AND p.proname = v_function
              ) THEN
                RAISE EXCEPTION 'Função obrigatória ausente: %', v_function;
              END IF;
            END LOOP;

            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'colaboradores'
                AND column_name = 'credencial_hash'
            ) THEN
              RAISE EXCEPTION 'Coluna colaboradores.credencial_hash ausente.';
            END IF;

            IF to_regclass('public.gsa_admin_audit_events') IS NULL
               OR to_regclass('public.gsa_admin_notification_state') IS NULL THEN
              RAISE EXCEPTION 'Tabelas internas de auditoria/notificação ausentes.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM storage.buckets
              WHERE id = 'gsa-private-documents' AND public = false
            ) THEN
              RAISE EXCEPTION 'Bucket privado administrativo ausente ou público.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'storage' AND tablename = 'objects'
                AND policyname = 'gsa_admin_private_documents_select'
            ) OR NOT EXISTS (
              SELECT 1 FROM pg_policies
              WHERE schemaname = 'public'
                AND tablename = 'viagens_orcamentos'
                AND policyname = 'gsa_collaborator_module_viagens_orcamentos'
                AND permissive = 'RESTRICTIVE'
            ) THEN
              RAISE EXCEPTION 'Políticas obrigatórias de segurança ausentes.';
            END IF;

            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'trg_gsa_admin_audit_colaboradores' AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'Gatilho de auditoria de colaboradores ausente.';
            END IF;
          END;
          $$;

          SELECT
            (SELECT count(*) FROM pg_policies WHERE policyname LIKE 'gsa_collaborator_module_%') AS restrictive_module_policies,
            (SELECT public FROM storage.buckets WHERE id = 'gsa-private-documents') AS private_bucket_public;
          SQL

          supabase db query --linked --file production-verify.sql 2>&1 | tee production-verification.log
          supabase db dump --linked -p "$SUPABASE_DB_PASSWORD" --schema public,storage --file production-schema.sql

          for object in \
            gsa_admin_validate_context \
            gsa_admin_sensitive_change_audit \
            gsa_admin_update_settings_secure \
            gsa-private-documents \
            gsa_collaborator_module_viagens_orcamentos; do
            grep -q "$object" production-schema.sql
          done

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-production-verification-evidence
          path: |
            expected-admin-migrations.txt
            production-migrations.log
            production-remote-versions.txt
            production-verification.log
            production-schema.sql
          if-no-files-found: ignore
          retention-days: 30

  report-result:
    name: Register final result
    needs: validate-production
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record verification result in main
        shell: bash
        env:
          RESULT: ${{ needs.validate-production.result }}
          RUN_ID: ${{ github.run_id }}
          VALIDATED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          cat > deployment-status/final-production-closure.json <<JSON
          {
            "status": "${RESULT}",
            "workflow_run_id": "${RUN_ID}",
            "validated_sha": "${VALIDATED_SHA}",
            "validated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scope": "read-only-production-verification",
            "migrations": "${RESULT}",
            "database_objects": "${RESULT}",
            "edge_function_code": "${RESULT}",
            "frontend_build": "${RESULT}",
            "automatic_db_push": "disabled"
          }
          JSON

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deployment-status/final-production-closure.json
          if ! git diff --cached --quiet; then
            git commit -m "Registrar verificação final de produção: ${RESULT}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
