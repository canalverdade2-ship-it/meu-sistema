name: Temporary apply products and subscriptions fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/corrigir-produtos-assinaturas'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-produtos-assinaturas
          fetch-depth: 0

      - name: Apply reviewed interface package
        shell: bash
        run: |
          set -o pipefail
          cat .patch/apply-interfaces.py.part* > /tmp/apply-interfaces.py

          python <<'PY'
          from pathlib import Path

          script_path = Path('/tmp/apply-interfaces.py')
          script = script_path.read_text(encoding='utf-8')

          product_start_marker = '# exclusão individual vira inativação'
          product_end_marker = '# ---------------------------------------------------------------------------\n# AssinaturasModule'
          product_start = script.find(product_start_marker)
          product_end = script.find(product_end_marker, product_start)
          if product_start < 0 or product_end < 0:
              raise RuntimeError('Bloco temporário de exclusão de produto não localizado.')
          script = script[:product_start] + script[product_end:]

          subscription_needle = (
              "replace_once(\n"
              "    'src/components/admin/AssinaturasModule.tsx',\n"
              "    \"                       const { error } = await supabase.from('assinaturas').delete()"
          )
          subscription_start = script.find(subscription_needle)
          subscription_end_marker = '# ---------------------------------------------------------------------------\n# OrdensCompraModule'
          subscription_end = script.find(subscription_end_marker, subscription_start)
          if subscription_start < 0 or subscription_end < 0:
              raise RuntimeError('Bloco temporário de exclusão de assinatura não localizado.')
          script = script[:subscription_start] + script[subscription_end:]

          script_path.write_text(script, encoding='utf-8')
          PY

          python /tmp/apply-interfaces.py 2>&1 | tee /tmp/apply-products-subscriptions.log

          python <<'PY' 2>&1 | tee -a /tmp/apply-products-subscriptions.log
          import json
          from pathlib import Path

          def replace_delete_handler(path: str, table: str, selected: str, kind: str, fetch_call: str) -> None:
              file_path = Path(path)
              content = file_path.read_text(encoding='utf-8')
              needle = f"const {{ error }} = await supabase.from('{table}').delete().eq('id', {selected}.id);"
              start = content.find(needle)
              if start < 0:
                  raise RuntimeError(f'{path}: exclusão individual não localizada')
              line_start = content.rfind('\n', 0, start) + 1
              handler_end = content.find('\n                     }}', start)
              if handler_end < 0:
                  raise RuntimeError(f'{path}: final do manipulador não localizado')
              indent = content[line_start:start]
              replacement = (
                  f"{indent}try {{\n"
                  f"{indent}  await archiveAdminCatalogItems('{kind}', [{selected}.id]);\n"
                  f"{indent}  toast.success('{kind.capitalize()} inativado com sucesso.');\n"
                  f"{indent}  setIsDetailOpen(false);\n"
                  f"{indent}  setIsDeleting(false);\n"
                  f"{indent}  {fetch_call}();\n"
                  f"{indent}}} catch (error) {{\n"
                  f"{indent}  toast.error(handleError(error, 'Erro ao inativar {kind}'));\n"
                  f"{indent}}}"
              )
              file_path.write_text(content[:line_start] + replacement + content[handler_end:], encoding='utf-8')

          replace_delete_handler(
              'src/components/admin/ProdutosModule.tsx',
              'produtos',
              'selectedProduto',
              'produto',
              'fetchProdutos',
          )
          replace_delete_handler(
              'src/components/admin/AssinaturasModule.tsx',
              'assinaturas',
              'selectedAssinatura',
              'assinatura',
              'fetchAssinaturas',
          )

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package.setdefault('scripts', {})['test:products-subscriptions'] = 'tsx scripts/check-products-subscriptions-contracts.ts'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          workflow_path = Path('.github/workflows/quality.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          marker = "      - name: Client portal security contracts\n"
          step = "      - name: Products and subscriptions contracts\n        if: steps.typescript.outputs.exit_code == '0'\n        run: npm run test:products-subscriptions\n\n"
          if 'Products and subscriptions contracts' not in workflow:
              if marker not in workflow:
                  raise RuntimeError('Ponto de inserção do Quality não encontrado.')
              workflow = workflow.replace(marker, step + marker, 1)
              workflow_path.write_text(workflow, encoding='utf-8')
          PY

          rm -rf .patch
          rm -f .github/workflows/temp-apply-products-subscriptions-fixes.yml

      - name: Upload application diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: products-subscriptions-apply-log
          path: /tmp/apply-products-subscriptions.log
          retention-days: 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run lint

      - name: Products and subscriptions contracts
        run: npm run test:products-subscriptions

      - name: Admin panel contracts
        run: npm run test:admin

      - name: Client portal security contracts
        run: npm run test:client-security

      - name: GSA Viagens contracts
        run: npm run test:travel

      - name: Production build
        run: npm run build

      - name: Publish one clean correction commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração adicional para publicar."
            exit 0
          fi
          git commit -m "Corrigir integridade de Produtos e Assinaturas"
          git push origin HEAD:agent/corrigir-produtos-assinaturas
