name: Diagnose PR225 DB Rollback Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-pr225-db-rollback-once.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
  SUPABASE_CLI_VERSION: 2.101.0

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Validate production target
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Locate canonical source migrations
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr225-diagnostic
          grep -RIlE 'loja_carrinhos|promocoes_quantidade_ativadas' supabase/migrations | sort > /tmp/pr225-diagnostic/cart-promotion-files.txt || true
          grep -RIlE 'gsa_client_affiliate_snapshot|gsa_admin_affiliate_snapshot' supabase/migrations | sort > /tmp/pr225-diagnostic/affiliate-files.txt || true

      - name: Inspect current production objects
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/pr225-diagnostic/query.sql <<'SQL'
          SELECT 'MIGRATION|' || version
          FROM supabase_migrations.schema_migrations
          WHERE version IN ('20260722190000','20260722190100','20260722233000','20260722233100','20260722233200')
          ORDER BY version;

          SELECT 'FUNCTION|' || p.proname || '|' || pg_get_function_identity_arguments(p.oid) || '|' || md5(pg_get_functiondef(p.oid))
          FROM pg_proc p
          JOIN pg_namespace n ON n.oid = p.pronamespace
          WHERE n.nspname = 'public'
            AND p.proname IN (
              'gsa_client_affiliate_snapshot','gsa_client_join_affiliate','gsa_client_update_affiliate_profile',
              'gsa_client_create_affiliate_link','gsa_client_request_affiliate_payout','gsa_client_cancel_affiliate_payout',
              'gsa_admin_affiliate_snapshot','gsa_admin_update_affiliate_program','gsa_admin_set_affiliate_status',
              'gsa_admin_decide_affiliate_payout'
            )
          ORDER BY p.proname, pg_get_function_identity_arguments(p.oid);

          SELECT 'POLICY|' || tablename || '|' || policyname || '|' || cmd || '|' || md5(coalesce(qual,'')) || '|' || md5(coalesce(with_check,''))
          FROM pg_policies
          WHERE schemaname = 'public'
            AND tablename IN ('loja_carrinhos','promocoes_quantidade_ativadas')
          ORDER BY tablename, policyname;

          SELECT 'TABLE|' || c.relname || '|rls=' || c.relrowsecurity || '|force=' || c.relforcerowsecurity || '|acl=' || coalesce(c.relacl::text,'')
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname IN ('loja_carrinhos','promocoes_quantidade_ativadas')
          ORDER BY c.relname;
          SQL
          supabase db query --linked --file /tmp/pr225-diagnostic/query.sql 2>&1 | tee /tmp/pr225-diagnostic/db.log

      - name: Build sanitized evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          {
            echo "generated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "validated_sha=$GITHUB_SHA"
            echo '--- affiliate migrations ---'
            cat /tmp/pr225-diagnostic/affiliate-files.txt
            echo '--- cart and promotion migrations ---'
            cat /tmp/pr225-diagnostic/cart-promotion-files.txt
            echo '--- production database ---'
            cat /tmp/pr225-diagnostic/db.log
          } > deployment-status/pr225-db-rollback-diagnostic.txt

      - name: Publish diagnostic evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deployment-status/pr225-db-rollback-diagnostic.txt
          git commit -m 'Registrar diagnostico do rollback da PR 225' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
