name: Diagnose PR225 DB Rollback Once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-pr225-db-rollback-once.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPECTED_PROJECT_ID: ocgajvagxagutfvgxwsy
  SUPABASE_CLI_VERSION: 2.101.0

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Validate production target
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_DB_URL"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Locate canonical source migrations
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr225-diagnostic
          grep -RIlE 'loja_carrinhos|promocoes_quantidade_ativadas' supabase/migrations | sort > /tmp/pr225-diagnostic/cart-promotion-files.txt || true
          grep -RIlE 'gsa_client_affiliate_snapshot|gsa_admin_affiliate_snapshot' supabase/migrations | sort > /tmp/pr225-diagnostic/affiliate-files.txt || true

      - name: Inspect current production objects
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/pr225-diagnostic/query.sql <<'SQL'
          WITH target_functions(name) AS (
            VALUES
              ('gsa_client_affiliate_snapshot'),
              ('gsa_client_join_affiliate'),
              ('gsa_client_update_affiliate_profile'),
              ('gsa_client_create_affiliate_link'),
              ('gsa_client_request_affiliate_payout'),
              ('gsa_client_cancel_affiliate_payout'),
              ('gsa_admin_affiliate_snapshot'),
              ('gsa_admin_update_affiliate_program'),
              ('gsa_admin_set_affiliate_status'),
              ('gsa_admin_decide_affiliate_payout')
          )
          SELECT jsonb_pretty(jsonb_build_object(
            'migration_versions', COALESCE((
              SELECT jsonb_agg(version ORDER BY version)
              FROM supabase_migrations.schema_migrations
              WHERE version IN ('20260722190000','20260722190100','20260722233000','20260722233100','20260722233200')
            ), '[]'::jsonb),
            'functions', COALESCE((
              SELECT jsonb_agg(jsonb_build_object(
                'name', p.proname,
                'signature', pg_get_function_identity_arguments(p.oid),
                'definition_md5', md5(pg_get_functiondef(p.oid)),
                'owner', pg_get_userbyid(p.proowner)
              ) ORDER BY p.proname, pg_get_function_identity_arguments(p.oid))
              FROM pg_proc p
              JOIN pg_namespace n ON n.oid = p.pronamespace
              JOIN target_functions t ON t.name = p.proname
              WHERE n.nspname = 'public'
            ), '[]'::jsonb),
            'policies', COALESCE((
              SELECT jsonb_agg(jsonb_build_object(
                'table', tablename,
                'name', policyname,
                'roles', roles,
                'command', cmd,
                'using_md5', md5(COALESCE(qual,'')),
                'check_md5', md5(COALESCE(with_check,''))
              ) ORDER BY tablename, policyname)
              FROM pg_policies
              WHERE schemaname = 'public'
                AND tablename IN ('loja_carrinhos','promocoes_quantidade_ativadas')
            ), '[]'::jsonb),
            'tables', COALESCE((
              SELECT jsonb_agg(jsonb_build_object(
                'table', c.relname,
                'rls', c.relrowsecurity,
                'force_rls', c.relforcerowsecurity,
                'acl', COALESCE(c.relacl::text, '')
              ) ORDER BY c.relname)
              FROM pg_class c
              JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname='public'
                AND c.relname IN ('loja_carrinhos','promocoes_quantidade_ativadas')
            ), '[]'::jsonb)
          ));
          SQL
          psql "$SUPABASE_DB_URL" -X -A -t -v ON_ERROR_STOP=1 -f /tmp/pr225-diagnostic/query.sql > /tmp/pr225-diagnostic/db.json

      - name: Build sanitized evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-status
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const lines = (path) => fs.existsSync(path) ? fs.readFileSync(path, 'utf8').split(/\r?\n/).filter(Boolean) : [];
          const database = JSON.parse(fs.readFileSync('/tmp/pr225-diagnostic/db.json','utf8'));
          const evidence = {
            generated_at_utc: new Date().toISOString(),
            validated_sha: process.env.GITHUB_SHA,
            affiliate_migration_files: lines('/tmp/pr225-diagnostic/affiliate-files.txt'),
            cart_promotion_migration_files: lines('/tmp/pr225-diagnostic/cart-promotion-files.txt'),
            database,
          };
          fs.writeFileSync('deployment-status/pr225-db-rollback-diagnostic.json', `${JSON.stringify(evidence, null, 2)}\n`);
          NODE

      - name: Publish diagnostic evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deployment-status/pr225-db-rollback-diagnostic.json
          git commit -m 'Registrar diagnostico do rollback da PR 225' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
