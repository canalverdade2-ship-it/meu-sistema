name: Agent Fix React Type Imports

on:
  push:
    branches:
      - agent/corrigir-home-seguranca-arquitetura

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/corrigir-home-seguranca-arquitetura
          fetch-depth: 0

      - name: Add React type namespace imports
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('src/components/auth/ClientAccessModal.tsx'),
              Path('src/components/auth/RestrictedAccessModal.tsx'),
              Path('src/components/public/GSAEnterpriseHome.tsx'),
          ]

          for path in files:
              text = path.read_text(encoding='utf-8')
              marker = "import type React from 'react';\n"
              if marker not in text:
                  path.write_text(marker + text, encoding='utf-8')
          PY

      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/auth/ClientAccessModal.tsx src/components/auth/RestrictedAccessModal.tsx src/components/public/GSAEnterpriseHome.tsx
          git commit -m "Corrigir imports de tipos React"
          git push origin HEAD:agent/corrigir-home-seguranca-arquitetura
