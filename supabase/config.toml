[functions.import-products-from-file]
enabled = true
verify_jwt = false
import_map = "./functions/import-products-from-file/deno.json"
entrypoint = "./functions/import-products-from-file/index.ts"

# Funções públicas possuem controles próprios (CORS, rate limit, HMAC ou segredo de cron).
[functions.gsa-public-advertising]
enabled = true
verify_jwt = false

[functions.gsa-advertiser-access]
enabled = true
verify_jwt = false

[functions.gsa-ad-delivery]
enabled = true
verify_jwt = false

[functions.gsa-advertising-webhook]
enabled = true
verify_jwt = false

[functions.gsa-advertising-scheduler]
enabled = true
verify_jwt = false

# Esta função exige sessão Supabase válida e ainda reconfirma o usuário e o módulo no servidor.
[functions.gsa-advertiser-admin]
enabled = true
verify_jwt = true
